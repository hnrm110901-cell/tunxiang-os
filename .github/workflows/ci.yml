name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, tx-trade, tx-agent, tx-menu, tx-member, tx-supply, tx-finance, tx-org, tx-analytics]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio structlog httpx fastapi pydantic
          if [ -f "services/${{ matrix.service }}/requirements.txt" ]; then
            pip install -r "services/${{ matrix.service }}/requirements.txt"
          fi
      - name: Lint
        run: ruff check "services/${{ matrix.service }}/src/" --ignore E501
      - name: Test
        run: |
          if [ "${{ matrix.service }}" = "gateway" ]; then
            bash scripts/gateway-import-smoke.sh
          fi
          cd "services/${{ matrix.service }}"
          IGNORE_SMOKE=""
          if [ "${{ matrix.service }}" = "gateway" ]; then
            IGNORE_SMOKE="--ignore=src/tests/test_main_import_smoke.py"
          fi
          if [ -d "src/tests" ] && [ "$(find src/tests -name 'test_*.py' 2>/dev/null | head -1)" ]; then
            PYTHONPATH=src:../../ python -m pytest src/tests/ -v --tb=short $IGNORE_SMOKE
          else
            echo "::notice::No tests in services/${{ matrix.service }}"
          fi

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm -r build || echo "Build setup in progress"

  edge-mac-station:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check edge/mac-station/src/ --ignore E501
      - run: ruff check edge/sync-engine/src/ --ignore E501
