name: Toxiproxy Smoke Test (manual)

# Sprint F2 — toxiproxy 测试设施自检。
#
# 范围：仅跑 shared/test_infra/tests/test_toxiproxy_smoke.py（marker: toxiproxy_required）
# 不接入任何 Tier 1 测试套件。
#
# 触发：仅手动 workflow_dispatch。不在 PR gate 上跑。

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to test against"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  toxiproxy-smoke:
    name: F2 toxiproxy smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest pytest-asyncio

      - name: Create external docker network
        run: docker network create docker_txos-dev

      - name: Start toxiproxy
        run: |
          docker compose -f infra/docker/docker-compose.toxiproxy.yml up -d toxiproxy
          # 等 toxiproxy admin 就绪
          for i in {1..30}; do
            if curl -sf http://localhost:8474/version >/dev/null 2>&1; then
              echo "toxiproxy ready"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8474/proxies | python3 -m json.tool

      - name: Run smoke tests
        env:
          TOXIPROXY_URL: http://localhost:8474
        run: |
          python -m pytest \
            shared/test_infra/tests/test_toxiproxy_smoke.py \
            -m toxiproxy_required \
            -v

      - name: Tear down toxiproxy
        if: always()
        run: |
          docker compose -f infra/docker/docker-compose.toxiproxy.yml down -v || true
          docker network rm docker_txos-dev || true
