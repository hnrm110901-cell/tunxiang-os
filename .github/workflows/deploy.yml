name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target environment'
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ─── 测试关卡 ───
  pre-deploy-check:
    name: Pre-deploy Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-deploy
          restore-keys: ${{ runner.os }}-pip-

      - name: Install test deps
        run: pip install pytest pytest-asyncio structlog pydantic fastapi httpx ruff

      - name: Ruff lint
        run: ruff check services/*/src/ edge/*/src/ --output-format=github

      - name: Run critical tests
        run: |
          for svc in gateway tx-trade tx-menu tx-member tx-agent; do
            echo "=== Testing $svc ==="
            cd "services/$svc"
            if [ -d "src/tests" ] && [ "$(find src/tests -name 'test_*.py' | head -1)" ]; then
              PYTHONPATH=src:../../ python -m pytest src/tests/ --tb=short -q || exit 1
            fi
            cd ../..
          done

  # ─── Tier 1 + RLS Gate（审计 OPS-001 修复：原本 deploy 不依赖任何 gate，
  #     tier1-gate.yml / rls-gate.yml 仅在 PR 触发，push to main 时部署不被阻塞。
  #     此处把同等强度的 gate 内嵌到 deploy 链条中。）───
  tier1-and-rls-gate:
    name: Tier 1 + RLS Gate
    runs-on: ubuntu-latest
    needs: pre-deploy-check
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-tier1-gate
          restore-keys: ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          pip install --quiet \
            pytest pytest-asyncio \
            pydantic fastapi httpx \
            sqlalchemy structlog asyncpg \
            pyyaml aiosqlite

      - name: 跑 Tier 1 全套（按文件隔离，避免跨 service conftest 冲突）
        run: |
          # 与 tier1-gate.yml 一致：扫 services/**/tests/**/*tier1*.py
          # + services/**/src/tests/**/*tier1*.py + tests/tier1/**
          mapfile -t TIER1_FILES < <(find services edge tests \
            \( -path '*/tests/*' -o -path 'tests/tier1/*' \) \
            -name 'test_*tier1*.py' -type f 2>/dev/null | sort -u)
          if [ ${#TIER1_FILES[@]} -eq 0 ]; then
            echo "::error::No Tier 1 test files discovered"
            exit 1
          fi
          echo "Discovered ${#TIER1_FILES[@]} Tier 1 test files"
          fail=0
          for f in "${TIER1_FILES[@]}"; do
            echo "::group::$f"
            if ! PYTHONPATH=. python -m pytest -q --tb=line --no-header "$f"; then
              fail=$((fail + 1))
            fi
            echo "::endgroup::"
          done
          if [ "$fail" -gt 0 ]; then
            echo "::error::$fail Tier 1 test files failed — deploy blocked (audit OPS-001)"
            exit 1
          fi

      - name: RLS 静态检查（审计 S-05：ENABLE 必须配 FORCE）
        run: |
          missing_force=0
          violators=()
          for mig in shared/db-migrations/versions/*.py; do
            if grep -q "ENABLE ROW LEVEL SECURITY" "$mig" 2>/dev/null; then
              if ! grep -q "FORCE ROW LEVEL SECURITY" "$mig" 2>/dev/null; then
                missing_force=$((missing_force + 1))
                violators+=("$(basename "$mig")")
              fi
            fi
          done
          if [ "$missing_force" -gt 0 ]; then
            # 当前为非阻塞警告（历史债 ~176 张表），待 RLS-FORCE 批量修迁移上线后改 exit 1
            echo "::warning::$missing_force migrations ENABLE RLS without FORCE (audit S-05)"
            printf '::warning::  - %s\n' "${violators[@]:0:10}"
            if [ "$missing_force" -gt 10 ]; then
              echo "::warning::  ... and $((missing_force - 10)) more"
            fi
          fi

      - name: k6 P99 结果非占位检查（审计 OPS-004）
        run: |
          # 拒绝合成占位结果作为部署证据
          K6_FILE=infra/performance/k6-latest-results.json
          if [ -f "$K6_FILE" ]; then
            if grep -q "Baseline result — replace with real k6 run output\|placeholder\|PLACEHOLDER" "$K6_FILE"; then
              echo "::error::$K6_FILE 仍含占位 marker — 必须替换为真实 staging k6 跑测结果（审计 OPS-004）"
              exit 1
            fi
            # 解析 P99 并强制 < 200ms（Tier 1 SLO）
            # 独立 review P2-2：用 python3 直接 int 转换，避免 ${P99%.*} 在科学
            # 计数法（如 1.5e+02 = 150）下被截成 "1" 误判通过的边界 bug。
            P99=$(python3 -c "import json; d=json.load(open('$K6_FILE')); print(d.get('metrics',{}).get('http_req_duration',{}).get('p(99)','999'))")
            P99_INT=$(python3 -c "print(int(float('$P99')))" 2>/dev/null || echo 999)
            if [ "$P99_INT" -ge 200 ]; then
              echo "::error::k6 实测 P99 = ${P99}ms ≥ 200ms — 违反 Tier 1 SLO（CLAUDE.md §22）"
              exit 1
            fi
            echo "k6 P99 = ${P99}ms < 200ms ✓"
          else
            echo "::warning::$K6_FILE 不存在 — staging 应至少跑一次 k6 留证据"
          fi

  # ─── Staging 部署 ───
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [pre-deploy-check, tier1-and-rls-gate]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          TAG="${{ github.sha }}"
          SHORT_SHA="${TAG:0:7}"

          # 构建各服务镜像
          for svc in gateway tx-trade tx-menu tx-member tx-agent tx-analytics tx-ops tx-supply tx-finance tx-org; do
            if [ -f "services/$svc/Dockerfile" ]; then
              echo "Building $svc..."
              docker build -t "${{ env.IMAGE_PREFIX }}/$svc:$SHORT_SHA" \
                           -t "${{ env.IMAGE_PREFIX }}/$svc:staging" \
                           -f "services/$svc/Dockerfile" .
              docker push "${{ env.IMAGE_PREFIX }}/$svc:$SHORT_SHA"
              docker push "${{ env.IMAGE_PREFIX }}/$svc:staging"
            fi
          done

      - name: Deploy to staging server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/tunxiang-os
            git pull origin main
            docker compose -f infra/compose/base.yml -f infra/compose/envs/staging.yml --env-file .env.staging pull
            docker compose -f infra/compose/base.yml -f infra/compose/envs/staging.yml --env-file .env.staging up -d
            echo "Staging deploy completed at $(date)"

      - name: Health check (staging)
        run: |
          echo "Waiting for services to start..."
          sleep 15
          STAGING_URL="${{ vars.STAGING_URL }}"
          if [ -n "$STAGING_URL" ]; then
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Staging health check passed"
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 10s..."
              sleep 10
            done
            echo "::warning::Staging health check did not return 200 after 5 attempts"
          else
            echo "::notice::No STAGING_URL configured, skipping health check"
          fi

  # ─── Production 部署 ───
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images (production)
        run: |
          TAG="${{ github.sha }}"
          SHORT_SHA="${TAG:0:7}"

          for svc in gateway tx-trade tx-menu tx-member tx-agent tx-analytics tx-ops tx-supply tx-finance tx-org; do
            if [ -f "services/$svc/Dockerfile" ]; then
              echo "Building $svc for production..."
              docker build -t "${{ env.IMAGE_PREFIX }}/$svc:$SHORT_SHA" \
                           -t "${{ env.IMAGE_PREFIX }}/$svc:production" \
                           -t "${{ env.IMAGE_PREFIX }}/$svc:latest" \
                           -f "services/$svc/Dockerfile" .
              docker push "${{ env.IMAGE_PREFIX }}/$svc:$SHORT_SHA"
              docker push "${{ env.IMAGE_PREFIX }}/$svc:production"
              docker push "${{ env.IMAGE_PREFIX }}/$svc:latest"
            fi
          done

      - name: Deploy to production server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/tunxiang-os
            git pull origin main

            # 数据库迁移（含备份）
            ./scripts/migrate.sh up

            # 拉取新镜像并滚动重启
            docker compose -f infra/compose/base.yml -f infra/compose/envs/prod.yml pull
            docker compose -f infra/compose/base.yml -f infra/compose/envs/prod.yml up -d --remove-orphans

            echo "Production deploy completed at $(date)"

      - name: Health check (production)
        run: |
          echo "Waiting for production services to start..."
          sleep 20
          PROD_URL="${{ vars.PRODUCTION_URL }}"
          if [ -n "$PROD_URL" ]; then
            for i in 1 2 3 4 5 6; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Production health check passed"
                exit 0
              fi
              echo "Attempt $i: status=$STATUS, retrying in 15s..."
              sleep 15
            done
            echo "::error::Production health check FAILED after 6 attempts"
            exit 1
          else
            echo "::notice::No PRODUCTION_URL configured, skipping health check"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed! Manual intervention required."
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
