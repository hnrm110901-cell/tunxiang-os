name: Tier 1 Gate

# Tier 1 契约测试门禁（CLAUDE.md § 17 + § 20）
#
# Tier 1 路径：订单状态机 / 支付 Saga / RLS 隔离 / POS 数据 / 存酒押金 /
#              全电发票 / LWW 冲突解析（终态豁免）/ 三条硬约束
#
# 任何修改 Tier 1 路径或其测试文件的 PR 必须全绿。
# CI 分组跑（不同 service 的 conftest.py 会冲突，不能一次性全跑）。

on:
  pull_request:
    branches: [main]
    paths:
      # 测试文件位置（3 个 glob 与 demo_go_no_go.py 对齐）
      - 'services/**/tests/**/*tier1*.py'
      - 'services/**/src/tests/**/*tier1*.py'
      - 'tests/tier1/**'
      # 审计扫描脚本（PR #264 verifier 反馈）：改 scanner 必须重跑 baseline 守门测试
      - 'scripts/audit/**'
      # Tier 1 路径 — CLAUDE.md § 17 列表：
      # 订单状态机 + 支付 Saga + 存酒/押金 + POS 数据 + 全电发票 +
      # LWW 冲突解析（终态豁免）+ 三条硬约束 + RLS
      - 'services/tx-trade/src/services/order_service.py'
      - 'services/tx-trade/src/services/cashier_engine.py'          # 订单状态机
      - 'services/tx-trade/src/services/payment_saga_service.py'
      - 'services/tx-trade/src/services/wine_storage_service.py'    # 存酒押金
      - 'services/tx-trade/src/services/stored_value_service.py'    # 储值 / 挂账
      - 'services/tx-trade/src/services/banquet_deposit_service.py' # 宴会押金
      - 'services/tx-trade/src/models/**'
      # 财务 Tier 1（发票 + 存酒 + 协议挂账）
      - 'services/tx-finance/src/services/invoice_service.py'
      - 'services/tx-finance/src/services/wine_storage_service.py'
      - 'services/tx-finance/src/services/stored_value_service.py'
      - 'services/tx-finance/src/models/**'
      # POS 数据写入（CLAUDE.md § 17 Tier 1）
      - 'shared/adapters/pinzhi_pos/**'
      - 'shared/adapters/aoqiwei/**'
      - 'shared/adapters/meituan/**'
      - 'shared/adapters/meituan-saas/**'
      - 'shared/adapters/eleme/**'
      - 'shared/adapters/douyin/**'
      # Agent 三条硬约束（毛利/食安/客户体验 checker）
      - 'services/tx-agent/src/constraints/**'
      - 'services/tx-agent/src/services/constraint_checker*.py'
      # LWW 冲突解析（终态豁免）
      - 'edge/sync-engine/src/lww_register.py'
      - 'edge/sync-engine/src/conflict_resolver.py'
      - 'edge/sync-engine/src/offline_sync_service.py'
      - 'edge/sync-engine/src/sync_engine.py'
      # Migration（新表必须 RLS，由 rls-gate 门禁，tier1 额外跑测试）
      - 'shared/db-migrations/versions/**'
      # Workflow 自身
      - '.github/workflows/tier1-gate.yml'
      # import-only carve-out 脚本与单测（issue #417 / 流程 3）
      - 'scripts/ci/detect_import_only_diff.py'
      - 'tests/ci/test_detect_import_only_diff.py'
      # 补充 Tier 1 路径（issue D6 修复）
      - 'services/tx-pay/**'
      - 'services/tx-trade/src/order_service.py'
      - 'services/tx-trade/src/cashier_engine.py'
      - 'services/tx-trade/src/wine_storage_service.py'
      - 'services/tx-trade/src/payment_saga_service.py'
      - 'services/tx-trade/tests/test_*tier1*.py'
      - 'services/tx-finance/src/**'
      - 'services/tx-finance/src/invoice_service.py'
      - 'services/tx-finance/tests/test_*tier1*.py'
      - 'shared/security/**'
      - 'edge/sync-engine/**'
      - 'shared/db-migrations/versions/v091*.py'
      # 测试基础设施（PR #515 暴露的 path filter gap — issue #516）
      # 任意深度 conftest.py 改坏会 break Tier 1 test collect，必须触发 gate
      - '**/conftest.py'               # 全仓 conftest.py（root / per-service / tests/ 等任意深度，含 #501 Phase 2 enforcer）
      - 'shared/test_utils/**'         # 共享测试工具
      - 'shared/test_infra/**'         # 测试基础设施
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  discover:
    name: 发现 Tier 1 测试文件
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.find.outputs.groups }}
      count: ${{ steps.find.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 扫描 *tier1*.py
        id: find
        run: |
          # 3 个命名位置（对齐 demo_go_no_go.py 的 glob）
          # 按父目录分组（避免 conftest.py 冲突）
          python - <<'PY' >> $GITHUB_OUTPUT
          import json
          from pathlib import Path
          patterns = [
              "services/*/tests/**/test_*tier1*.py",
              "services/*/src/tests/**/test_*tier1*.py",
              "tests/tier1/**/test_*tier1*.py",
          ]
          files = set()
          for p in patterns:
              files.update(Path(".").glob(p))
          files = sorted(files)
          # 按父目录分组
          groups = {}
          for f in files:
              key = str(f.parent)
              groups.setdefault(key, []).append(str(f))
          matrix = [
              {"group": key, "files": files}
              for key, files in sorted(groups.items())
          ]
          print(f"groups={json.dumps({'include': matrix})}")
          print(f"count={len(files)}")
          PY

      - name: Summary
        run: |
          echo "Found ${{ steps.find.outputs.count }} Tier 1 test files"

  run:
    name: Run Tier 1 ${{ matrix.group }}
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.groups).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.groups) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 缓存 pip wheel
        # 依赖列表 hardcoded 在本 workflow 的"安装依赖"step；手动 bust 改 key 后缀
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: tier1-pip-${{ runner.os }}-py311-${{ hashFiles('.github/workflows/tier1-gate.yml') }}
          restore-keys: tier1-pip-${{ runner.os }}-py311-

      - name: 安装依赖
        run: |
          # 核心依赖（按 service requirements 最小化）
          # cryptography 为 Tier1 支付 verify_callback 真实依赖（RSA2 验签 / AES-GCM 解密）
          pip install --quiet \
            pytest pytest-asyncio \
            pydantic fastapi httpx \
            sqlalchemy structlog asyncpg \
            pyyaml aiosqlite \
            cryptography

      - name: Run ${{ matrix.group }}
        run: |
          FILES="${{ join(matrix.files, ' ') }}"
          echo "Running: $FILES"

          # PYTHONPATH 兼容 services/*/src 内部 import
          PYTHONPATH=. python -m pytest -v --tb=short --no-header $FILES
        env:
          PYTHONDONTWRITEBYTECODE: 1

      - name: Annotate 失败
        if: failure()
        run: |
          echo "::error title=Tier 1 测试失败::${{ matrix.group }} 必须全绿，否则不允许合入 main。参考 CLAUDE.md § 20"

  source-test-pairing:
    name: 源改动必须配对测试改动
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 自测 carve-out 检测器（若 carve-out 自身被改）
        # 检测 PR 是否动了 carve-out 源码或测试。若是则跑单测验证回归；否则零开销跳过。
        # 必要性：tier1-gate 的 `run` job 用 *tier1*.py glob 不会发现 tests/ci/，
        # 不加这一步则 carve-out 自身漂移无 CI 兜底（PR #419 review P1-A）。
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          if echo "$CHANGED" | grep -qE '^(scripts/ci/detect_import_only_diff\.py|tests/ci/test_detect_import_only_diff\.py)$'; then
              echo "carve-out 自身被改，跑单测验证回归..."
              pip install --quiet pytest
              # --confcutdir=tests/ci 限定 conftest.py 加载范围，避免根 tests/conftest.py
              # 依赖（httpx / fastapi 等）未装导致 ImportError。carve-out 的单测全内联
              # fixture，不需要任何 conftest 支持。
              python -m pytest tests/ci/test_detect_import_only_diff.py \
                  --confcutdir=tests/ci -v --tb=short
          else
              echo "carve-out 未被改，跳过自测"
          fi

      - name: 检查 Tier 1 源改动是否配对 tier1 测试改动
        env:
          # 经 env 注入 PR title，避免 ${{ ... }} 直插表达式被作者 title 中引号 / 反引号
          # 等 shell 元字符 escape 出 injection（GitHub Actions security best practice）
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # 流程 3 §"根治 follow-up" 方案 2：PR title prefix `[codemod]` 显式 escape hatch
          # 实测覆盖：多行括号 import / stub setdefault / conftest body / mock binding fix
          # 等本 chain 真实形态（方案 1 import-only carve-out 4 PR 实测覆盖率 = 0/4）。
          # Reviewer 仍负责 5 项自验（流程 3 §裁决标准），prefix 不豁免审查质量。
          # 详见 docs/codemod/namespace-completeness.md §"Review 流程沉淀 流程 3"。
          if [[ "$PR_TITLE" == \[codemod\]* ]]; then
              echo "::notice title=Codemod escape hatch::PR title 以 [codemod] 开头 — 显式跳过 源改动必须配对测试改动 检查（流程 3 §根治 follow-up 方案 2）。Reviewer 注意：codemod PR 仍按 §裁决标准 5 项自验，本 prefix 不豁免审查质量。"
              echo "✅ 源/测试改动配对检查通过（[codemod] title escape hatch）"
              exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # 本 PR 所有变更文件
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # Tier 1 源文件前缀（对齐 paths 触发列表）
          TIER1_SOURCE_PATTERNS=(
            'services/tx-trade/src/services/order_service.py'
            'services/tx-trade/src/services/cashier_engine.py'
            'services/tx-trade/src/services/payment_saga_service.py'
            'services/tx-trade/src/services/wine_storage_service.py'
            'services/tx-trade/src/services/stored_value_service.py'
            'services/tx-trade/src/services/banquet_deposit_service.py'
            'services/tx-finance/src/services/invoice_service.py'
            'services/tx-finance/src/services/wine_storage_service.py'
            'services/tx-finance/src/services/stored_value_service.py'
            'shared/adapters/pinzhi_pos/'
            'shared/adapters/aoqiwei/'
            'shared/adapters/meituan/'
            'services/tx-agent/src/constraints/'
            'edge/sync-engine/src/conflict_resolver.py'
            'edge/sync-engine/src/offline_sync_service.py'
          )

          # 检查是否有 Tier 1 源文件被改
          HAS_TIER1_SOURCE_CHANGE=false
          for pattern in "${TIER1_SOURCE_PATTERNS[@]}"; do
              if echo "$CHANGED" | grep -qF "$pattern"; then
                  HAS_TIER1_SOURCE_CHANGE=true
                  echo "::notice::Tier 1 源变更检测到：匹配 $pattern"
                  break
              fi
          done

          # 检查是否有 *tier1*.py 测试文件被改
          HAS_TIER1_TEST_CHANGE=false
          if echo "$CHANGED" | grep -qE 'tier1.*\.py$|.*tier1.*\.py$'; then
              HAS_TIER1_TEST_CHANGE=true
              echo "::notice::Tier 1 测试变更检测到"
          fi

          # 源改动 + 无测试改动 = 进入 import-only carve-out 检查
          # （issue #417 / 流程 3 §"根治 follow-up" 方案 1）
          if [ "$HAS_TIER1_SOURCE_CHANGE" = "true" ] && [ "$HAS_TIER1_TEST_CHANGE" = "false" ]; then
              echo "运行 import-only carve-out 检测..."
              IS_IMPORT_ONLY=$(python3 scripts/ci/detect_import_only_diff.py --base "$BASE" --head "$HEAD")
              echo "is_import_only=$IS_IMPORT_ONLY"

              if [ "$IS_IMPORT_ONLY" = "true" ]; then
                  echo "::notice title=Carve-out 通过::PR diff 仅 from/import 改动，无业务行为变化（流程 3 §根治 follow-up 方案 1）。跳过 *tier1*.py 测试配对要求。"
                  echo "✅ 源/测试改动配对检查通过（import-only carve-out）"
                  exit 0
              fi

              echo "::error title=Tier 1 源改动未配对测试::本 PR 修改了 Tier 1 源文件，但未修改对应 *tier1*.py 测试。CLAUDE.md § 20 要求 TDD：测试先于实现。"
              echo "缺少的改动：新增或更新对应的 test_*tier1*.py"
              echo "若本 PR 仅 from/import 路径切换（codemod / namespace 重整），见 docs/codemod/namespace-completeness.md §Review 流程沉淀 流程 3"
              exit 1
          fi

          # 源改动 + 测试改动 = OK（tier1-gate 会跑它们）
          # 无源改动 = gate 被其他 path（如 migration）触发，继续跑不 block
          echo "✅ 源/测试改动配对检查通过"

  gate:
    name: Tier 1 门禁判定
    runs-on: ubuntu-latest
    needs: [discover, run, source-test-pairing]
    if: always()
    steps:
      - name: 校验
        run: |
          COUNT="${{ needs.discover.outputs.count }}"
          RUN_RESULT="${{ needs.run.result }}"
          PAIRING_RESULT="${{ needs.source-test-pairing.result }}"

          # 源/测试配对失败直接 block（即使下面 run 跳过也 block）
          if [ "$PAIRING_RESULT" = "failure" ]; then
              echo "::error title=源/测试配对失败::Tier 1 源改动必须配对测试改动"
              exit 1
          fi

          if [ -z "$COUNT" ] || [ "$COUNT" = "0" ]; then
              echo "::error title=未找到 Tier 1 测试::Tier 1 路径有变更但未跑测试。添加 *tier1*.py"
              exit 1
          fi

          # run job 可能 skipped（PR 未修改源、无 tier1 文件变更 → matrix 空）
          # 但只要 COUNT > 0 且 run 非 failure，就算过
          if [ "$RUN_RESULT" = "failure" ]; then
              echo "::error title=Tier 1 测试未全绿::任何 Tier 1 失败都阻塞 PR"
              exit 1
          fi

          echo "✅ $COUNT 个 Tier 1 测试文件全绿 + 源/测试配对 OK"
