name: Migration Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'shared/db-migrations/**'
      - 'shared/db-migrations-core/**'
      - 'services/*/db-migrations/**'
      - '.github/workflows/migration-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'shared/db-migrations/**'
      - 'shared/db-migrations-core/**'
      - 'services/*/db-migrations/**'
      - 'scripts/migrate-all.sh'
      - 'scripts/db-bootstrap.sh'
      - '.github/workflows/migration-ci.yml'

permissions:
  contents: read

jobs:
  fresh-pg-upgrade-test:
    name: Fresh PG — 18 alembics 全跑通
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tunxiang_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install "alembic>=1.13" "sqlalchemy>=2.0" "psycopg2-binary>=2.9"

      - name: Bootstrap fresh PG (init-rls + init-pgvector + 18 alembics)
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/tunxiang_os
          PARALLEL_JOBS: 4
        run: |
          # PG service container 已 health-check ready，--skip-create
          ./scripts/db-bootstrap.sh --skip-create

      - name: Verify version_tables 完整性（18 个 service stamp 表互不冲突）
        env:
          PGPASSWORD: test
        run: |
          # ⚠️ KNOWN GAP (Phase 4a-3): versions/ 全为空 → alembic upgrade head 实质 no-op，
          # 这个 step 当前**只验证脚本不崩溃**，不验证迁移逻辑正确性。Critical bug
          # （如 v264 MV 与 v265 INDEX 撞 store_id 列）必须在 Phase 4a-4 baseline 注入
          # 后才会被 fresh-PG-upgrade-test 检出。
          #
          # Phase 4a-4 PR checklist 必带项：
          #   - 改本 step 为 assert `\dt` 输出含 18 个 <svc>_alembic_version 表
          #   - 改 path filter 触发完整 schema 验证
          #   - 加 service smoke query (e.g. SELECT count(*) FROM <每 service 关键表>)
          psql -h localhost -U postgres -d tunxiang_os -c "\dt" || true
          echo "[Phase 4a-3] versions/ 空 → alembic stamp 表不创建（预期）"
          echo "[Phase 4a-4 TODO] 此 step 改为 assert 18 个 <svc>_alembic_version 表存在"

  check-migration-chain:
    name: Verify Migration Chain Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install alembic
        run: pip install "alembic>=1.13" "sqlalchemy>=2.0"

      - name: Check single alembic head
        # 防御 multiple-heads 静默放行（issue H5）
        # 参考 v397 修复：双 head 必须显式 merge，不能由 CI 默默通过
        # alembic heads 是离线 directory scan，不调用 env.py、不连 DB
        working-directory: shared/db-migrations
        run: |
          set -euo pipefail
          # 修 (PR #346): 原正则 `^[a-f0-9]+` 仅匹配 hash-style revisions；
          # 屯象 codebase 用 `v406_nlq_reports_views_p3` / `v397` 等 v 前缀格式 —
          # 永远 0 命中导致 heads_count=0 始终 fail。改用 `(head)` 标记计数，
          # 与 alembic heads 的输出格式（"<rev_id> (head)"）对齐，与 revision 命名解耦。
          heads_count=$(alembic heads | grep -cE '\(head\)' | tr -d ' ')
          echo "alembic heads count: $heads_count"
          if [ "$heads_count" != "1" ]; then
            echo "::error::Expected exactly 1 alembic head, found $heads_count (see v397 for merge reference)"
            alembic heads
            exit 1
          fi

      - name: Check migration chain integrity
        # KNOWN_BROKEN 白名单 + scope guard 实现已抽到
        # scripts/check_alembic_chain.py（PJ.5）：
        #   - 检测重复 revision、断链
        #   - 任何指向 KNOWN_BROKEN 的新 revision 必须 fail（防止污染传播）
        #   - 详见 docs/migration-chain-debt.md
        run: |
          echo "=== Migration Chain Integrity Check ==="
          python3 scripts/check_alembic_chain.py --versions-dir shared/db-migrations/versions

          echo ""
          echo "--- Checking naming convention ---"
          BAD_NAMES=$(find shared/db-migrations/versions -name "*.py" -not -name "__init__.py" -not -name "v*" -not -path "*__pycache__*" 2>/dev/null)
          if [ -n "$BAD_NAMES" ]; then
            echo "::warning::Migration files not following v* naming convention:"
            echo "$BAD_NAMES"
          fi

          echo ""
          echo "=== Migration check passed ==="

      - name: Schema lint (PR #346 — 7 类 bug 静态扫描 + per-service shells smoke)
        # PR #346 引入的 schema linter 检测 7 类常见 migration bug 模式：
        #   类 A 同名表撞名 / B JSONB 引号嵌套 / C bind+cast 歧义 /
        #   D PK 函数表达式 / F-1 POLICY IF NOT EXISTS / F-2 INSERT POLICY USING /
        #   G GENERATED/索引含非 IMMUTABLE 函数
        # 各类有 baseline ratchet — 新 PR 引入超过 baseline 的违例 → fail
        # 同时验证 per-service alembic shells 完整性
        # 详细规则与修复指引：docs/migration-schema-lint-rules.md
        run: |
          pip install pytest
          python3 -m pytest \
              shared/db-migrations/tests/test_schema_lint_tier1.py \
              shared/db-migrations/tests/test_per_service_shells_tier1.py \
              shared/db-migrations/tests/test_chain_integrity_tier1.py \
              -v --tb=short

      - name: PG.7 — UPDATE/ALL policies must include WITH CHECK
        # 防退化：新 migration 加 FOR UPDATE/ALL ... USING (...) 必须同时带 WITH CHECK，
        # 否则跨租户逃逸面（应用层若能写 tenant_id 列即可把行改属另一租户）。
        # 14 个 legacy 文件已在脚本 _BASELINE_FILES frozenset 内豁免；
        # 运行时 policy 由 v395/v399/v400/v401/v402 修补 33 张表覆盖。
        # 详见 docs/security/pg7-rls-update-policy-residual.md
        run: |
          python3 scripts/check_rls_with_check.py

      - name: Check migration files for SQL safety
        run: |
          VERSIONS_DIR="shared/db-migrations/versions"

          # 检查是否有危险的 DROP TABLE 或 TRUNCATE（生产保护）
          echo "--- Checking for dangerous SQL operations ---"
          DANGEROUS=$(grep -rn -i "DROP TABLE\|TRUNCATE\|DROP DATABASE\|DROP SCHEMA" "$VERSIONS_DIR"/*.py 2>/dev/null || true)
          if [ -n "$DANGEROUS" ]; then
            echo "::warning::Potentially dangerous SQL operations found (review required):"
            echo "$DANGEROUS"
          else
            echo "No dangerous SQL operations detected"
          fi

          # 检查所有新表是否包含 tenant_id（屯象OS RLS 要求）
          echo ""
          echo "--- Checking RLS compliance (tenant_id) ---"
          CREATE_TABLES=$(grep -rn "create_table\|CREATE TABLE" "$VERSIONS_DIR"/*.py 2>/dev/null || true)
          if [ -n "$CREATE_TABLES" ]; then
            echo "Tables being created (verify tenant_id is included):"
            echo "$CREATE_TABLES"
          fi
