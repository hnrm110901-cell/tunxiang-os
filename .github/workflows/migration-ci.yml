name: Migration Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'shared/db-migrations/**'
      - '.github/workflows/migration-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'shared/db-migrations/**'

permissions:
  contents: read

jobs:
  check-migration-chain:
    name: Verify Migration Chain Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Check migration chain integrity
        run: |
          VERSIONS_DIR="shared/db-migrations/versions"
          if [ ! -d "$VERSIONS_DIR" ]; then
            echo "::error::Migration versions directory not found"
            exit 1
          fi

          echo "=== Migration Chain Integrity Check ==="

          # 1. 检查是否有迁移文件
          MIGRATION_COUNT=$(find "$VERSIONS_DIR" -name "v*.py" -not -name "__pycache__" | wc -l | tr -d ' ')
          echo "Found $MIGRATION_COUNT migration files"

          if [ "$MIGRATION_COUNT" -eq 0 ]; then
            echo "::warning::No migration files found"
            exit 0
          fi

          # 2. 检查 revision ID 是否重复
          echo ""
          echo "--- Checking for duplicate revisions ---"
          DUPLICATES=$(grep -rh "^revision = " "$VERSIONS_DIR"/*.py 2>/dev/null | sort | uniq -d)
          if [ -n "$DUPLICATES" ]; then
            echo "::error::Duplicate revision IDs found:"
            echo "$DUPLICATES"
            exit 1
          fi
          echo "No duplicate revisions"

          # 3. 检查 down_revision 引用是否有效（断链检测）
          echo ""
          echo "--- Checking for broken chain ---"
          REVISIONS=$(grep -rh "^revision = " "$VERSIONS_DIR"/*.py 2>/dev/null | sed "s/revision = '\(.*\)'/\1/" | sed 's/revision = "\(.*\)"/\1/')
          DOWN_REVISIONS=$(grep -rh "^down_revision" "$VERSIONS_DIR"/*.py 2>/dev/null | sed "s/down_revision.*= '\(.*\)'/\1/" | sed "s/down_revision.*= \"\(.*\)\"/\1/" | grep -v "None" | grep -v "none")

          BROKEN=0
          while IFS= read -r down_rev; do
            if [ -n "$down_rev" ] && ! echo "$REVISIONS" | grep -q "$down_rev"; then
              echo "::error::Broken chain: down_revision '$down_rev' not found in any migration"
              BROKEN=1
            fi
          done <<< "$DOWN_REVISIONS"

          if [ "$BROKEN" -eq 0 ]; then
            echo "Migration chain is intact"
          else
            exit 1
          fi

          # 4. 检查迁移文件命名规范
          echo ""
          echo "--- Checking naming convention ---"
          BAD_NAMES=$(find "$VERSIONS_DIR" -name "*.py" -not -name "__init__.py" -not -name "v*" -not -path "*__pycache__*" 2>/dev/null)
          if [ -n "$BAD_NAMES" ]; then
            echo "::warning::Migration files not following v* naming convention:"
            echo "$BAD_NAMES"
          fi

          echo ""
          echo "=== Migration check passed ==="

      - name: Check migration files for SQL safety
        run: |
          VERSIONS_DIR="shared/db-migrations/versions"

          # 检查是否有危险的 DROP TABLE 或 TRUNCATE（生产保护）
          echo "--- Checking for dangerous SQL operations ---"
          DANGEROUS=$(grep -rn -i "DROP TABLE\|TRUNCATE\|DROP DATABASE\|DROP SCHEMA" "$VERSIONS_DIR"/*.py 2>/dev/null || true)
          if [ -n "$DANGEROUS" ]; then
            echo "::warning::Potentially dangerous SQL operations found (review required):"
            echo "$DANGEROUS"
          else
            echo "No dangerous SQL operations detected"
          fi

          # 检查所有新表是否包含 tenant_id（屯象OS RLS 要求）
          echo ""
          echo "--- Checking RLS compliance (tenant_id) ---"
          CREATE_TABLES=$(grep -rn "create_table\|CREATE TABLE" "$VERSIONS_DIR"/*.py 2>/dev/null || true)
          if [ -n "$CREATE_TABLES" ]; then
            echo "Tables being created (verify tenant_id is included):"
            echo "$CREATE_TABLES"
          fi
