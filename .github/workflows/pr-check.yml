name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-and-analyze:
    name: Analyze Changes & Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          # 获取变更文件列表
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1)
          echo "Changed files:"
          echo "$CHANGED"

          # 分析变更影响范围
          HAS_BACKEND=false
          HAS_FRONTEND=false
          HAS_MIGRATION=false
          HAS_INFRA=false
          HAS_EDGE=false
          HAS_DOCS=false

          CHANGED_SERVICES=""
          CHANGED_APPS=""

          while IFS= read -r file; do
            case "$file" in
              services/*)
                HAS_BACKEND=true
                svc=$(echo "$file" | cut -d'/' -f2)
                if ! echo "$CHANGED_SERVICES" | grep -q "$svc"; then
                  CHANGED_SERVICES="$CHANGED_SERVICES $svc"
                fi
                ;;
              apps/*)
                HAS_FRONTEND=true
                app=$(echo "$file" | cut -d'/' -f2)
                if ! echo "$CHANGED_APPS" | grep -q "$app"; then
                  CHANGED_APPS="$CHANGED_APPS $app"
                fi
                ;;
              shared/db-migrations/*)
                HAS_MIGRATION=true
                ;;
              infra/*|docker-compose*|Dockerfile*|nginx/*)
                HAS_INFRA=true
                ;;
              edge/*)
                HAS_EDGE=true
                ;;
              docs/*|*.md)
                HAS_DOCS=true
                ;;
            esac
          done <<< "$CHANGED"

          echo "has_backend=$HAS_BACKEND" >> "$GITHUB_OUTPUT"
          echo "has_frontend=$HAS_FRONTEND" >> "$GITHUB_OUTPUT"
          echo "has_migration=$HAS_MIGRATION" >> "$GITHUB_OUTPUT"
          echo "has_infra=$HAS_INFRA" >> "$GITHUB_OUTPUT"
          echo "has_edge=$HAS_EDGE" >> "$GITHUB_OUTPUT"
          echo "has_docs=$HAS_DOCS" >> "$GITHUB_OUTPUT"
          echo "changed_services=$CHANGED_SERVICES" >> "$GITHUB_OUTPUT"
          echo "changed_apps=$CHANGED_APPS" >> "$GITHUB_OUTPUT"

      - name: Add labels
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [];
            const changes = {
              backend: '${{ steps.changes.outputs.has_backend }}' === 'true',
              frontend: '${{ steps.changes.outputs.has_frontend }}' === 'true',
              migration: '${{ steps.changes.outputs.has_migration }}' === 'true',
              infra: '${{ steps.changes.outputs.has_infra }}' === 'true',
              edge: '${{ steps.changes.outputs.has_edge }}' === 'true',
              docs: '${{ steps.changes.outputs.has_docs }}' === 'true',
            };

            if (changes.backend) labels.push('backend');
            if (changes.frontend) labels.push('frontend');
            if (changes.migration) labels.push('migration');
            if (changes.infra) labels.push('infra');
            if (changes.edge) labels.push('edge');
            if (changes.docs) labels.push('docs');

            // 大 PR 警告
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 1
            });

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            if (pr.additions + pr.deletions > 500) {
              labels.push('large-pr');
            }

            if (labels.length > 0) {
              // 确保标签存在
              for (const label of labels) {
                try {
                  await github.rest.issues.getLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label
                  });
                } catch {
                  const colors = {
                    backend: '0075ca',
                    frontend: '7057ff',
                    migration: 'e4e669',
                    infra: 'f9d0c4',
                    edge: '1d76db',
                    docs: '0e8a16',
                    'large-pr': 'd93f0b'
                  };
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: colors[label] || 'ededed'
                  });
                }
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              });
            }

      - name: Post impact summary
        uses: actions/github-script@v8
        with:
          script: |
            const services = '${{ steps.changes.outputs.changed_services }}'.trim();
            const apps = '${{ steps.changes.outputs.changed_apps }}'.trim();
            const hasMigration = '${{ steps.changes.outputs.has_migration }}' === 'true';

            let body = '## Change Impact Analysis\n\n';

            if (services) {
              body += `**Backend services affected:** ${services.split(' ').map(s => '`' + s + '`').join(', ')}\n`;
            }
            if (apps) {
              body += `**Frontend apps affected:** ${apps.split(' ').map(a => '`' + a + '`').join(', ')}\n`;
            }
            if (hasMigration) {
              body += '\n:warning: **This PR includes database migrations** - review carefully\n';
            }

            if (!services && !apps && !hasMigration) {
              body += 'No backend/frontend/migration changes detected.\n';
            }

            // 查找已有的 impact comment 并更新
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Change Impact Analysis')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  # 只测试变更的后端服务
  test-changed-services:
    name: Test Changed Services
    runs-on: ubuntu-latest
    needs: label-and-analyze
    if: needs.label-and-analyze.outputs.has_backend == 'true' || needs.label-and-analyze.outputs.has_edge == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pr
          restore-keys: ${{ runner.os }}-pip-

      - name: Install deps
        run: pip install pytest pytest-asyncio structlog pydantic fastapi httpx ruff

      - name: Test only changed services
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1)

          # 提取变更的服务
          SERVICES=$(echo "$CHANGED" | grep "^services/" | cut -d'/' -f2 | sort -u)
          EDGE_SVCS=$(echo "$CHANGED" | grep "^edge/" | cut -d'/' -f2 | sort -u)

          if [ -z "$SERVICES" ] && [ -z "$EDGE_SVCS" ]; then
            echo "No service changes detected"
            exit 0
          fi

          FAILED=0

          for svc in $SERVICES; do
            echo "=== Testing services/$svc ==="
            if [ -d "services/$svc/src/tests" ]; then
              if [ -f "services/$svc/requirements.txt" ]; then
                pip install -r "services/$svc/requirements.txt" 2>/dev/null || true
              fi
              if [ "$svc" = "gateway" ]; then
                bash scripts/gateway-import-smoke.sh || FAILED=1
              fi
              cd "services/$svc"
              IGNORE_SMOKE=""
              if [ "$svc" = "gateway" ]; then
                IGNORE_SMOKE="--ignore=src/tests/test_main_import_smoke.py"
              fi
              PYTHONPATH=src:../../ python -m pytest src/tests/ --tb=short -q $IGNORE_SMOKE || FAILED=1
              cd ../..
            else
              echo "No tests directory found"
            fi
          done

          for svc in $EDGE_SVCS; do
            echo "=== Testing edge/$svc ==="
            if [ -d "edge/$svc/src/tests" ]; then
              cd "edge/$svc"
              PYTHONPATH=src:../../ python -m pytest src/tests/ --tb=short -q || FAILED=1
              cd ../..
            fi
          done

          exit $FAILED
