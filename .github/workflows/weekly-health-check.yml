name: Weekly Service Health Check

on:
  schedule:
    # Every Monday 01:00 UTC (Asia/Shanghai 09:00)
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  health-scan:
    name: Run code-fact-scan and generate service health report
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for commits_30d count

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run code-fact-scan
        # Issue #783 fix: was `bash scripts/weekly-health-check.sh` which writes
        # `docs/code-health-YYYY-WXX.md` (mismatched upload path + not the script
        # referenced in docs/service-health/README.md). Switch to the canonical
        # `code-fact-scan.py` that writes `docs/service-health/YYYY-WXX.md` —
        # matches the Upload step path glob and the README contract.
        run: |
          python scripts/code-fact-scan.py >/dev/null

      - name: Run CLAUDE.md drift check
        run: |
          python scripts/clauded-md-drift-check.py || true

      - name: Upload health reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: service-health-report-${{ github.run_id }}
          path: |
            docs/service-health/*.md
          if-no-files-found: warn
          retention-days: 90

      - name: Open auto-PR with regenerated reports
        # Issue #783 fix: 90-day artifact alone leaves origin/main baseline
        # stale (守门会 reads main, not artifacts). Auto-open a docs PR so the
        # regen lands on main after human review. Direct push to main is
        # avoided — PR keeps review-gate intact.
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          branch: docs/auto-weekly-health-${{ github.run_id }}
          base: main
          commit-message: |
            [T3 governance] docs(service-health): weekly cron regen — auto-PR
          title: "[T3 governance] docs(service-health): weekly cron regen — auto-PR"
          body: |
            ## Summary

            Auto-generated by `.github/workflows/weekly-health-check.yml` cron
            (run id `${{ github.run_id }}`, trigger `${{ github.event_name }}`).

            Regenerated `docs/service-health/YYYY-WXX.md` via
            `python scripts/code-fact-scan.py` so the main baseline stays
            current week-over-week (#783 fix shipped previously cron was
            writing to the wrong path and not committing).

            ## Carve-out self-eval (per CLAUDE.md §25)

            1. §19 reviewer — N/A (auto-PR, content is mechanical regen of
               on-disk facts; reviewer focus is "is the diff a sane scan?")
            2. CI 真门禁 — T3 docs-only; Tier 1 path glob not triggered is by
               design (no business source touched)
            3. 无并发 ship 风险 — branch name pinned to run_id; if a stale
               auto-PR already exists this run is a no-op (create-pull-request
               action updates existing branch)
            4. 无同主题并发 — auto-PRs are serialized weekly by cron schedule
            5. 不动 §17/G10 — only writes `docs/service-health/*.md`

            ## Test plan

            - Inspect the markdown diff (mostly `silent_failure_count` /
              `commits_30d` deltas)
            - If `silent_failure_count` rose for any service, file/link a
              follow-up issue per `docs/service-health/README.md` ratchet rule
              before merging
          labels: |
            T3-governance
            docs
            auto-pr
          delete-branch: true
          add-paths: |
            docs/service-health/*.md
