  # ── 商业智能 :8011 ────────────────────────────────────────
  tx-intel:
    <<: *python-svc
    command: >
      bash -c "pip install --no-cache-dir -q
      fastapi>=0.104.0 uvicorn[standard]>=0.24.0 pydantic>=2.4.0
