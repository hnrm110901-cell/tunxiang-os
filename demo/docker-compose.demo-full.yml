  # ── Nginx 反向代理 :80 ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-demo.conf:/etc/nginx/conf.d/default.conf:ro
      - demo_frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - demo-net

volumes:
  demo_pg_data:
  demo_redis_data:
  demo_frontend_dist:

networks:
  demo-net:
    driver: bridge
