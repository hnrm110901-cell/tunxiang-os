  # ── 组织人事 :8012 ────────────────────────────────────────
  tx-org:
    <<: *python-svc
    command: >
      bash -c "pip install --no-cache-dir -q
      fastapi>=0.104.0 uvicorn[standard]>=0.24.0 pydantic>=2.4.0
      sqlalchemy>=2.0.0 asyncpg>=0.29.0 structlog>=23.1.0 httpx>=0.25.0
