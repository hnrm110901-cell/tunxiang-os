# ============================================================
# 屯象OS 演示环境 Nginx — 局域网HTTP反向代理
# Mac mini M4 (192.168.10.10:80)
# ============================================================

# ─── Upstream 定义 ───
upstream api_gateway {
    server gateway:8000;
}

# ─── 主服务器 ───
server {
    listen 80 default_server;
    server_name _;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    # CORS（允许局域网所有设备）
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID, X-Request-ID" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── POS 收银前端（商米T2/V2加载）──
    location /pos/ {
        alias /usr/share/nginx/html/web-pos/;
        try_files $uri $uri/ /pos/index.html;
        add_header Cache-Control "no-cache" always;
    }
    location /pos {
        return 301 /pos/;
    }

    # ── KDS 出餐屏前端（商米D2s加载）──
    location /kds/ {
        alias /usr/share/nginx/html/web-kds/;
        try_files $uri $uri/ /kds/index.html;
        add_header Cache-Control "no-cache" always;
    }
    location /kds {
        return 301 /kds/;
    }

    # ── 总部管理后台（笔记本浏览器）──
    location /admin/ {
        alias /usr/share/nginx/html/web-admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache" always;
    }
    location /admin {
        return 301 /admin/;
    }

    # ── 服务员 PWA（手机浏览器）──
    location /crew/ {
        alias /usr/share/nginx/html/web-crew/;
        try_files $uri $uri/ /crew/index.html;
        add_header Cache-Control "no-cache" always;
    }
    location /crew {
        return 301 /crew/;
    }

    # ── 静态资源长缓存 ──
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── API 代理 → Gateway ──
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10m;
    }

    # ── WebSocket 代理（KDS/POS实时推送）──
    location /ws/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── 健康检查 ──
    location /health {
        proxy_pass http://api_gateway/health;
        proxy_set_header Host $host;
    }

    # ── 打印代理接口（iPad/浏览器通过HTTP发送打印指令到佳博打印机）──
    location /api/print {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── 根路径 → 总部后台 ──
    location = / {
        return 302 /admin/;
    }

    # ── 演示状态页 ──
    location /demo-status {
        default_type application/json;
        return 200 '{"status":"running","version":"3.0.0-demo","services":["gateway","tx-trade","tx-menu","tx-member","tx-growth","tx-ops","tx-supply","tx-finance","tx-agent","tx-analytics","tx-brain","tx-intel","tx-org"],"hardware":{"mac_mini":"192.168.10.10","printer":"192.168.10.20","sunmi_t2":"192.168.10.30","sunmi_v2":"192.168.10.31","kds_d2s":"192.168.10.40"}}';
    }
}
