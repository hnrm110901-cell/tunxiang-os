## TunxiangOS V3.0 — 开发环境全栈启动
## 使用: docker-compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-tunxiang_os}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
      REDIS_URL: redis://redis:6379/0
      TX_TRADE_URL: http://tx-trade:8001
      TX_MENU_URL: http://tx-menu:8002
      TX_AGENT_URL: http://tx-agent:8008
      WECOM_CORP_ID: ${WECOM_CORP_ID}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID}
      WECOM_SECRET: ${WECOM_SECRET}
      WECOM_CALLBACK_TOKEN: ${WECOM_CALLBACK_TOKEN}
      TX_MEMBER_SERVICE_URL: http://tx-member:8003
      TX_GROWTH_SERVICE_URL: http://tx-growth:8004
      # 等保三级安全认证配置（生产环境必须在 /etc/txos/security.env 中配置真实值）
      TX_JWT_SECRET_KEY: ${TX_JWT_SECRET_KEY:?TX_JWT_SECRET_KEY required}
      TX_MFA_ENCRYPT_KEY: ${TX_MFA_ENCRYPT_KEY:-}
      TX_FIELD_ENCRYPTION_KEY: ${TX_FIELD_ENCRYPTION_KEY:-}
      TX_INTEGRITY_SECRET: ${TX_INTEGRITY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  tx-member:
    build:
      context: .
      dockerfile: services/tx-member/Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
      TX_MEMBER_SERVICE_URL: http://tx-member:8003
      TX_GROWTH_SERVICE_URL: http://tx-growth:8004
      TX_OPS_SERVICE_URL: http://tx-ops:8005
    depends_on:
      postgres:
        condition: service_healthy

  tx-growth:
    build:
      context: .
      dockerfile: services/tx-growth/Dockerfile
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
      TX_MEMBER_SERVICE_URL: http://tx-member:8003
      TX_GROWTH_SERVICE_URL: http://tx-growth:8004
      TX_OPS_SERVICE_URL: http://tx-ops:8005
      MINIAPP_BASE_URL: https://miniapp.tunxiang.com
    depends_on:
      postgres:
        condition: service_healthy

  tx-trade:
    build:
      context: .
      dockerfile: services/tx-trade/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy

  tx-menu:
    build:
      context: .
      dockerfile: services/tx-menu/Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy

  tx-agent:
    build:
      context: .
      dockerfile: services/tx-agent/Dockerfile
    ports:
      - "8008:8008"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy

  tx-analytics:
    build:
      context: .
      dockerfile: services/tx-analytics/Dockerfile
    ports:
      - "8009:8009"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tx-brain:
    build:
      context: .
      dockerfile: services/tx-brain/Dockerfile
    ports:
      - "8010:8010"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tx-intel:
    build:
      context: .
      dockerfile: services/tx-intel/Dockerfile
    ports:
      - "8011:8011"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tx-org:
    build:
      context: .
      dockerfile: services/tx-org/Dockerfile
    ports:
      - "8012:8012"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tx-supply:
    build:
      context: .
      dockerfile: services/tx-supply/Dockerfile
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tx-finance:
    build:
      context: .
      dockerfile: services/tx-finance/Dockerfile
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:?DB_USER required}:${DB_PASSWORD:?DB_PASSWORD required}@${DB_HOST:-postgres}/${DB_NAME:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── 边缘同步引擎（仅本地开发模拟；生产在 Mac mini 通过 launchd 运行）───
  sync-engine:
    build:
      context: .
      dockerfile: edge/sync-engine/Dockerfile
    environment:
      CLOUD_PG_DSN: ${CLOUD_PG_DSN:?CLOUD_PG_DSN required}
      LOCAL_PG_DSN: ${LOCAL_PG_DSN:?LOCAL_PG_DSN required}
      STORE_ID: ${STORE_ID:-store_dev}
      TENANT_ID: ${TENANT_ID:-}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - edge   # docker-compose --profile edge up 时才启动

volumes:
  pg_data:
