{{/*
ServiceAccount — 默认创建与 chart 同名的 SA。
后续若 deployment 想引用，可加：
  serviceAccountName: {{ include "<chart>.serviceAccountName" . }}
本工件只创建资源；deployment.yaml 不在 P0.6 范围内修改。
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tx-sync-worker.serviceAccountName" . }}
  labels:
    {{- include "tx-sync-worker.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# round-1 reviewer P2-4: SA 级 automountServiceAccountToken: false 防御纵深
# Deployment 级已设, 但 SA 级未设是缺口 — tx-sync-worker 不调 K8s API, 不需 token
automountServiceAccountToken: false
{{- end }}
