{{/*
NetworkPolicy — 默认 disabled (W2 P1 #758 Phase 1 dry_run 不接入业务路径, 仅 /health /metrics).
启用前必须画清楚服务依赖图 (参考 docs/infra/service-dependency-graph.md (待补)).
错误的 NetworkPolicy 会断服务间通信; Phase 2 切单轨前评估是否启用 egress to pinzhi.

values.yaml 期望字段:
  networkPolicy:
    enabled: false
    ingress: []
    egress: []
*/}}
{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tx-sync-worker.fullname" . }}
  labels:
    {{- include "tx-sync-worker.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tx-sync-worker.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
