# tx-member — 会员CDP微服务
# 高可用配置：replicaCount=2，会员数据读写频繁，需双实例

replicaCount: 2

image:
  repository: tunxiang/tx-member
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8003
  targetPort: 8003

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # CLV计算引擎：客户生命周期价值计算，开启后自动触发批量CLV更新
  CLV_ENGINE_ENABLED: "true"
  # GDPR合规模式：等保三级要求，开启后触发匿名化策略（MemberFlags.GDPR_ANONYMIZE）
  GDPR_MODE: compliant

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-member-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8003
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8003
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：会员服务Pod分散到不同节点
podAntiAffinity:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations: {}

nodeSelector: {}

tolerations: []

# P0.6 工件 3 — PodDisruptionBudget（Tier 2：maxUnavailable=1）
pdb:
  enabled: true
  minAvailable: ""
  maxUnavailable: 1

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}
