{{/*
ServiceAccount — 默认创建与 chart 同名的 SA。
后续若 deployment 想引用，可加：
  serviceAccountName: {{ include "<chart>.serviceAccountName" . }}
本工件只创建资源；deployment.yaml 不在 P0.6 范围内修改。
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tx-event-relay.serviceAccountName" . }}
  labels:
    {{- include "tx-event-relay.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
