{{/*
NetworkPolicy — 默认 disabled (W3 P0 #757 shadow 期间不接入业务路径).
启用前必须画清楚服务依赖图 (参考 docs/infra/service-dependency-graph.md (待补)).
错误的 NetworkPolicy 会断服务间通信; W11 切真路径前评估是否启用.

values.yaml 期望字段:
  networkPolicy:
    enabled: false
    ingress: []
    egress: []
*/}}
{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tx-event-relay.fullname" . }}
  labels:
    {{- include "tx-event-relay.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tx-event-relay.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
