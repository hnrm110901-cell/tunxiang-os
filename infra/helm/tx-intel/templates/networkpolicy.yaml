{{/*
NetworkPolicy — 默认 disabled。
启用前必须画清楚服务依赖图（参考 docs/infra/service-dependency-graph.md（待补））。
错误的 NetworkPolicy 会断服务间通信，安全策略需单独 PR 逐服务启用。

values.yaml 期望字段：
  networkPolicy:
    enabled: false
    ingress: []        # 入站规则数组，元素形如 { from: [...], ports: [...] }
    egress: []         # 出站规则数组，元素形如 { to:   [...], ports: [...] }
*/}}
{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tx-intel.fullname" . }}
  labels:
    {{- include "tx-intel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tx-intel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
