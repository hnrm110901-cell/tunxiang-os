# tx-supply — 供应链微服务
# 高可用配置：replicaCount=2，收货验收+门店调拨+加权均价成本核算

replicaCount: 2

image:
  repository: tunxiang/tx-supply
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8006
  targetPort: 8006

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # 收货验收：入库时自动触发品质/重量/效期三重检验
  RECEIVING_INSPECTION_ENABLED: "true"
  # 调拨损耗检测：门店间调拨自动计算损耗率并预警
  TRANSFER_LOSS_DETECTION: "true"
  # 加权均价成本：多批次成本按加权均价法核算，符合会计准则
  WEIGHTED_AVG_COST: "true"
  # PRD-11 sub-B.2 灰度入口 (Phase 2 W12 / 2026-05-16 / Tier 1 邻接第 36 例)
  # IndexSplitProjector lifespan 默认 OFF。灰度走 feature_flags SDK
  # (flags/supply/supply_flags.yaml supply.prd11.index_split_projector.enable).
  # 紧急停用走此 env="false" (优先级最高，绕过 SDK)。
  # dev/demo helm 环境如需翻 ON 用 `helm --set env.TX_SUPPLY_ENABLE_INDEX_SPLIT_PROJECTOR=true`。
  TX_SUPPLY_ENABLE_INDEX_SPLIT_PROJECTOR: "false"

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-supply-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8006
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8006
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：供应链服务Pod分散到不同节点，防止库存数据单点写入风险
podAntiAffinity:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8006"
  prometheus.io/path: "/metrics"

nodeSelector: {}

tolerations: []

# P0.6 工件 3 — PodDisruptionBudget（Tier 1：minAvailable=1，对齐 CLAUDE.md §17 宪法）
pdb:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}

# PR-01B sub-PR A — 证件临期预警 Celery 任务开关
# 默认 false（sub-PR B celery_tasks.py 未 merge 时保持 OFF，避免 ImportError）
# sub-PR B merge 后由运维设 ENABLE_TX_SUPPLY_CERT_ALERTER=1 或切 true 激活
cert_alerter_enabled: false

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# pod 级：UID/GID 10001，禁 root；fsGroup 自动 chown 挂载卷
# container 级：禁权限提升 + drop ALL cap（PSA restricted 基线）
# 前置：镜像 USER 须为 10001（PR-2 Dockerfile USER 整改将逐镜像落地）
# 若部署后某 chart 因镜像未配 USER 而 admission 失败，临时设 enabled: false 并开 follow-up issue
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
