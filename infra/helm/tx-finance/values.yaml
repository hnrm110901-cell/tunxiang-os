# tx-finance — 财务结算微服务

replicaCount: 2

image:
  repository: tunxiang/tx-finance
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8007
  targetPort: 8007

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # VAT增值税计算引擎：国税局合规税率计算，开票前必须开启
  VAT_CALCULATION_ENABLED: "true"
  # 分账引擎：多档口/多品牌收益分账（对应 TradeFlags.SPLIT_PAYMENT）
  # 徐记海鲜等多档口门店强依赖此功能
  PROFIT_SPLIT_ENABLED: "true"

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-finance-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8007
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8007
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：财务服务Pod分散到不同节点
podAntiAffinity:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations: {}

nodeSelector: {}

tolerations: []

# P0.6 工件 3 — PodDisruptionBudget（Tier 1：minAvailable=1，对齐 CLAUDE.md §17 宪法）
pdb:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# pod 级：UID/GID 1000，禁 root；fsGroup 自动 chown 挂载卷
# container 级：禁权限提升 + drop ALL cap（PSA restricted 基线）
# 前置：镜像 USER 须为 1000（PR-2 Dockerfile USER 整改将逐镜像落地）
# 若部署后某 chart 因镜像未配 USER 而 admission 失败，临时设 enabled: false 并开 follow-up issue
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
