# tx-ops — 运营核心微服务
# 高可用配置：replicaCount=2，含日结/食安/调度等核心运营流程

replicaCount: 2

image:
  repository: tunxiang/tx-ops
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8005
  targetPort: 8005

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # 食品安全检查：生产环境强制开启，违规自动拦截
  FOOD_SAFETY_CHECK_ENABLED: "true"
  # 日清日结自动化：E1-E8全流程自动执行
  DAILY_SETTLEMENT_AUTO: "true"
  # 调度引擎：出餐/配送智能调度开关
  DISPATCH_ENABLED: "true"

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-ops-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8005
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8005
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：运营服务Pod分散到不同节点，防止单节点故障影响日结
podAntiAffinity:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8005"
  prometheus.io/path: "/metrics"

nodeSelector: {}

tolerations: []

# P0.6 工件 3 — PodDisruptionBudget（Tier 3：默认禁用，保留模板）
pdb:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}

# Prometheus Bearer Token Secret 挂载（默认关, prod 启用需 Founder sign-off + Secret 已 kubectl create）
# 启用前置: kubectl -n <ns> create secret generic tx-metrics-token --from-literal=token=<token>
# 详见 docs/governance/runbooks/prometheus-secret-rotation.md
prometheus:
  metricsToken:
    enabled: false          # 默认关, 向后兼容; prod enabled=true 需 Secret 真存在
    secretName: tx-metrics-token
    secretKey: token
    envName: PROMETHEUS_BEARER_TOKEN

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# pod 级：UID/GID 10001，禁 root；fsGroup 自动 chown 挂载卷
# container 级：禁权限提升 + drop ALL cap（PSA restricted 基线）
# 前置：镜像 USER 须为 10001（PR-2 Dockerfile USER 整改将逐镜像落地）
# 若部署后某 chart 因镜像未配 USER 而 admission 失败，临时设 enabled: false 并开 follow-up issue
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
