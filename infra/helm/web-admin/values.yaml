replicaCount: 2

image:
  repository: tunxiang/web-admin
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  host: admin.tunxiangos.cn
  tls: true
  tlsSecretName: admin-tunxiangos-cn-tls

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# 前端构建时注入的环境变量（写入nginx env配置）
configMap:
  # P0.6 工件 5 — 是否启用本 chart 模板生成 ConfigMap
  # web-admin 既有 ConfigMap（由 deployment 直接引用 .Values.configMap.name）
  # 默认禁用，避免与既有 ConfigMap 重名/重复创建。
  enabled: false
  name: web-admin-config
  data:
    VITE_API_BASE_URL: https://api.tunxiangos.cn
    VITE_APP_ENV: prod
    VITE_WS_BASE_URL: wss://api.tunxiangos.cn

# nginx配置文件挂载
nginxConfig:
  configMapName: web-admin-nginx-conf
  mountPath: /etc/nginx/conf.d

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

podAntiAffinity:
  enabled: true

podAnnotations: {}
nodeSelector: {}
tolerations: []

# P0.6 工件 2 — ServiceAccount（默认创建，未引用前不影响 default sa）
serviceAccount:
  create: true
  name: ""
  annotations: {}

# P0.6 工件 3 — PodDisruptionBudget（Tier 3：默认禁用，保留模板）
pdb:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# nginx:1.25-alpine 绑端口 80 需要 root，本 chart PR-1 阶段 enabled:false。
# PR-2 将 Dockerfile 切到 nginxinc/nginx-unprivileged（绑 8080）后翻 enabled:true。
# 字段保持齐全（runAsUser:101 即 unprivileged 镜像的 nginx 用户）便于 PR-2 仅一行翻 true。
podSecurityContext:
  enabled: false
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101

containerSecurityContext:
  enabled: false
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
