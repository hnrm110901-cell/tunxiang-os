replicaCount: 2

image:
  repository: tunxiang/api-gateway
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: api.tunxiangos.cn
  tls: true
  tlsSecretName: api-tunxiangos-cn-tls
  # F#6 (issue #455 P0-1) — nginx ingress rate-limit for /api/v1/auth/* (per-IP brute-force 防护)
  # 实现：拆 ingress-auth.yaml 第二个 Ingress 专限 /api/v1/auth/*，主 ingress 业务路径不受影响
  # 对照 bare-metal: infra/nginx/nginx-tls-hardened.conf:130 → rate=10r/m + burst=5
  # 紧急关闭：rateLimit.enabled: false（仅 ops 临时使用，恢复需 follow-up issue 跟踪）
  rateLimit:
    enabled: true
    authPathRpm: 10            # /api/v1/auth/* per-IP rate ceiling (req/min)
    # ingress-nginx 公式: burst = limit-rpm × limit-burst-multiplier
    # multiplier=1 → burst = 10 r/m（与 bare-metal burst=5 差 2×，已是合法范围内最贴近值）
    # multiplier=0 在 controller 接受但 burst=0 会让所有非匀速请求 429，过严不取
    # 默认 multiplier=5（=> burst=50 r/m，等价 bare-metal × 10，过松）→ 此处显式覆盖为 1
    authBurstMultiplier: 1
  # ingress-nginx 限流默认按 $binary_remote_addr（直连 socket peer）计数。
  # 云 LB（腾讯云 CLB / 阿里云 SLB / AWS NLB 等）部署时，所有 client 共享 LB 源 NAT IP →
  # limit-rpm 全租户聚合误伤 + 攻击者控连接源路由获 N× 桶。
  # 修复需在 ingress-nginx-controller ConfigMap 设 use-forwarded-for + proxy-real-ip-cidr，
  # 这是 ConfigMap-only 设置，per-Ingress annotation 不存在，本 chart 无法自动注入。
  # 部署 ops 须根据下方配置先确认 cluster 层已就绪，详见 chart README "部署前提"。
  realIP:
    # 云 LB 部署必须 enabled=true + 填 trustedCidr，否则 limit-rpm 按 LB IP 计数
    enabled: false
    trustedCidr: ""            # e.g. "100.125.0.0/16" for 腾讯云 CLB
    header: "X-Forwarded-For"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: api-gateway-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：同服务Pod分散到不同节点
podAntiAffinity:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations: {}

nodeSelector: {}

tolerations: []

# P0.6 工件 3 — PodDisruptionBudget（Tier 1：minAvailable=1，强保护）
pdb:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# pod 级：UID/GID 10001，禁 root；fsGroup 自动 chown 挂载卷
# container 级：禁权限提升 + drop ALL cap（PSA restricted 基线）
# 前置：镜像 USER 须为 10001（PR-2 Dockerfile USER 整改将逐镜像落地）
# 若部署后某 chart 因镜像未配 USER 而 admission 失败，临时设 enabled: false 并开 follow-up issue
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
