# tx-trade — 交易履约微服务
# 高可用配置：replicaCount=2，交易核心链路不允许单点故障

replicaCount: 2

image:
  repository: tunxiang/tx-trade
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8001
  targetPort: 8001

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # 交易模式：生产环境强制 production，防止测试数据混入真实交易
  TX_TRADE_MODE: production
  # SELECT_FOR_UPDATE：防止并发超卖，交易核心必须开启
  SELECT_FOR_UPDATE_ENABLED: "true"

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-trade-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8001
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8001
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：交易服务Pod必须分散到不同节点，防止单节点故障影响收银
podAntiAffinity:
  enabled: true

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

nodeSelector: {}

tolerations: []
