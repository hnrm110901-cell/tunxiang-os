{{/*
PodDisruptionBudget — Tier 化默认值由 values.yaml 控制。
Tier 1 默认 minAvailable: 1（保证至少一个 Pod 在运行）。
Tier 2 默认 maxUnavailable: 1（允许一个 Pod 同时被驱逐）。
Tier 3 默认 disabled，需要时单独开启。
minAvailable 与 maxUnavailable 互斥，本模板优先 minAvailable。
*/}}
{{- if .Values.pdb.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "tx-menu.fullname" . }}
  labels:
    {{- include "tx-menu.labels" . | nindent 4 }}
spec:
  {{- if .Values.pdb.minAvailable }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- else if .Values.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tx-menu.selectorLabels" . | nindent 6 }}
{{- end }}
