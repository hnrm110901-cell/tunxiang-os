# tx-menu — 菜品菜单微服务
# 高可用配置：replicaCount=2，菜品三级发布/五级价格优先级/KDS路由

replicaCount: 2

image:
  repository: tunxiang/tx-menu
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8002
  targetPort: 8002

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # 菜品三级发布：门店/品牌/集团三层发布机制
  MENU_PUBLISH_V3_ENABLED: "true"
  # KDS路由：后厨出餐屏路由规则引擎
  KDS_ROUTING_ENABLED: "true"
  # 价格优先级：支持5个优先级档位（VIP/节假日/渠道/时段/基准价）
  PRICE_PRIORITY_LEVELS: "5"

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-menu-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8002
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8002
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：菜单服务Pod分散到不同节点，防止菜品发布单点故障
podAntiAffinity:
  enabled: true

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

nodeSelector: {}

tolerations: []
