apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tx-agent.fullname" . }}
  labels:
    {{- include "tx-agent.labels" . | nindent 4 }}
spec:
  # tx-agent 强制单实例，避免LLM任务重复调度
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tx-agent.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "tx-agent.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        runAsGroup: {{ .Values.podSecurityContext.runAsGroup }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.prometheus.metricsToken.enabled }}
            - name: {{ .Values.prometheus.metricsToken.envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.prometheus.metricsToken.secretName }}
                  key: {{ .Values.prometheus.metricsToken.secretKey }}
            - name: PROMETHEUS_AUTH_ENFORCE
              value: "true"
            - name: ENVIRONMENT
              value: {{ .Values.prometheus.metricsToken.environment | default "prod" }}
            {{- else }}
            - name: PROMETHEUS_AUTH_ENFORCE
              value: "false"
            - name: ENVIRONMENT
              value: dev
            {{- end }}
          envFrom:
            # LLM API Key（CLAUDE_API_KEY, OPENAI_API_KEY）及DB/Redis连接串
            - secretRef:
                name: {{ .Values.secretRef.name }}
          {{- if .Values.agentStrategies.enabled }}
          volumeMounts:
            - name: agent-strategies
              mountPath: {{ .Values.agentStrategies.mountPath }}
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.containerSecurityContext.runAsNonRoot }}
            runAsUser: {{ .Values.containerSecurityContext.runAsUser }}
            runAsGroup: {{ .Values.containerSecurityContext.runAsGroup }}
            allowPrivilegeEscalation: {{ .Values.containerSecurityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.containerSecurityContext.readOnlyRootFilesystem }}
            capabilities:
              drop:
                {{- toYaml .Values.containerSecurityContext.capabilities.drop | nindent 16 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.agentStrategies.enabled }}
      volumes:
        - name: agent-strategies
          configMap:
            name: {{ .Values.agentStrategies.configMapName }}
      {{- end }}
