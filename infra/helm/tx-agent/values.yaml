# tx-agent 单实例，避免LLM任务重复调度
replicaCount: 1

image:
  repository: tunxiang/tx-agent
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8008
  targetPort: 8008

ingress:
  enabled: false

# LLM调用场景资源配置（内存需求高）
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 300m
    memory: 512Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  MODEL_ROUTER_BACKEND: claude-haiku
  AGENT_AUTONOMY_LEVEL: L1
  MAX_CONCURRENT_TASKS: "5"
  TASK_TIMEOUT_SECONDS: "120"

# 敏感配置来自Secret
secretRef:
  name: tx-agent-secret
  # 包含: DB_URL, REDIS_URL, CLAUDE_API_KEY, OPENAI_API_KEY

# Agent策略配置文件挂载（ConfigMap）
agentStrategies:
  enabled: true
  configMapName: tx-agent-strategies
  mountPath: /app/config/strategies

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8008
  initialDelaySeconds: 45
  periodSeconds: 15
  failureThreshold: 3
  timeoutSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8008
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

# tx-agent单实例，不需要反亲和
podAntiAffinity:
  enabled: false

podAnnotations: {}
nodeSelector: {}
tolerations: []

# P0.6 工件 2 — ServiceAccount（默认创建，未引用前不影响 default sa）
serviceAccount:
  create: true
  name: ""
  annotations: {}

# P0.6 工件 3 — PodDisruptionBudget（Tier 1：minAvailable=1，对齐 CLAUDE.md §17 宪法）
pdb:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# pod 级：UID/GID 1000，禁 root；fsGroup 自动 chown 挂载卷
# container 级：禁权限提升 + drop ALL cap（PSA restricted 基线）
# 前置：镜像 USER 须为 1000（PR-2 Dockerfile USER 整改将逐镜像落地）
# 若部署后某 chart 因镜像未配 USER 而 admission 失败，临时设 enabled: false 并开 follow-up issue
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
