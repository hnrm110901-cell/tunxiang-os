# tx-predict — 预测引擎微服务（Tier 2：影响门店运营效率）
# 端口决议：原 8013 与 tunxiang-api 冲突 → P0.5 阶段 A 改 8019（空闲口）
# 来源：infra/compose/base.yml + docs/infra/port-allocation-2026-05.md

replicaCount: 2

image:
  repository: tunxiang/tx-predict
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8019
  targetPort: 8019

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-predict-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY, HEFENG_API_KEY

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8019
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8019
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：预测服务 Pod 分散到不同节点
podAntiAffinity:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  # CLAUDE.md §5 authoritative port = 8019 (Dockerfile bug uses 8013, conflicts with tx-forge; #820-P follow-up)
  prometheus.io/port: "8019"
  prometheus.io/path: "/metrics"

nodeSelector: {}

tolerations: []

# P0.6 工件 3 — PodDisruptionBudget（Tier 2：maxUnavailable=1）
pdb:
  enabled: true
  minAvailable: ""
  maxUnavailable: 1

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}

# Prometheus Bearer Token Secret 挂载（默认关, prod 启用需 Founder sign-off + Secret 已 kubectl create）
# 启用前置: kubectl -n <ns> create secret generic tx-metrics-token --from-literal=token=<token>
# 详见 docs/governance/runbooks/prometheus-secret-rotation.md
prometheus:
  metricsToken:
    enabled: false          # 默认关, 向后兼容; prod enabled=true 需 Secret 真存在
    secretName: tx-metrics-token
    secretKey: token
    envName: PROMETHEUS_BEARER_TOKEN

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# pod 级：UID/GID 10001，禁 root；fsGroup 自动 chown 挂载卷
# container 级：禁权限提升 + drop ALL cap（PSA restricted 基线）
# 前置：镜像 USER 须为 10001（PR-2 Dockerfile USER 整改将逐镜像落地）
# 若部署后某 chart 因镜像未配 USER 而 admission 失败，临时设 enabled: false 并开 follow-up issue
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
