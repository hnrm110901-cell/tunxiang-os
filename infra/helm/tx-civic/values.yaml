# tx-civic — 城市监管平台微服务（Tier 3）
# 端口：CLAUDE.md §五 宪法规定的 8014（不可让出）

replicaCount: 1

image:
  repository: tunxiang/tx-civic
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8014
  targetPort: 8014

ingress:
  enabled: false
  className: nginx
  host: ""
  tls: false
  tlsSecretName: ""

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info

# Secret中存放的敏感环境变量（由外部Secret Manager注入）
secretRef:
  name: tx-civic-secret
  # 包含: DB_URL, REDIS_URL, JWT_SECRET, SUPABASE_SERVICE_KEY,
  #       CIVIC_REPORT_API_KEY, FOOD_SAFETY_API_KEY

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8014
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8014
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 3

# Pod反亲和：城市监管服务 Pod 分散到不同节点
podAntiAffinity:
  enabled: true

serviceAccount:
  create: true
  name: ""
  annotations: {}
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8014"
  prometheus.io/path: "/metrics"

nodeSelector: {}

tolerations: []

# P0.6 工件 3 — PodDisruptionBudget（Tier 3：默认禁用，保留模板）
pdb:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1

# P0.6 工件 4 — NetworkPolicy（默认禁用，启用前需画清楚服务依赖图）
# docs/infra/service-dependency-graph.md（待补）
networkPolicy:
  enabled: false
  ingress: []
  egress: []

# P0.6 工件 5 — 额外 ConfigMap（默认禁用，启用后通过 envFrom 注入 deployment）
configMap:
  enabled: false
  data: {}

# F#2 安全上下文（CSO 2026-05-11 整改 — Helm 层兜底）
# pod 级：UID/GID 10001，禁 root；fsGroup 自动 chown 挂载卷
# container 级：禁权限提升 + drop ALL cap（PSA restricted 基线）
# 前置：镜像 USER 须为 10001（PR-2 Dockerfile USER 整改将逐镜像落地）
# 若部署后某 chart 因镜像未配 USER 而 admission 失败，临时设 enabled: false 并开 follow-up issue
podSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # FastAPI/uvicorn/nginx 需写 /tmp；切 true 前需先挂 emptyDir 到 /tmp
  capabilities:
    drop:
      - ALL
