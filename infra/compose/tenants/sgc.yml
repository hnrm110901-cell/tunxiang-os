# ============================================================
# 屯象OS 租户 Override — 尚宫厨 (sgc)
# ============================================================
# 用法（叠加 demo env）:
#   docker compose -f infra/compose/base.yml \
#                  -f infra/compose/envs/demo.yml \
#                  -f infra/compose/tenants/sgc.yml up -d
#
# 端口偏移：+200（postgres=5632, redis=6381, gateway=8200, web=5373-5375）
# KPI 重点：宴会客单价 / 订金收款率 / 人力成本占比
# ============================================================

x-sgc-env: &sgc-env
  TX_MERCHANT_CODE: sgc
  TX_TENANT_ID: sgc-demo-tenant
  TX_MERCHANT_NAME: 尚宫厨
  DATABASE_URL: postgresql+asyncpg://tunxiang:tunxiang_sgc_2024@postgres:5432/tunxiang_sgc

services:
  postgres:
    environment:
      POSTGRES_USER: tunxiang
      POSTGRES_PASSWORD: tunxiang_sgc_2024
      POSTGRES_DB: tunxiang_sgc
    ports: !override
      - "5632:5432"
    volumes:
      - sgc_pg_data:/var/lib/postgresql/data
      - ../docker/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql

  redis:
    ports: !override
      - "6381:6379"

  gateway:
    environment:
      <<: *sgc-env
    ports: !override
      - "8200:8000"

  tx-trade:
    environment:
      <<: *sgc-env
    ports: !override
      - "8201:8001"

  tx-menu:
    environment:
      <<: *sgc-env
    ports: !override
      - "8202:8002"

  tx-member:
    environment:
      <<: *sgc-env
    ports: !override
      - "8203:8003"

  tx-ops:
    environment:
      <<: *sgc-env
    ports: !override
      - "8205:8005"

  tx-finance:
    environment:
      <<: *sgc-env
    ports: !override
      - "8207:8007"

  tx-analytics:
    environment:
      <<: *sgc-env
    ports: !override
      - "8209:8009"

  seed-data:
    image: python:3.11-slim
    working_dir: /app
    restart: "no"
    command: >
      sh -c "pip install -q -i https://pypi.tuna.tsinghua.edu.cn/simple
             sqlalchemy asyncpg psycopg2-binary httpx &&
             python3 /app/scripts/seed_sgc.py &&
             echo '✅ sgc 种子数据植入完成（含宴会预订）'"
    environment:
      DATABASE_URL: postgresql+asyncpg://tunxiang:tunxiang_sgc_2024@postgres:5432/tunxiang_sgc
      PYTHONPATH: /app
      TX_MERCHANT_CODE: sgc
      TX_TENANT_ID: sgc-demo-tenant
    volumes:
      - ../../scripts:/app/scripts
      - ../../shared:/app/shared
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-sgc}"
      tunxiang.tenant: sgc

  web-admin:
    environment:
      VITE_API_BASE_URL: http://localhost:8200
      VITE_MERCHANT_CODE: sgc
      VITE_TENANT_ID: sgc-demo-tenant
    volumes: !override
      - ../../apps/web-admin:/app
      - sgc_web_admin_nm:/app/node_modules
    ports: !override
      - "5373:5173"

  web-pos:
    environment:
      VITE_API_BASE_URL: http://localhost:8200
      VITE_MERCHANT_CODE: sgc
      VITE_TENANT_ID: sgc-demo-tenant
    volumes: !override
      - ../../apps/web-pos:/app
      - sgc_web_pos_nm:/app/node_modules
    ports: !override
      - "5374:5174"

  web-kds:
    environment:
      VITE_API_BASE_URL: http://localhost:8200
      VITE_MERCHANT_CODE: sgc
      VITE_TENANT_ID: sgc-demo-tenant
    volumes: !override
      - ../../apps/web-kds:/app
      - sgc_web_kds_nm:/app/node_modules
    ports: !override
      - "5375:5175"

volumes:
  sgc_pg_data:
  sgc_web_admin_nm:
  sgc_web_pos_nm:
  sgc_web_kds_nm:
