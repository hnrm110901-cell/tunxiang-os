# ============================================================
# 屯象OS 租户 Override — 最黔线 (zqx)
# ============================================================
# 用法（叠加 demo env）:
#   docker compose -f infra/compose/base.yml \
#                  -f infra/compose/envs/demo.yml \
#                  -f infra/compose/tenants/zqx.yml up -d
#
# 端口偏移：+100（postgres=5532, redis=6380, gateway=8100, web=5273-5275）
# KPI 重点：客单价 / 会员复购 / 渠道组合
# ============================================================

x-zqx-env: &zqx-env
  TX_MERCHANT_CODE: zqx
  TX_TENANT_ID: zqx-demo-tenant
  TX_MERCHANT_NAME: 最黔线
  DATABASE_URL: postgresql+asyncpg://tunxiang:tunxiang_zqx_2024@postgres:5432/tunxiang_zqx

services:
  postgres:
    environment:
      POSTGRES_USER: tunxiang
      POSTGRES_PASSWORD: tunxiang_zqx_2024
      POSTGRES_DB: tunxiang_zqx
    ports: !override
      - "5532:5432"
    volumes:
      - zqx_pg_data:/var/lib/postgresql/data
      - ../docker/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql

  redis:
    ports: !override
      - "6380:6379"

  gateway:
    environment:
      <<: *zqx-env
    ports: !override
      - "8100:8000"

  tx-trade:
    environment:
      <<: *zqx-env
    ports: !override
      - "8101:8001"

  tx-menu:
    environment:
      <<: *zqx-env
    ports: !override
      - "8102:8002"

  tx-member:
    environment:
      <<: *zqx-env
    ports: !override
      - "8103:8003"

  tx-ops:
    environment:
      <<: *zqx-env
    ports: !override
      - "8105:8005"

  tx-finance:
    environment:
      <<: *zqx-env
    ports: !override
      - "8107:8007"

  tx-analytics:
    environment:
      <<: *zqx-env
    ports: !override
      - "8109:8009"

  seed-data:
    image: python:3.11-slim
    working_dir: /app
    restart: "no"
    command: >
      sh -c "pip install -q -i https://pypi.tuna.tsinghua.edu.cn/simple
             sqlalchemy asyncpg psycopg2-binary httpx &&
             python3 /app/scripts/seed_zqx.py &&
             echo '✅ zqx 种子数据植入完成'"
    environment:
      DATABASE_URL: postgresql+asyncpg://tunxiang:tunxiang_zqx_2024@postgres:5432/tunxiang_zqx
      PYTHONPATH: /app
      TX_MERCHANT_CODE: zqx
      TX_TENANT_ID: zqx-demo-tenant
    volumes:
      - ../../scripts:/app/scripts
      - ../../shared:/app/shared
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-zqx}"
      tunxiang.tenant: zqx

  web-admin:
    environment:
      VITE_API_BASE_URL: http://localhost:8100
      VITE_MERCHANT_CODE: zqx
      VITE_TENANT_ID: zqx-demo-tenant
    volumes: !override
      - ../../apps/web-admin:/app
      - zqx_web_admin_nm:/app/node_modules
    ports: !override
      - "5273:5173"

  web-pos:
    environment:
      VITE_API_BASE_URL: http://localhost:8100
      VITE_MERCHANT_CODE: zqx
      VITE_TENANT_ID: zqx-demo-tenant
    volumes: !override
      - ../../apps/web-pos:/app
      - zqx_web_pos_nm:/app/node_modules
    ports: !override
      - "5274:5174"

  web-kds:
    environment:
      VITE_API_BASE_URL: http://localhost:8100
      VITE_MERCHANT_CODE: zqx
      VITE_TENANT_ID: zqx-demo-tenant
    volumes: !override
      - ../../apps/web-kds:/app
      - zqx_web_kds_nm:/app/node_modules
    ports: !override
      - "5275:5175"

volumes:
  zqx_pg_data:
  zqx_web_admin_nm:
  zqx_web_pos_nm:
  zqx_web_kds_nm:
