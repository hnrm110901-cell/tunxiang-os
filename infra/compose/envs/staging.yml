# ============================================================
# 屯象OS Compose Override — Staging 环境
# ============================================================
# 用法:
#   docker compose -f infra/compose/base.yml \
#                  -f infra/compose/envs/staging.yml up -d
#
# 特点:
#   - 镜像构建运行（不挂载源码，不热重载）
#   - TX_AUTH_ENABLED=true / TX_RATE_LIMIT_ENABLED=true
#   - Redis 加密码，PG 用持久卷
#   - Nginx 反代（80/443）
#   - 资源减半（cpu:0.5/mem:256M）
# ============================================================

x-build-python: &build-python
  context: ../..
  dockerfile: infra/docker/Dockerfile.python

x-stg-defaults: &stg-defaults
  restart: unless-stopped
  env_file:
    - ../docker/.env.example
  environment:
    TX_ENV: staging
    TX_AUTH_ENABLED: "true"
    TX_RATE_LIMIT_ENABLED: "true"
    LOG_LEVEL: INFO
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M
      reservations:
        cpus: "0.1"
        memory: 64M

services:
  postgres:
    volumes:
      - pg_staging_data:/var/lib/postgresql/data

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}
    volumes:
      - redis_staging_data:/data

  # ── Nginx 反代 ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_staging_logs:/var/log/nginx
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-staging}"

  # ── 16 微服务（镜像构建 + 资源减半）──────────────────────
  gateway:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: "8000"

  tx-trade:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-trade
        SERVICE_PORT: "8001"

  tx-menu:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-menu
        SERVICE_PORT: "8002"

  tx-member:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-member
        SERVICE_PORT: "8003"

  tx-growth:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-growth
        SERVICE_PORT: "8004"

  tx-ops:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-ops
        SERVICE_PORT: "8005"

  tx-supply:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-supply
        SERVICE_PORT: "8006"
    environment:
      # PRD-11 sub-B.2 灰度入口：IndexSplitProjector lifespan 默认 OFF (staging 与 prod 一致).
      # 灰度走 feature_flags SDK (flags/supply/supply_flags.yaml supply.prd11.index_split_projector.enable).
      # 紧急停用走此 env="false" (优先级最高, 绕过 SDK).
      TX_SUPPLY_ENABLE_INDEX_SPLIT_PROJECTOR: "false"

  tx-finance:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-finance
        SERVICE_PORT: "8007"

  tx-agent:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-agent
        SERVICE_PORT: "8008"

  tx-analytics:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-analytics
        SERVICE_PORT: "8009"
    environment:
      # PRD-11 sub-C 灰度入口：SplitAttributionProjector lifespan 默认 OFF (staging 与 prod 一致).
      # 灰度走 feature_flags SDK (flags/analytics/analytics_flags.yaml analytics.prd11.split_attribution_projector.enable).
      # 紧急停用走此 env="false" (优先级最高, 绕过 SDK).
      TX_ANALYTICS_ENABLE_SPLIT_ATTRIBUTION_PROJECTOR: "false"

  tx-brain:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-brain
        SERVICE_PORT: "8010"

  tx-intel:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-intel
        SERVICE_PORT: "8011"

  tx-org:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-org
        SERVICE_PORT: "8012"

  tunxiang-api:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tunxiang-api
        SERVICE_PORT: "8013"

  tx-civic:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-civic
        SERVICE_PORT: "8014"

  tx-expense:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-expense
        SERVICE_PORT: "8015"

  tx-pay:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-pay
        SERVICE_PORT: "8016"

  tx-devforge:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-devforge
        SERVICE_PORT: "8017"

  mcp-server:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: mcp-server
        SERVICE_PORT: "8018"

  tx-predict:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-predict
        SERVICE_PORT: "8019"

  # ── Celery Worker（staging 首次加入，资源减半）──────────────
  # ENV guard: ENABLE_TX_SUPPLY_CERT_ALERTER 未设时等同 tx-ops 模块（blast radius 0）
  celery-worker:
    build:
      context: ../..
      dockerfile: services/tx-ops/Dockerfile
    command:
      - "sh"
      - "-c"
      - >-
        celery
        -A services.tx_ops.src.celery_tasks_sync
        ${ENABLE_TX_SUPPLY_CERT_ALERTER:+-A services.tx_supply.src.celery_tasks}
        worker
        --loglevel=info
        --concurrency=2
        --queues=default,daily_ops,schedule,notifications
    environment:
      TX_ENV: staging
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres/${POSTGRES_DB:?required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}@redis:6379/2
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A services.tx_ops.src.celery_tasks_sync inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-staging}"

  # ── Celery Beat（staging 首次加入）────────────────────────
  # 定时任务：4 时间点推送 / 日结 / 排班 / 工资条（staging 单实例）
  celery-beat:
    build:
      context: ../..
      dockerfile: services/tx-ops/Dockerfile
    command:
      - "sh"
      - "-c"
      - >-
        celery
        -A services.tx_ops.src.celery_tasks_sync
        ${ENABLE_TX_SUPPLY_CERT_ALERTER:+-A services.tx_supply.src.celery_tasks}
        beat
        --loglevel=info
        --schedule=/tmp/celerybeat-schedule
    environment:
      TX_ENV: staging
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres/${POSTGRES_DB:?required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}@redis:6379/2
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-staging}"

volumes:
  pg_staging_data:
  redis_staging_data:
  nginx_staging_logs:
