# ============================================================
# 屯象OS Compose Override — Staging 环境
# ============================================================
# 用法:
#   docker compose -f infra/compose/base.yml \
#                  -f infra/compose/envs/staging.yml up -d
#
# 特点:
#   - 镜像构建运行（不挂载源码，不热重载）
#   - TX_AUTH_ENABLED=true / TX_RATE_LIMIT_ENABLED=true
#   - Redis 加密码，PG 用持久卷
#   - Nginx 反代（80/443）
#   - 资源减半（cpu:0.5/mem:256M）
# ============================================================

x-build-python: &build-python
  context: ../..
  dockerfile: infra/docker/Dockerfile.python

x-stg-defaults: &stg-defaults
  restart: unless-stopped
  env_file:
    - ../docker/.env.example
  environment:
    TX_ENV: staging
    TX_AUTH_ENABLED: "true"
    TX_RATE_LIMIT_ENABLED: "true"
    LOG_LEVEL: INFO
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M
      reservations:
        cpus: "0.1"
        memory: 64M

services:
  postgres:
    volumes:
      - pg_staging_data:/var/lib/postgresql/data

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required for staging}
    volumes:
      - redis_staging_data:/data

  # ── Nginx 反代 ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_staging_logs:/var/log/nginx
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-staging}"

  # ── 16 微服务（镜像构建 + 资源减半）──────────────────────
  gateway:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: "8000"

  tx-trade:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-trade
        SERVICE_PORT: "8001"

  tx-menu:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-menu
        SERVICE_PORT: "8002"

  tx-member:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-member
        SERVICE_PORT: "8003"

  tx-growth:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-growth
        SERVICE_PORT: "8004"

  tx-ops:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-ops
        SERVICE_PORT: "8005"

  tx-supply:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-supply
        SERVICE_PORT: "8006"

  tx-finance:
    <<: *stg-defaults
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-finance
        SERVICE_PORT: "8007"

  tx-agent:
