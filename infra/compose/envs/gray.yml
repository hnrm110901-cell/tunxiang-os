# ============================================================
# 屯象OS Compose Override — Gray 灰度环境
# ============================================================
# 用法:
#   docker compose -f infra/compose/base.yml \
#                  -f infra/compose/envs/gray.yml \
#                  --env-file .env.gray up -d
#
# 核心原则: 共用生产数据库（不启动 postgres/redis 容器）
#   - postgres/redis 用 profiles=never 不启动
#   - DATABASE_URL/REDIS_URL 通过 .env.gray 注入指向生产 PG/Redis
#   - 灰度商户通过 gray-*.tunxiangos.com 访问
#   - GRAY_MODE=true 让业务代码识别灰度路径
#
# 注：原 root-gray 用 network_mode=host + external network。重整后保留
#   network_mode=host 语义，让灰度容器直接走宿主机网络连接生产 PG/Redis。
#   每个 service 都显式 `networks: !reset null` 抵消 base 的 networks
#   声明（!reset 在 anchor 合并时不传递，必须每个 service 显式写）。
# ============================================================

services:
  # 灰度不启动自己的 PG/Redis，复用生产
  postgres:
    profiles:
      - never

  redis:
    profiles:
      - never

  # ── 灰度 Nginx ────────────────────────────────────────────
  gray-nginx:
    image: nginx:alpine
    network_mode: "host"
    volumes:
      - ../nginx/nginx-gray.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../ssl:/etc/nginx/ssl:ro
      - gray-web-pos-dist:/usr/share/nginx/html/gray-web-pos:ro
      - gray-web-admin-dist:/usr/share/nginx/html/gray-web-admin:ro
      - gray-web-kds-dist:/usr/share/nginx/html/gray-web-kds:ro
      - gray-miniapp-dist:/usr/share/nginx/html/gray-miniapp:ro
    depends_on:
      - gateway
    restart: unless-stopped
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-gray}"

  # ── 微服务（灰度版本，host 网络）────────────────────────
  # 每个 service 必须显式：
  #   - network_mode: host
  #   - networks: !reset null  （抵消 base 的 networks: [txos-net]）
  #   - depends_on: !reset []  （抵消 base 的 depends_on: postgres/redis）
  gateway:
    network_mode: "host"
    networks: !reset null
    depends_on: !reset []
    environment:
      TX_ENV: gray
      GRAY_MODE: "true"
      TX_AUTH_ENABLED: "true"
      TX_RATE_LIMIT_ENABLED: "true"
      LOG_LEVEL: INFO
    restart: unless-stopped
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-gray}"

  tx-trade:
