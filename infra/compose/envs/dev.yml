  web-kds:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm config set registry https://registry.npmmirror.com && npm install && npm run dev -- --host 0.0.0.0 --port 5175"
    ports:
      - "5175:5175"
    volumes:
      - ../../apps/web-kds:/app
      - web_kds_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-dev}"

  # ── tx-event-relay 真 Outbox shadow worker (W3 issue #757) ──
  tx-event-relay:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -q -i https://pypi.tuna.tsinghua.edu.cn/simple -r services/tx-event-relay/requirements.txt &&
             uvicorn services.tx_event_relay.src.main:app --host 0.0.0.0 --port 8020 --reload"
    ports:
      - "8020:8020"
    environment:
      TX_AUTH_ENABLED: "false"
      LOG_LEVEL: DEBUG
      RELAY_SHADOW_MODE: "true"
      PROMETHEUS_AUTH_ENFORCE: "true"
      PROMETHEUS_BEARER_TOKEN: "${PROMETHEUS_BEARER_TOKEN}"
    volumes:
      - ../../services/tx-event-relay:/app/services/tx-event-relay
      - ../../shared:/app/shared

  # ── tx-sync-worker 品智POS 同步 + 企微 daily SOP daemon (W2 issue #758) ──
  tx-sync-worker:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -q -i https://pypi.tuna.tsinghua.edu.cn/simple -r services/tx-sync-worker/requirements.txt &&
             uvicorn services.tx_sync_worker.src.main:app --host 0.0.0.0 --port 8021 --reload"
    ports:
      - "8021:8021"
    environment:
      TX_AUTH_ENABLED: "false"
      LOG_LEVEL: DEBUG
      RUN_MODE: "dry_run"
      SYNC_TIMEZONE: "Asia/Shanghai"
    volumes:
      - ../../services/tx-sync-worker:/app/services/tx-sync-worker
      - ../../services/gateway:/app/services/gateway
      - ../../shared:/app/shared

  # ── 边缘同步引擎（profile=edge 才启动）────────────────────
  sync-engine:
    build:
      context: ../..
      dockerfile: edge/sync-engine/Dockerfile
    environment:
      CLOUD_PG_DSN: ${CLOUD_PG_DSN:-postgresql://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD:-changeme_dev}@postgres/${POSTGRES_DB:-tunxiang_os}}
      LOCAL_PG_DSN: ${LOCAL_PG_DSN:-postgresql://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD:-changeme_dev}@postgres/${POSTGRES_DB:-tunxiang_os}}
      STORE_ID: ${STORE_ID:-store_dev}
      TENANT_ID: ${TENANT_ID:-}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - edge
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-dev}"

  # ── Prometheus scrape (dev e2e verify, issue #831) ─────────
  # volume 路径说明 (相对 infra/compose/envs/):
  #   ../monitoring/prometheus/prometheus.yml  → infra/monitoring/prometheus/prometheus.yml
  #   ./tx-metrics-token                       → infra/compose/envs/tx-metrics-token (gitignored)
  #   ../monitoring/prometheus/rules           → infra/monitoring/prometheus/rules/
  # token 文件由 scripts/dev/setup-prometheus-token.sh 首次生成 (chmod 600).
  # 三 backend svc (gateway/tx-trade/tx-event-relay) 通过 PROMETHEUS_BEARER_TOKEN env
  # 接受 Prometheus 的 Bearer token 鉴权 (PROMETHEUS_AUTH_ENFORCE=true, 与 prod 对齐).
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./envs/tx-metrics-token:/etc/prometheus/secrets/tx-metrics-token:ro
      - ../monitoring/prometheus/rules:/etc/prometheus/rules:ro
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-dev}"
    depends_on:
      gateway:
        condition: service_healthy
      tx-trade:
        condition: service_healthy
      tx-event-relay:
        condition: service_healthy

volumes:
  web_admin_node_modules:
  web_pos_node_modules:
  web_kds_node_modules:
