# ============================================================
# 屯象OS Compose Override — Dev 环境
# ============================================================
# 用法:
#   docker compose -f infra/compose/base.yml \
#                  -f infra/compose/envs/dev.yml up -d
#
# 特点:
#   - 主机端口全暴露（5432/6379/8000-8019/5173-5175）
#   - TX_AUTH_ENABLED=false / TX_RATE_LIMIT_ENABLED=false
#   - 源码挂载 + uvicorn --reload 热重载
#   - 前端 Vite Dev Server（5173/5174/5175）
#   - 边缘 sync-engine（profile=edge 才启动）
# ============================================================

services:
  postgres:
    ports:
      - "5432:5432"
    volumes:
      - ../docker/init-pgvector.sql:/docker-entrypoint-initdb.d/02-pgvector.sql

  redis:
    ports:
      - "6379:6379"

  gateway:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -q -i https://pypi.tuna.tsinghua.edu.cn/simple -r services/gateway/requirements.txt &&
             uvicorn services.gateway.src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      TX_AUTH_ENABLED: "false"
      TX_RATE_LIMIT_ENABLED: "false"
      LOG_LEVEL: DEBUG
      PROMETHEUS_AUTH_ENFORCE: "true"
      PROMETHEUS_BEARER_TOKEN: "${PROMETHEUS_BEARER_TOKEN}"
    volumes:
      - ../../services/gateway:/app/services/gateway
      - ../../shared:/app/shared

