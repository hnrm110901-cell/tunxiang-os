# ============================================================
# 屯象OS Compose Override — Prod 环境
# ============================================================
# 用法:
#   docker compose -f infra/compose/base.yml \
#                  -f infra/compose/envs/prod.yml up -d
#   （叠加资源限制时再追加 -f infra/compose/special/resource-limits.yml）
#
# 特点:
#   - PostgreSQL 主从（postgres-primary + postgres-replica）
#   - Redis 加密码 + AOF 持久化
#   - Nginx + Let's Encrypt（80/443 暴露）
#   - 严格 healthcheck（curl + 15s 间隔）
#   - JSON 日志（50m × 5 文件）
#   - **从 root-prod 搬迁**: celery-worker / celery-beat / pg-backup
#   - 前端构建（web-hub / web-admin / web-pos / web-kds / miniapp / web-forge）
#
# 注：base.yml 中的 postgres 在 prod 被 postgres-primary 替代——
#    我们在 base.yml 里 postgres 仍 listen，但 service_common 的 depends_on 通过
#    docker compose merge 自动补 postgres-primary。所有微服务 prod 用
#    DATABASE_URL=postgres-primary（通过 .env 配置）。
# ============================================================

x-prod-env: &prod-env
  TX_ENV: prod
  TX_AUTH_ENABLED: "true"
  TX_RATE_LIMIT_ENABLED: "true"
  LOG_LEVEL: INFO

x-prod-build: &prod-build
  context: ../..
  dockerfile: infra/docker/Dockerfile.python

x-prod-logging: &prod-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

x-prod-defaults: &prod-defaults
  restart: always
  env_file:
    - ../docker/.env.example
  environment:
    TX_ENV: prod
    TX_AUTH_ENABLED: "true"
    TX_RATE_LIMIT_ENABLED: "true"
    LOG_LEVEL: INFO
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

services:
  # ── PostgreSQL 主从（覆盖 base 的 postgres）────────────────
  postgres:
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=5
        -c max_replication_slots=5
        -c hot_standby=on
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=128MB
        -c work_mem=4MB
        -c max_connections=200
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
    volumes:
      - pg_prod_primary:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 512M
    logging: *prod-logging

  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
    command: >
      postgres
        -c hot_standby=on
        -c shared_buffers=128MB
        -c max_connections=200
    volumes:
      - pg_prod_replica:/var/lib/postgresql/data
      - ../docker/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging: *prod-logging
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-prod}"

  redis:
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_prod_data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *prod-logging

  # ── Nginx + Let's Encrypt ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/tunxiang.conf:ro
      - ../nginx/nginx-tls-hardened.conf:/etc/nginx/conf.d/tls-hardened.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
      - nginx_prod_logs:/var/log/nginx
      # 前端 dist
      - web-hub-dist:/usr/share/nginx/html/web-hub:ro
      - web-admin-dist:/usr/share/nginx/html/web-admin:ro
      - web-pos-dist:/usr/share/nginx/html/web-pos:ro
      - web-kds-dist:/usr/share/nginx/html/web-kds:ro
      - miniapp-dist:/usr/share/nginx/html/miniapp:ro
      - web-forge-dist:/usr/share/nginx/html/web-forge:ro
    depends_on:
      - gateway
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging: *prod-logging
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-prod}"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    restart: always
    logging: *prod-logging
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-prod}"

  # ── 16 微服务（生产镜像 + 严格 healthcheck）─────────────
  gateway:
    <<: *prod-defaults
    build:
      <<: *prod-build
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging: *prod-logging

  tx-trade:
