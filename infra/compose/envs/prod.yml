volumes:
  pg_prod_primary:
  pg_prod_replica:
  pg_backups:
  redis_prod_data:
  ssl_certs:
  certbot_webroot:
  nginx_prod_logs:
  web-hub-dist:
  web-admin-dist:
  web-pos-dist:
  web-kds-dist:
  miniapp-dist:
  web-forge-dist:
