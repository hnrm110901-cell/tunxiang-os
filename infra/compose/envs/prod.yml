  tx-predict:
    <<: *prod-defaults
    build:
      <<: *prod-build
      args:
        SERVICE_NAME: tx-predict
        SERVICE_PORT: "8019"
    logging: *prod-logging

  # ── Celery Worker（从 root-prod 搬迁）─────────────────────
  celery-worker:
    build:
      context: ../..
      dockerfile: services/tx-ops/Dockerfile
    # ENV guard: ENABLE_TX_SUPPLY_CERT_ALERTER 未设时等同原命令（blast radius 0）
    # 设为任意非空值时追加 tx-supply celery_tasks 模块（sub-PR B merge 后启用）
    command:
      - "sh"
      - "-c"
      - >-
        celery
        -A services.tx_ops.src.celery_tasks_sync
        ${ENABLE_TX_SUPPLY_CERT_ALERTER:+-A services.tx_supply.src.celery_tasks}
        worker
        --loglevel=info
        --concurrency=4
        --queues=default,daily_ops,schedule,notifications
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres/${POSTGRES_DB:?required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/2
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A services.tx_ops.src.celery_tasks_sync inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging: *prod-logging
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-prod}"

  # ── Celery Beat（从 root-prod 搬迁）─────────────────────
  # 定时任务：4 时间点推送 / 日结 / 排班 / 工资条
  celery-beat:
    build:
      context: ../..
      dockerfile: services/tx-ops/Dockerfile
    # ENV guard: ENABLE_TX_SUPPLY_CERT_ALERTER 未设时等同原命令（blast radius 0）
    # 设为任意非空值时追加 tx-supply celery_tasks 模块（sub-PR B merge 后启用）
    command:
      - "sh"
      - "-c"
      - >-
        celery
        -A services.tx_ops.src.celery_tasks_sync
        ${ENABLE_TX_SUPPLY_CERT_ALERTER:+-A services.tx_supply.src.celery_tasks}
        beat
        --loglevel=info
        --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres/${POSTGRES_DB:?required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/2
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    logging: *prod-logging
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-prod}"

  # ── PG 定时备份（从 root-prod 搬迁）──────────────────────
  pg-backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB:?POSTGRES_DB required}
      PGUSER: ${POSTGRES_USER:?POSTGRES_USER required}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      BACKUP_KEEP_DAYS: "7"
    volumes:
      - pg_backups:/backups
      - ../../scripts/backup/pg_backup.sh:/pg_backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Starting backup scheduler (daily at 02:00)..."
        while true; do
          now=$(date +%H:%M)
          if [ "$$now" = "02:00" ]; then
            /bin/sh /pg_backup.sh
          fi
          sleep 60
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging: *prod-logging
    networks:
      - txos-net
    labels:
      tunxiang.env: "${TUNXIANG_ENV:-prod}"

  # ── 前端 Build & 静态文件 ─────────────────────────────────
  web-hub:
    build:
      context: ../..
      dockerfile: apps/web-hub/Dockerfile
    volumes:
      - web-hub-dist:/app/dist
    environment:
      VITE_API_BASE_URL: https://${API_DOMAIN:-api.tunxiangos.com}
      VITE_WS_BASE_URL:  wss://${WS_DOMAIN:-ws.tunxiangos.com}
