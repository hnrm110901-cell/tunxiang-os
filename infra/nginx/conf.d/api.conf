# ============================================================================
# TunxiangOS V3 - API 反向代理配置
# api.tunxiangos.com: Gateway 统一入口 + 16 服务直连路由 + WebSocket
# ============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tunxiangos.com;

    # 安全头（API 专用：禁止 iframe 嵌入）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID, X-Request-ID, X-Store-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    # OPTIONS 预检直接返回
    if ($request_method = OPTIONS) {
        return 204;
    }

    # 默认请求体限制
    client_max_body_size 10m;

    # 连接并发限制
    limit_conn conn_limit 20;

    # ══════════════════════════════════════════════════════════════════════════
    # 认证接口（严格限速 10r/m，防暴力破解）
    # 等保三级：5 分钟内 10 次失败应触发告警
    # ══════════════════════════════════════════════════════════════════════════
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # 认证接口禁止缓存
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # 文件上传（单独限速 5r/m，放宽 body 到 100M）
    # ══════════════════════════════════════════════════════════════════════════
    location /api/v1/upload {
        limit_req zone=upload_limit burst=3 nodelay;
        client_max_body_size 100m;

        proxy_pass http://gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Gateway 统一入口（默认路由，生产环境全部走此路径）
    # ══════════════════════════════════════════════════════════════════════════
    location /api/v1/ {
        limit_req zone=api_general burst=50 nodelay;

        proxy_pass http://gateway;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

