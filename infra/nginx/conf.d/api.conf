    # ══════════════════════════════════════════════════════════════════════════
    # WebSocket（实时推送：出餐调度 / 折扣预警 / Agent 通知）
    # ══════════════════════════════════════════════════════════════════════════
    location /ws/ {
        proxy_pass http://mac-station;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;  # 24h 长连接
        proxy_send_timeout  86400s;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # 健康检查（不限速，供负载均衡器探测）
    # ══════════════════════════════════════════════════════════════════════════
    location /health {
        access_log off;
        proxy_pass http://gateway/health;
        proxy_set_header Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # 安全拒绝规则
    # ══════════════════════════════════════════════════════════════════════════

    # 拒绝访问隐藏文件（.env / .git / .htaccess 等）
    location ~ /\. {
        deny all;
        return 404;
    }

    # 拒绝常见漏洞扫描路径
    location ~* (phpMyAdmin|phpmyadmin|wp-admin|wordpress|xmlrpc\.php|\.php$) {
        deny all;
        return 404;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# ws.tunxiangos.com — WebSocket 专用入口（mac-station）
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ws.tunxiangos.com;

    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://mac-station;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
