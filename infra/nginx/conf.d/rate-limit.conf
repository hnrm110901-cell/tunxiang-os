# ============================================================================
# TunxiangOS V3 - 限流配置
# 分层限速：API 通用 / 认证接口 / 文件上传 / 连接并发
# ============================================================================

# ── API 通用限速：100 req/s per IP ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;

# ── 认证接口限速：10 req/min per IP（防暴力破解）─────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# ── 文件上传限速：5 req/min per IP ───────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

# ── 单 IP 最大并发连接数 ─────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── 限流响应状态码 ───────────────────────────────────────────────────────────
# 429 Too Many Requests（标准 HTTP 语义）
limit_req_status  429;
limit_conn_status 429;
