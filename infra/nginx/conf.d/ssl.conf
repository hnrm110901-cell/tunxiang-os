# ============================================================================
# TunxiangOS V3 - SSL/TLS 配置
# Let's Encrypt 通配符证书 + TLS 1.2/1.3 + HSTS + OCSP Stapling
# ============================================================================

# ── TLS 证书（Let's Encrypt 通配符）─────────────────────────────────────────
ssl_certificate     /etc/nginx/ssl/fullchain.pem;
ssl_certificate_key /etc/nginx/ssl/privkey.pem;
ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

# ── TLS 协议（等保三级：禁用 TLS 1.0/1.1）──────────────────────────────────
ssl_protocols TLSv1.2 TLSv1.3;

# ── 强密码套件（前向保密 + AEAD）─────────────────────────────────────────────
# 禁用 RC4/DES/3DES/MD5/CBC 弱算法
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
# 关闭服务端密码优先（客户端优先选择 ChaCha20，移动端性能更好）
ssl_prefer_server_ciphers off;

# ── DH 参数（防 Logjam 攻击）────────────────────────────────────────────────
# 生成：openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ── OCSP Stapling（握手中携带吊销状态，加速验证）─────────────────────────────
ssl_stapling on;
ssl_stapling_verify on;
resolver 183.60.83.19 183.60.82.98 valid=300s;  # 腾讯云 DNS
resolver_timeout 5s;

# ── 会话复用（性能优化）──────────────────────────────────────────────────────
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;  # 禁用 Session Tickets（保障前向保密）

# ── HSTS（强制 HTTPS，1年有效期，含子域名，preload）─────────────────────────
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── HTTP → HTTPS 301 重定向（所有域名）──────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME 证书验证例外（certbot / 腾讯云免费证书）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # 所有其他请求强制 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
