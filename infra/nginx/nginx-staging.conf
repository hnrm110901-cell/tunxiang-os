## TunxiangOS V3 — Staging Nginx 配置
## 端口 8080，无 SSL，仅内部访问

upstream stg_gateway {
    server stg-gateway:8000;
}

server {
    listen 80;
    server_name _;

    # 安全头（staging 也加）
    add_header X-Content-Type-Options nosniff always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # ── 健康检查 ──
    location /health {
        proxy_pass http://stg_gateway/health;
    }

    # ── Staging 标识（调试用） ──
    add_header X-Environment "staging" always;

    # ── POS 前端 ──
    location /pos/ {
        alias /usr/share/nginx/html/web-pos/;
        try_files $uri $uri/ /pos/index.html;
    }

    # ── Admin 前端 ──
    location /admin/ {
        alias /usr/share/nginx/html/web-admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ── KDS 前端 ──
    location /kds/ {
        alias /usr/share/nginx/html/web-kds/;
        try_files $uri $uri/ /kds/index.html;
    }

    # ── API 代理 ──
    location /api/ {
        proxy_pass http://stg_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # ── 默认首页 ──
    location / {
        return 200 '{"env":"staging","status":"ok","services":["pos:/pos/","admin:/admin/","kds:/kds/","api:/api/"]}';
        add_header Content-Type application/json;
    }
}
