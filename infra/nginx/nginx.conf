## TunxiangOS V3 Nginx 配置
## SSL/TLS 终止 + 反向代理 + 安全头 + WebSocket + Rate Limiting + Gzip + CORS
## 域名架构: hub / os / pos / kds / m / forge / api / ws / docs / www

# ─── Rate Limiting 区域定义 ───
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_burst:10m  rate=200r/s;

# ─── Gzip 压缩配置 ───
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    font/ttf
    font/opentype
    image/svg+xml;

# ─── Upstream 定义 ───

upstream gateway {
    server gateway:8000;
}

upstream mac-station {
    server mac-station:8000;
}

upstream tx-brain {
    server tx-brain:8010;
}

upstream tx-supply {
    server tx-supply:8006;
}

upstream tx-org {
    server tx-org:8012;
}

upstream tx-finance {
    server tx-finance:8007;
}

upstream tx-analytics {
    server tx-analytics:8009;
}

upstream tx-intel {
    server tx-intel:8011;
}

# ─── WebSocket 升级 map ───
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── CORS origin 白名单 map ───
map $http_origin $cors_origin {
    default "";
    "~^https://(hub|os|pos|kds|m|forge|docs|www)\.tunxiangos\.com$"  $http_origin;
    "~^http://localhost:[0-9]+$"                                      $http_origin;
}

# ─── Hub IP 白名单（内网 / Tailscale） ───
geo $hub_allowed {
    default         0;
    127.0.0.1/32    1;
    100.64.0.0/10   1;   # Tailscale CGNAT
    10.0.0.0/8      1;   # 内网
}

# ══════════════════════════════════════════════════════════════
# HTTP -> HTTPS 重定向（所有域名）
# ══════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name
        hub.tunxiangos.com
        os.tunxiangos.com
        pos.tunxiangos.com
        kds.tunxiangos.com
        m.tunxiangos.com
        forge.tunxiangos.com
        api.tunxiangos.com
        ws.tunxiangos.com
        docs.tunxiangos.com
        www.tunxiangos.com
        tunxiangos.com;
    return 301 https://$host$request_uri;
}

# ══════════════════════════════════════════════════════════════
# SSL 公共片段（通过 include 复用）
# 写在各 server block 内部，此处仅作注释说明
# ssl_certificate     /etc/nginx/ssl/fullchain.pem;
# ssl_certificate_key /etc/nginx/ssl/privkey.pem;
# ssl_protocols       TLSv1.2 TLSv1.3;
# ssl_ciphers         HIGH:!aNULL:!MD5;
# ssl_prefer_server_ciphers on;
# ssl_session_cache   shared:SSL:10m;
# ssl_session_timeout 10m;
# ══════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────
# 1. hub.tunxiangos.com — 总部 Hub（IP 白名单限制）
# ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name hub.tunxiangos.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # IP 白名单检查
    if ($hub_allowed = 0) {
        return 403;
    }

    # 静态文件（React build）
    root /usr/share/nginx/html/web-hub;

    # index.html 不缓存
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 静态资源长缓存（1 年）
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # API 代理
    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10m;
    }
}

