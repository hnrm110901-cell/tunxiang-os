## TunxiangOS V3.0 Nginx 配置
## SSL/TLS 终止 + 反向代理 + 安全头

upstream gateway {
    server gateway:8000;
}

upstream web-admin {
    server web-admin:3000;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.zlsjos.cn admin.zlsjos.cn;
    return 301 https://$host$request_uri;
}

# API Gateway
server {
    listen 443 ssl http2;
    server_name api.zlsjos.cn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS 由 FastAPI 处理，Nginx 不重复添加

    # API 代理
    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 请求体大小（上传文件）
        client_max_body_size 10m;
    }

    # WebSocket（Agent 推送）
    location /ws/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # 健康检查
    location /health {
        proxy_pass http://gateway;
    }
}

# 总部管理后台
server {
    listen 443 ssl http2;
    server_name admin.zlsjos.cn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 静态文件（React build）
    root /usr/share/nginx/html/web-admin;

    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存（每次检查新版本）
        add_header Cache-Control "no-cache" always;
    }

    # 静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到 Gateway
    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
