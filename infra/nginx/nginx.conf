## TunxiangOS V3.2 Nginx 配置
## SSL/TLS 终止 + 反向代理 + 安全头 + WebSocket + Rate Limiting + Gzip + CORS

# ─── Rate Limiting 区域定义 ───
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=miniapp_limit:10m rate=100r/s;

# ─── Gzip 压缩配置 ───
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    font/ttf
    font/opentype
    image/svg+xml;

# ─── Upstream 定义 ───

upstream gateway {
    server gateway:8000;
}

upstream web-admin {
    server web-admin:3000;
}

upstream mac-station {
    server mac-station:8000;
}

# ─── HTTP → HTTPS 重定向 ───
server {
    listen 80;
    server_name api.zlsjos.cn admin.zlsjos.cn miniapp.zlsjos.cn;
    return 301 https://$host$request_uri;
}

# ─── API Gateway ───
server {
    listen 443 ssl http2;
    server_name api.zlsjos.cn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── CORS 配置 ───
    # 预检请求
    set $cors_origin "";
    if ($http_origin ~* "^https://(admin|miniapp|pos)\.zlsjos\.cn$") {
        set $cors_origin $http_origin;
    }
    # 本地开发环境
    if ($http_origin ~* "^http://localhost:[0-9]+$") {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    # OPTIONS 预检直接返回
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ─── API 代理（Rate Limited） ───
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 请求体大小（上传文件）
        client_max_body_size 10m;
    }

    # ─── miniapp API 代理 ───
    location /api/v1/miniapp/ {
        limit_req zone=miniapp_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        client_max_body_size 5m;
    }

    # ─── WebSocket（Agent 推送） ───
    location /ws/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ─── WebSocket — KDS 出餐屏推送 ───
    location /ws/kds/ {
        proxy_pass http://mac-station;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 健康检查
    location /health {
        proxy_pass http://gateway;
    }
}

# ─── 总部管理后台 ───
server {
    listen 443 ssl http2;
    server_name admin.zlsjos.cn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 静态文件（React build）
    root /usr/share/nginx/html/web-admin;

    # ─── index.html 不缓存（每次检查新版本） ───
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ─── 静态资源长缓存（js/css/images 1年） ───
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # API 代理到 Gateway
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ─── 小程序 API 专用入口（可选独立域名） ───
server {
    listen 443 ssl http2;
    server_name miniapp.zlsjos.cn;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # CORS — 小程序域名白名单
    add_header Access-Control-Allow-Origin "https://servicewechat.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID" always;
    add_header Access-Control-Max-Age 86400 always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/v1/miniapp/ {
        limit_req zone=miniapp_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 5m;
    }

    location /health {
        proxy_pass http://gateway;
    }
}
