# 屯象OS Nginx安全加固配置
# 等保三级合规：TLS 1.2+，安全响应头，请求限制
# 服务器：腾讯云广州 42.194.229.21
# 创建时间：2026-03-31

# ── 全局安全设置 ─────────────────────────────────────────────────────────────
# 禁止显示Nginx版本（信息收敛，防止版本探测攻击）
server_tokens off;

# ── 连接与请求限制（配合WAF防CC攻击）────────────────────────────────────────
# 单IP最大并发连接数
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
# 普通API接口：每分钟100次
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
# 认证接口：每分钟10次（防暴力破解）
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# ── Upstream 定义 ─────────────────────────────────────────────────────────────
upstream txos_api {
    server 127.0.0.1:8000;
    keepalive 32;
    keepalive_timeout 65s;
}

# ── HTTP → HTTPS 强制重定向 ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME证书申请例外（腾讯云免费证书验证路径）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 所有其他请求强制跳转HTTPS（301永久重定向）
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主配置 ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tunxiangos.com;  # 按实际域名调整（见下方注释）
    # 完整域名列表参考 nginx.conf 中的域名架构：
    #   hub/os/pos/kds/m/forge/api/ws/docs/www.tunxiangos.com

    # ── TLS 证书配置（腾讯云免费DV证书）──────────────────────────────────────
    # 证书文件从腾讯云SSL控制台下载后上传到服务器
    # 上传路径：scp fullchain.pem privkey.pem root@42.194.229.21:/etc/nginx/ssl/
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # OCSP Stapling 需要的受信任CA证书（腾讯云证书包中的 chain.pem）
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    # ── TLS 加固（等保三级：禁用TLS 1.0/1.1）────────────────────────────────
    # 仅允许 TLS 1.2 和 TLS 1.3
    ssl_protocols TLSv1.2 TLSv1.3;

    # 强密码套件（禁用RC4/DES/3DES/MD5/CBC等弱算法）
    # 优先选择 ECDHE（前向保密） + AEAD（认证加密） 组合
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    # 关闭服务端密码优先（让客户端优先选择ChaCha20，移动端性能更好）
    ssl_prefer_server_ciphers off;

    # DH 参数（防 Logjam 攻击）
    # 生成命令：openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # OCSP Stapling（在握手中携带证书吊销状态，加速验证）
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 183.60.83.19 183.60.82.98 valid=300s;  # 腾讯云DNS
    resolver_timeout 5s;

    # 会话复用（性能优化，不影响前向保密）
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # 禁用Session Tickets（防TLS前向保密泄露）

    # ── 安全响应头（等保三级必选项）─────────────────────────────────────────
    # HSTS：强制HTTPS一年，含子域名，可提交preload列表
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # 禁止iframe嵌入（防点击劫持攻击）
    add_header X-Frame-Options "DENY" always;
    # 禁止浏览器MIME类型嗅探（防内容欺骗）
    add_header X-Content-Type-Options "nosniff" always;
    # 跨站脚本防护（现代浏览器已原生支持CSP，此头向后兼容老浏览器）
    add_header X-XSS-Protection "1; mode=block" always;
    # Referrer策略：跨域只传送来源域名，不泄露路径
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 权限策略：禁止页面使用摄像头/麦克风/定位/支付等敏感API
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # 内容安全策略（CSP）
    # 注意：'unsafe-inline' 用于支持现有React内联样式，后续可通过nonce方案加固
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── 请求大小与超时限制 ────────────────────────────────────────────────────
    client_max_body_size 10M;       # 上传文件限制10MB
    client_body_timeout 30s;        # 请求体接收超时
    client_header_timeout 15s;      # 请求头接收超时
    send_timeout 30s;               # 响应发送超时
    keepalive_timeout 65s;          # 长连接超时

    # ── 连接并发限制 ──────────────────────────────────────────────────────────
    limit_conn conn_limit 20;       # 单IP最大20个并发连接

    # ── Gzip 压缩 ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss font/ttf image/svg+xml;

    # ── 日志配置 ──────────────────────────────────────────────────────────────
    # 结合CLS日志方案，格式化为JSON便于解析（参考 docs/security-ops/cls-log-setup.md）
    access_log /var/log/nginx/txos-access.log combined;
    error_log  /var/log/nginx/txos-error.log warn;

    # ── API 路由 ──────────────────────────────────────────────────────────────

    # 认证接口（严格限速，防暴力破解）
    # 等保三级：账号锁定策略，5分钟内10次失败应触发告警
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://txos_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # 认证接口不缓存
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # 普通API接口
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://txos_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # 上游超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # 响应缓冲
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # WebSocket 接口（实时推送：折扣预警/出餐调度等Agent通知）
    location /ws/ {
        proxy_pass http://txos_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;   # WebSocket长连接保持1小时
    }

    # 静态文件（前端React应用）
    location / {
        root /var/www/txos;
        try_files $uri $uri/ /index.html;
        index index.html;

        # HTML文件：不缓存（确保SPA路由更新即时生效）
        location ~* \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires -1;
        }

        # 静态资源（带hash的文件名）：长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    # ── 安全拒绝规则 ──────────────────────────────────────────────────────────
    # 拒绝访问隐藏文件（.env/.git/.htaccess等）
    location ~ /\. {
        deny all;
        return 404;
    }

    # 拒绝常见漏洞扫描路径
    location ~* (phpMyAdmin|phpmyadmin|wp-admin|wordpress|xmlrpc\.php|\.php$) {
        deny all;
        return 404;
    }

    # 健康检查接口（仅允许内网和Tailscale访问，WAF层配置IP白名单）
    location /health {
        allow 127.0.0.1;
        allow 100.64.0.0/10;    # Tailscale地址段
        deny  all;
        proxy_pass http://txos_api;
    }
}

# ── 自定义错误页（避免泄露服务器信息）────────────────────────────────────────
# 在主server块内引用，或单独配置error_page
# error_page 429 /429.html;
# error_page 500 502 503 504 /50x.html;
