## TunxiangOS V3 — 灰度环境 Nginx 配置
## 灰度商户访问 gray-*.tunxiangos.com，共用生产数据库，跑新版本代码
## 端口 8081（内部），Nginx 主配置 proxy_pass 到这里

upstream gray_gateway {
    server gray-gateway:8000;
}

# ─── HTTP → HTTPS 重定向 ───
server {
    listen 80;
    server_name
        gray-pos.tunxiangos.com
        gray-kds.tunxiangos.com
        gray-os.tunxiangos.com
        gray-api.tunxiangos.com
        gray-m.tunxiangos.com;
    return 301 https://$host$request_uri;
}

# ─── 灰度标识（所有 gray server block 共用） ───
# 通过 header 标记灰度请求，方便日志分析和调试

# ─── gray-pos.tunxiangos.com — 灰度 POS ───
server {
    listen 443 ssl http2;
    server_name gray-pos.tunxiangos.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Environment "gray" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html/gray-web-pos;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location /api/ {
        proxy_pass http://gray_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Gray "true";
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }
}

# ─── gray-kds.tunxiangos.com — 灰度 KDS ───
server {
    listen 443 ssl http2;
    server_name gray-kds.tunxiangos.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Environment "gray" always;

    root /usr/share/nginx/html/gray-web-kds;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location /api/ {
        proxy_pass http://gray_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Gray "true";
        proxy_read_timeout 60s;
        client_max_body_size 5m;
    }

    location /ws/ {
        proxy_pass http://gray_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}

