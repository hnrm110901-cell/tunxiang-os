# 警告：此文件是模板，不包含真实值
# 真实Secret由 Harness Secret Manager 在部署时动态注入
# 绝对不要在此文件中填写真实凭证（架构安全红线）
#
# 使用方式：
#   1. 此模板仅用于说明Secret结构，不可直接apply到集群
#   2. Harness Pipeline在部署阶段通过 Harness Secret Manager 创建真实Secret
#   3. 各服务通过 secretRef.name 引用对应的Secret
#   4. 如需手动创建（仅限测试环境），使用 kubectl create secret generic 命令
#
# 参考：infra/k8s/README.md - Secret管理章节
---
# 通用应用Secret模板（按namespace部署，每个环境独立Secret）
apiVersion: v1
kind: Secret
metadata:
  name: tunxiang-app-secrets
  namespace: tunxiang-prod  # 按环境替换：tunxiang-dev/test/uat/pilot/prod/demo
  labels:
    app.kubernetes.io/part-of: tunxiang-os
    managed-by: harness
type: Opaque
stringData:
  # 数据库连接（腾讯云TencentDB for PostgreSQL）
  DATABASE_URL: "<REPLACED_BY_HARNESS>"
  # Redis连接（腾讯云Tendis/ElastiCache）
  REDIS_URL: "<REPLACED_BY_HARNESS>"
  # JWT签名密钥
  JWT_SECRET: "<REPLACED_BY_HARNESS>"
  # Supabase服务密钥
  SUPABASE_SERVICE_KEY: "<REPLACED_BY_HARNESS>"
  # Claude API密钥（tx-brain/tx-agent使用）
  LLM_API_KEY: "<REPLACED_BY_HARNESS>"
  ANTHROPIC_API_KEY: "<REPLACED_BY_HARNESS>"
  # 企业微信应用Secret（tx-org/tx-agent使用）
  WECOM_APP_SECRET: "<REPLACED_BY_HARNESS>"
  # 短信API密钥（tx-member营销推送使用）
  SMS_API_KEY: "<REPLACED_BY_HARNESS>"
---
# api-gateway专用Secret模板
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: tunxiang-prod
  labels:
    app.kubernetes.io/part-of: tunxiang-os
    managed-by: harness
type: Opaque
stringData:
  DB_URL: "<REPLACED_BY_HARNESS>"
  REDIS_URL: "<REPLACED_BY_HARNESS>"
  JWT_SECRET: "<REPLACED_BY_HARNESS>"
  SUPABASE_SERVICE_KEY: "<REPLACED_BY_HARNESS>"
---
# tx-trade专用Secret模板（交易核心，最高安全级别）
apiVersion: v1
kind: Secret
metadata:
  name: tx-trade-secret
  namespace: tunxiang-prod
  labels:
    app.kubernetes.io/part-of: tunxiang-os
    managed-by: harness
type: Opaque
stringData:
  DB_URL: "<REPLACED_BY_HARNESS>"
  REDIS_URL: "<REPLACED_BY_HARNESS>"
  JWT_SECRET: "<REPLACED_BY_HARNESS>"
  SUPABASE_SERVICE_KEY: "<REPLACED_BY_HARNESS>"
