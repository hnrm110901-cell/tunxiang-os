global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: tunxiang-prod
    env: prod

rule_files:
  - /etc/prometheus/rules/*.yml

# 屯象OS 后端服务 metrics
#
# 端口表 authoritative source: CLAUDE.md §5 (lines 107-127)
# CI 漂移防御: .github/workflows/prometheus-port-audit.yml + scripts/ci/check_prometheus_ports.py
#
# 历史漂移 (#809) 已由 PR #820 Phase B 系统性修正; 8 mismatch port 改对 + 6 missing 补齐。
# 例外:
#   - mcp-server (8018): stdio MCP protocol, 无 HTTP /metrics endpoint, 不 scrape
#   - tx-predict (8019): Dockerfile EXPOSE 8013 与 tx-forge 冲突, prometheus 以 CLAUDE.md
#     §5 8019 为准; Dockerfile bug 留 #820-P follow-up
#   - web-admin: nginx-only frontend, 无 /metrics
#
# ─── issue #825 metrics 鉴权 (W3 D2 P1) ──────────────────────────────────
# MetricsAuthMiddleware (shared/middleware/src/metrics_auth.py) 提供 /metrics 多层鉴权:
#   - Bearer token (Authorization: Bearer header) → timing-safe hmac.compare_digest
#   - IP allowlist (CIDR) → 内网段默认 + k8s pod CIDR
#   - XFF spoof 防御 (round-2): 默认拒 X-Forwarded-For, 仅 PROMETHEUS_TRUST_XFF=true
#     + direct IP ∈ PROMETHEUS_TRUSTED_PROXIES 时才信
# Prometheus pod 启动时挂 Secret tx-metrics-token 到 /etc/prometheus/secrets/
# (Helm chart 部署改造 follow-up issue).
#
# 当前 ready (authorization 已加): 全部 emit_event 14 svc — 决策矩阵分母覆盖率 100% (issue #829 ship)
# (gateway + tx-trade + tx-event-relay = PR #826; 其余 13 svc = PR #829)
#
# 本 yml 用 Prometheus 原生 `authorization: type: Bearer` 配置, 自动发 Authorization 头.
# 实际生效需 Helm chart Secret 挂载 /etc/prometheus/secrets/tx-metrics-token (follow-up).

scrape_configs:
  - job_name: 'tunxiang-gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/tx-metrics-token

  - job_name: 'tunxiang-tx-trade'
    static_configs:
      - targets: ['tx-trade:8001']
    metrics_path: '/metrics'
