global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: tunxiang-prod
    env: prod

rule_files:
  - /etc/prometheus/rules/*.yml

# ─── issue #825 metrics 鉴权 (W3 D2 P1) ──────────────────────────────────
# 全 12+ 服务 /metrics 端点已挂 (本 PR scope) / 计划挂 MetricsAuthMiddleware:
#   - Bearer token (X-Prometheus-Token header) → timing-safe hmac.compare_digest
#   - IP allowlist (CIDR) → 内网段默认 + k8s pod CIDR
# Prometheus pod 启动时挂 Secret tx-metrics-token 到 /etc/prometheus/secrets/
# (Helm chart 部署改造 follow-up issue).
#
# 当前 ready: gateway + tx-event-relay + tx-trade (本 PR scope, authorization 已加)
# follow-up: 其他 9+ 服务 — 见 issue #825 follow-up (其他 9 服务挂 MetricsAuthMiddleware)
#
# ⚠️ MetricsAuthMiddleware 接受两种 header (二选一):
#   - X-Prometheus-Token (专用, 优先级高)
#   - Authorization: Bearer (Prometheus 原生 `authorization: type: Bearer` 自动发送)
# 本 yml 用 Prometheus 原生 Bearer 配置, 等同 Authorization: Bearer header.
# 实际生效需 Helm chart Secret 挂载 /etc/prometheus/secrets/tx-metrics-token (follow-up).

scrape_configs:
  # 屯象OS 后端服务 metrics — 本 PR ready (3 svc, /metrics 已挂 MetricsAuthMiddleware)
  - job_name: 'tunxiang-gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/tx-metrics-token

  - job_name: 'tunxiang-tx-trade'
    static_configs:
      - targets: ['tx-trade:8001']
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/tx-metrics-token

  - job_name: 'tunxiang-tx-member'
    static_configs:
      - targets: ['tx-member:8002']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-growth'
    static_configs:
      - targets: ['tx-growth:8003']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-org'
    static_configs:
      - targets: ['tx-org:8004']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-ops'
    static_configs:
      - targets: ['tx-ops:8005']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-finance'
    static_configs:
      - targets: ['tx-finance:8006']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-analytics'
    static_configs:
      - targets: ['tx-analytics:8007']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-agent'
    static_configs:
      - targets: ['tx-agent:8008']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-menu'
    static_configs:
      - targets: ['tx-menu:8009']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-supply'
    static_configs:
      - targets: ['tx-supply:8010']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-intel'
    static_configs:
      - targets: ['tx-intel:8011']
    metrics_path: '/metrics'

  - job_name: 'tunxiang-tx-brain'
    static_configs:
      - targets: ['tx-brain:8012']
    metrics_path: '/metrics'

  # tx-event-relay — 真 Outbox relay worker (P0-4 hotfix #805 三 audit)
  # ⚠️ 历史 stale port 漂移 (gateway/tx-trade/... 部分 :8000-8012 不与 CLAUDE.md §5
  # 真实端口对齐) 留 #809 系统性 audit, 本 hotfix 仅补 tx-sync-worker / tx-event-relay
  # /metrics 已挂 MetricsAuthMiddleware (issue #825, 本 PR scope)
  - job_name: 'tunxiang-tx-event-relay'
    static_configs:
      - targets: ['tx-event-relay:8020']
    metrics_path: '/metrics'
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/tx-metrics-token

  # tx-sync-worker — 品智POS 同步 + 企微 daily SOP daemon (P0-4 hotfix #805)
  - job_name: 'tunxiang-tx-sync-worker'
    static_configs:
      - targets: ['tx-sync-worker:8021']
    metrics_path: '/metrics'

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # PostgreSQL metrics
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
