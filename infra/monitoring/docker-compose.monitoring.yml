version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: tunxiang-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - tunxiang-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: tunxiang-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=tunxiang2024  # 开发环境用，生产请改为Secret管理
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_FEATURE_TOGGLES_ENABLE=ngalert
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: tunxiang-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
      # 如果Redis有密码：
      # - REDIS_PASSWORD=your_redis_password
    ports:
      - "9121:9121"
    networks:
      - monitoring
      - tunxiang-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: tunxiang-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://tunxiang:password@postgres:5432/tunxiang?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - monitoring
      - tunxiang-net

networks:
  monitoring:
    driver: bridge
  tunxiang-net:
    external: true
    name: tunxiang-net

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
