# Grafana provisioning — dashboard 自动加载配置
#
# 容器启动时 Grafana 扫描 `/var/lib/grafana/dashboards/` (compose mount 来源:
# `./grafana/dashboards`) 内所有 *.json, 按本 yaml 注册到 General folder.
#
# 覆盖范围 (5/18 起 3 个):
#   - tunxiang-overview.json      — 服务 UP/DOWN / QPS / P99 / Redis / LLM
#   - tunxiang-agents.json        — Agent 体系 L1/L2/L3 执行率
#   - tx-sync-worker-reconciliation.json — sync_logs 7d 对账 (W3 D3 Prep-3)
#
# Refs:
#   - docker-compose.monitoring.yml:38 mount /etc/grafana/provisioning
#   - Grafana provisioning docs https://grafana.com/docs/grafana/latest/administration/provisioning/

apiVersion: 1

providers:
  - name: tunxiang-os
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
