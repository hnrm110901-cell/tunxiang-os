# ============================================================
# 屯象OS 开发环境 Docker Compose
# 用法: docker compose -f docker-compose.dev.yml up
# 特点: 源码热重载、端口全暴露、认证/限速关闭
# ============================================================

x-service-common: &service-common
  restart: unless-stopped
  env_file: .env
  environment: &common-env
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD:-changeme_dev}@postgres:5432/${POSTGRES_DB:-tunxiang_os}
    REDIS_URL: redis://redis:6379/0
    TX_ENV: dev
    TX_AUTH_ENABLED: "false"
    TX_RATE_LIMIT_ENABLED: "false"
    LOG_LEVEL: DEBUG
    PYTHONPATH: /app
    PYTHONUNBUFFERED: "1"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - txos-dev

services:
  # ── 基础设施 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tunxiang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
      POSTGRES_DB: ${POSTGRES_DB:-tunxiang_os}
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
      - ./init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/02-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tunxiang}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - txos-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - txos-dev

  # ── 16 微服务（hot-reload + 源码挂载）─────────────────────
  gateway:
    <<: *service-common
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install -q -i https://pypi.tuna.tsinghua.edu.cn/simple -r services/gateway/requirements.txt &&
             uvicorn services.gateway.src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ../../services/gateway:/app/services/gateway
      - ../../shared:/app/shared

  tx-trade:
    <<: *service-common
    image: python:3.11-slim
    working_dir: /app
    command: >
