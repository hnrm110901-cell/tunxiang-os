  # ── 前端 Vite Dev Server ──────────────────────────────────
  web-admin:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm config set registry https://registry.npmmirror.com && npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../../apps/web-admin:/app
      - web_admin_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    networks:
      - txos-dev

  web-pos:
