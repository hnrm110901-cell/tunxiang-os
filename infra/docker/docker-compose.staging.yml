# ============================================================
# 屯象OS Staging 环境 Docker Compose
# 用法: docker compose -f docker-compose.staging.yml up -d
# 特点: 镜像构建运行、Nginx反代、认证开启、独立持久化卷
# ============================================================

x-service-common: &service-common
  restart: unless-stopped
  env_file: .env
  environment: &common-env
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://redis:6379/0
    TX_ENV: staging
    TX_AUTH_ENABLED: "true"
    TX_RATE_LIMIT_ENABLED: "true"
    LOG_LEVEL: INFO
    PYTHONPATH: /app
    PYTHONUNBUFFERED: "1"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - txos-staging

x-build-python: &build-python
  context: ../..
  dockerfile: infra/docker/Dockerfile.python

services:
  # ── 基础设施 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_staging_data:/var/lib/postgresql/data
      - ./init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - txos-staging

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - txos-staging

  # ── Nginx 反向代理 ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_staging_logs:/var/log/nginx
    depends_on:
      - gateway
    networks:
      - txos-staging

  # ── 16 微服务（镜像构建）──────────────────────────────────
  gateway:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: "8000"
    networks:
      - txos-staging

  tx-trade:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-trade
        SERVICE_PORT: "8001"
    networks:
      - txos-staging

  tx-menu:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-menu
        SERVICE_PORT: "8002"
    networks:
      - txos-staging

  tx-member:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-member
        SERVICE_PORT: "8003"
    networks:
      - txos-staging

  tx-growth:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-growth
        SERVICE_PORT: "8004"
    networks:
      - txos-staging

  tx-ops:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-ops
        SERVICE_PORT: "8005"
    networks:
      - txos-staging

  tx-supply:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-supply
        SERVICE_PORT: "8006"
    networks:
      - txos-staging

  tx-finance:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-finance
        SERVICE_PORT: "8007"
    networks:
      - txos-staging

  tx-agent:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-agent
        SERVICE_PORT: "8008"
    networks:
      - txos-staging

  tx-analytics:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-analytics
        SERVICE_PORT: "8009"
    networks:
      - txos-staging

  tx-brain:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-brain
        SERVICE_PORT: "8010"
    networks:
      - txos-staging

  tx-intel:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-intel
        SERVICE_PORT: "8011"
    networks:
      - txos-staging

  tx-org:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tx-org
        SERVICE_PORT: "8012"
    networks:
      - txos-staging

  tunxiang-api:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: tunxiang-api
        SERVICE_PORT: "8013"
    networks:
      - txos-staging

  mcp-server:
    <<: *service-common
    build:
      <<: *build-python
      args:
        SERVICE_NAME: mcp-server
        SERVICE_PORT: "8014"
    networks:
      - txos-staging

  # ── 前端应用（构建镜像）──────────────────────────────────
  web-admin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: web-admin
    restart: unless-stopped
    networks:
      - txos-staging

  web-pos:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: web-pos
    restart: unless-stopped
    networks:
      - txos-staging

  web-kds:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        APP_NAME: web-kds
    restart: unless-stopped
    networks:
      - txos-staging

volumes:
  pg_staging_data:
  redis_staging_data:
  nginx_staging_logs:

networks:
  txos-staging:
    driver: bridge
