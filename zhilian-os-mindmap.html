<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智链OS — 产品架构及功能明细思维导图</title>
<style>
  :root {
    --bg: #0B1120;
    --bg2: #111827;
    --bg3: #1F2937;
    --border: #374151;
    --t1: rgba(255,255,255,.92);
    --t2: rgba(255,255,255,.68);
    --t3: rgba(255,255,255,.45);
    --accent: #0AAF9A;
    --accent2: #06D6A0;
    --orange: #FF6B2C;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --pink: #EC4899;
    --yellow: #F59E0B;
    --red: #EF4444;
    --cyan: #06B6D4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg);
    color: var(--t1);
    overflow: hidden;
    height: 100vh;
  }

  /* ── Header ── */
  .header {
    position: fixed; top:0; left:0; right:0; z-index:100;
    background: rgba(11,17,32,.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .subtitle { font-size: 12px; color: var(--t3); margin-left: 12px; }
  .header .stats { display:flex; gap:16px; }
  .header .stat {
    font-size: 11px; color: var(--t3);
    display: flex; align-items: center; gap: 4px;
  }
  .header .stat b { color: var(--accent); font-size: 14px; }

  /* ── Controls ── */
  .controls {
    position: fixed; top: 56px; left: 0; right: 0; z-index: 99;
    background: rgba(17,24,39,.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .controls button {
    padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--t2); font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .controls .search-box {
    flex:1; max-width: 280px; padding: 5px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--t1);
    font-size: 12px; outline: none;
  }
  .controls .search-box:focus { border-color: var(--accent); }
  .controls .search-box::placeholder { color: var(--t3); }
  .legend { display:flex; gap: 10px; margin-left: auto; }
  .legend span {
    display:flex; align-items:center; gap:4px; font-size:11px; color:var(--t3);
  }
  .legend span i {
    display:inline-block; width:10px; height:10px; border-radius:50%;
  }

  /* ── Mind Map Container ── */
  #mindmap {
    position: fixed;
    top: 100px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #mindmap:active { cursor: grabbing; }

  svg { width: 100%; height: 100%; }

  /* ── Node styles ── */
  .node { cursor: pointer; }
  .node text {
    font-family: 'Noto Sans SC', sans-serif;
    fill: var(--t1);
    font-size: 12px;
  }
  .node .label-bg {
    fill: var(--bg2);
    stroke: var(--border);
    stroke-width: 1;
    rx: 6; ry: 6;
  }
  .node:hover .label-bg { stroke: var(--accent); stroke-width: 1.5; }
  .node .badge {
    font-size: 9px; fill: var(--t3);
  }
  .node .desc {
    font-size: 10px; fill: var(--t3);
  }
  .node .toggle-circle {
    fill: var(--bg3); stroke: var(--accent); stroke-width: 1.5;
    cursor: pointer;
  }
  .node .toggle-text {
    fill: var(--accent); font-size: 10px; font-weight: 700;
    text-anchor: middle; dominant-baseline: central;
    pointer-events: none;
  }

  .link {
    fill: none;
    stroke: var(--border);
    stroke-width: 1.2;
    stroke-opacity: 0.5;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed; z-index: 200;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    pointer-events: none;
    display: none;
    font-size: 12px;
    line-height: 1.6;
  }
  .tooltip .tt-title { font-weight:700; color:var(--accent); margin-bottom:4px; }
  .tooltip .tt-desc { color:var(--t2); }
  .tooltip .tt-meta { color:var(--t3); font-size:11px; margin-top:6px; border-top:1px solid var(--border); padding-top:6px; }

  /* ── Detail Panel ── */
  .detail-panel {
    position: fixed; top:100px; right:0; bottom:0; width:380px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 50;
    transform: translateX(100%);
    transition: transform .3s ease;
    overflow-y: auto;
    padding: 20px;
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-panel .dp-close {
    position:absolute; top:12px; right:12px;
    background:none; border:none; color:var(--t3); font-size:18px; cursor:pointer;
  }
  .detail-panel h3 { font-size:16px; color:var(--accent); margin-bottom:8px; }
  .detail-panel .dp-path { font-size:11px; color:var(--t3); margin-bottom:12px; font-family:monospace; }
  .detail-panel .dp-desc { font-size:13px; color:var(--t2); line-height:1.7; margin-bottom:16px; }
  .detail-panel .dp-children { list-style:none; }
  .detail-panel .dp-children li {
    padding:6px 0; border-bottom:1px solid rgba(55,65,81,.5);
    font-size:12px; color:var(--t2);
    display:flex; align-items:flex-start; gap:8px;
  }
  .detail-panel .dp-children li .dot {
    width:6px; height:6px; border-radius:50%; margin-top:5px; flex-shrink:0;
  }
  .detail-panel .dp-tag {
    display:inline-block; padding:2px 8px; border-radius:4px;
    font-size:10px; margin-right:4px; margin-bottom:4px;
  }

  /* ── Mini-map ── */
  .minimap {
    position:fixed; bottom:16px; right:16px; z-index:80;
    width:180px; height:120px;
    background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    overflow:hidden; opacity:.7;
  }
  .minimap:hover { opacity:1; }
  .minimap svg { width:100%; height:100%; }
  .minimap .viewport {
    fill:rgba(10,175,154,.15); stroke:var(--accent); stroke-width:1;
  }

  /* ── Breadcrumb ── */
  .breadcrumb {
    position:fixed; bottom:16px; left:16px; z-index:80;
    display:flex; gap:4px; align-items:center;
    font-size:11px; color:var(--t3);
  }
  .breadcrumb span { cursor:pointer; }
  .breadcrumb span:hover { color:var(--accent); }
  .breadcrumb .sep { color:var(--border); margin:0 2px; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:baseline;">

  </div>

  <div class="legend">

// ══════════════════════════════════════════════════════════════════════════════
// D3-like Tree Layout (Pure JS, no dependency)
// ══════════════════════════════════════════════════════════════════════════════

const COLORS = {
  "#0AAF9A": "var(--accent)", "#3B82F6": "var(--blue)", "#8B5CF6": "var(--purple)",
  "#FF6B2C": "var(--orange)", "#EC4899": "var(--pink)", "#F59E0B": "var(--yellow)",
  "#06D6A0": "var(--accent2)", "#06B6D4": "var(--cyan)", "#EF4444": "var(--red)",
};

let svg, g, zoom;
let root;
let nodeId = 0;
let duration = 400;
const nodeH = 32, nodeGapV = 6, nodeGapH = 260;
let searchTerm = '';

// Count stats
function countNodes(node, stats) {
  if (!stats) stats = { svc:0, model:0, api:0, agent:0, page:0, task:0 };
  const n = (node.name || '').toLowerCase();
  const d = (node.desc || '').toLowerCase();
  if (d.includes('service') || d.includes('_service')) stats.svc++;
  if (d.includes('模型') || d.includes('表)') || d.includes('张表')) stats.model++;
  if (d.includes('端点') || d.includes('api')) stats.api++;
  if (n.includes('agent') || d.includes('agent')) stats.agent++;
  if (n.includes('page') || d.includes('page') || d.includes('页面') || d.includes('页')) stats.page++;
  if (d.includes('celery') || d.includes('beat') || d.includes('每') || n.includes('定时')) stats.task++;
  if (node.children) node.children.forEach(c => countNodes(c, stats));
  return stats;
}

function init() {
  const container = document.getElementById('mindmap');
  const w = container.clientWidth, h = container.clientHeight;

  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.setAttribute('width', w);
  svgEl.setAttribute('height', h);
  container.appendChild(svgEl);
  svg = svgEl;

  const gEl = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  gEl.setAttribute('id', 'tree-group');
  svg.appendChild(gEl);
  g = gEl;

  // Pan & Zoom
  let viewX = 80, viewY = h/2, scale = 0.85;
  function applyTransform() {
    g.setAttribute('transform', `translate(${viewX},${viewY}) scale(${scale})`);
  }
  applyTransform();

  let dragging = false, lastX, lastY;
  container.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; });
  container.addEventListener('mousemove', e => {
    if(!dragging) return;
    viewX += e.clientX - lastX;
    viewY += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    applyTransform();
  });
  container.addEventListener('mouseup', () => dragging=false);
  container.addEventListener('mouseleave', () => dragging=false);
  container.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    scale = Math.max(0.15, Math.min(3, scale * delta));
    applyTransform();
  }, {passive:false});

  window._resetView = () => { viewX=80; viewY=h/2; scale=0.85; applyTransform(); };

  // Build tree
  root = buildTree(DATA, null, 0);
  // collapse level > 2
  collapseBelow(root, 2);
  render();

  // Stats
  const stats = countNodes(DATA);
  document.getElementById('stat-svc').textContent = '211';
  document.getElementById('stat-model').textContent = '73';
  document.getElementById('stat-api').textContent = '155';
  document.getElementById('stat-agent').textContent = '17';
  document.getElementById('stat-page').textContent = '166';
  document.getElementById('stat-task').textContent = '45';
}

function buildTree(data, parent, depth) {
  const node = {
    id: nodeId++,
    name: data.name,
    desc: data.desc || '',
    meta: data.meta || '',
    color: data.color || (parent ? parent.color : '#0AAF9A'),
    depth: depth,
    parent: parent,
    _children: null,
    children: null,
    x: 0, y: 0,
  };
  if (data.children && data.children.length > 0) {
    node.children = data.children.map(c => buildTree(c, node, depth+1));
    node._allChildren = node.children;
  }
  return node;
}

function collapseBelow(node, maxDepth) {
  if (!node.children) return;
  if (node.depth >= maxDepth) {
    node._children = node.children;
    node.children = null;
  } else {
    node.children.forEach(c => collapseBelow(c, maxDepth));
  }
}

function expandBelow(node, maxDepth) {
  if (node._children) {
    if (node.depth < maxDepth) {
      node.children = node._children;
      node._children = null;
    }
  }
  if (node.children) {
    node.children.forEach(c => expandBelow(c, maxDepth));
  }
}

function expandAllNode(node) {
  if (node._children) { node.children = node._children; node._children = null; }
  if (node.children) node.children.forEach(expandAllNode);
}
function collapseAllNode(node) {
  if (node.children && node.depth > 0) {
    node._children = node.children;
    node.children = null;
  }
  if (node._children) node._children.forEach(collapseAllNode);
}

function toggleNode(node) {
  if (node.children) {
    node._children = node.children;
    node.children = null;
  } else if (node._children) {
    node.children = node._children;
    node._children = null;
  }
  render();
}

// Layout: compute x,y for each node
function layoutTree(node) {
  let allNodes = [];
  let y = 0;

  function walk(n, depth) {
    n.depth = depth;
    n.x = depth * nodeGapH;
    if (!n.children || n.children.length === 0) {
      n.y = y;
      y += nodeH + nodeGapV;
      allNodes.push(n);
      return;
    }
    let firstY, lastY;
    n.children.forEach((c, i) => {
      walk(c, depth + 1);
      if (i === 0) firstY = c.y;
      lastY = c.y;
    });
    n.y = (firstY + lastY) / 2;
    allNodes.push(n);
  }
  walk(node, 0);
  return allNodes;
}

function render() {
  const allNodes = layoutTree(root);

  // Clear
  while (g.firstChild) g.removeChild(g.firstChild);

  // Links
  allNodes.forEach(n => {
    if (n.children) {
      n.children.forEach(c => {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const textW = getTextWidth(n.name, n.depth) + 24;
        const sx = n.x + textW;
        const sy = n.y + nodeH/2;
        const tx = c.x;
        const ty = c.y + nodeH/2;
        const mx = (sx + tx) / 2;
        path.setAttribute('d', `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`);
        path.setAttribute('class', 'link');
        path.setAttribute('stroke', n.color || '#374151');
        path.setAttribute('stroke-opacity', '0.3');
        g.appendChild(path);
      });
    }
  });

  // Nodes
  allNodes.forEach(n => {
    const gNode = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    gNode.setAttribute('class', 'node');
    gNode.setAttribute('transform', `translate(${n.x},${n.y})`);

    const isMatch = searchTerm && (n.name.toLowerCase().includes(searchTerm) || n.desc.toLowerCase().includes(searchTerm));
    const textW = getTextWidth(n.name, n.depth) + 24;
    const h = nodeH;

    // Background rect
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('class', 'label-bg');
    rect.setAttribute('width', textW);
    rect.setAttribute('height', h);
    rect.setAttribute('rx', 6);
    if (isMatch) {
      rect.setAttribute('stroke', '#F59E0B');
      rect.setAttribute('stroke-width', 2);
      rect.setAttribute('fill', 'rgba(245,158,11,.1)');
    } else {
      rect.setAttribute('fill', n.depth === 0 ? 'rgba(10,175,154,.12)' : 'var(--bg2)');
    }
    gNode.appendChild(rect);

    // Color bar
    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bar.setAttribute('x', 0); bar.setAttribute('y', 0);
    bar.setAttribute('width', 3); bar.setAttribute('height', h);
    bar.setAttribute('rx', 1.5);
    bar.setAttribute('fill', n.color || '#374151');
    gNode.appendChild(bar);

    // Text
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', 14);
    text.setAttribute('y', h/2 + 1);
    text.setAttribute('dominant-baseline', 'central');
    text.setAttribute('font-size', n.depth === 0 ? 15 : n.depth === 1 ? 13 : 12);
    text.setAttribute('font-weight', n.depth <= 1 ? '700' : '400');
    text.setAttribute('fill', n.depth === 0 ? '#0AAF9A' : 'var(--t1)');
    text.textContent = n.name;
    gNode.appendChild(text);

    // Child count badge
    const childCount = (n.children ? n.children.length : 0) + (n._children ? n._children.length : 0);
    if (childCount > 0) {
      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      badge.setAttribute('x', textW - 8);
      badge.setAttribute('y', h/2 + 1);
      badge.setAttribute('dominant-baseline', 'central');
      badge.setAttribute('text-anchor', 'end');
      badge.setAttribute('class', 'badge');
      badge.setAttribute('fill', n.color || 'var(--t3)');
      badge.textContent = childCount;
      gNode.appendChild(badge);
    }

    // Toggle button
    if (n._children || n.children) {
      const hasHidden = !!n._children;
      const cx = textW + 14;
      const cy = h / 2;
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', cy);
      circle.setAttribute('r', 8);
      circle.setAttribute('class', 'toggle-circle');
      circle.setAttribute('fill', hasHidden ? 'rgba(10,175,154,.15)' : 'var(--bg3)');
      gNode.appendChild(circle);

      const tText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      tText.setAttribute('x', cx);
      tText.setAttribute('y', cy);
      tText.setAttribute('class', 'toggle-text');
      tText.textContent = hasHidden ? '+' : '−';
      gNode.appendChild(tText);

      circle.addEventListener('click', e => { e.stopPropagation(); toggleNode(n); });
    }

    // Hover → tooltip
    gNode.addEventListener('mouseenter', e => showTooltip(e, n));
    gNode.addEventListener('mouseleave', hideTooltip);
    // Click → detail
    gNode.addEventListener('click', () => showDetail(n));

    g.appendChild(gNode);
  });
}

function getTextWidth(text, depth) {
  const fontSize = depth === 0 ? 15 : depth === 1 ? 13 : 12;
  // rough CJK char width estimation
  let w = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text.charCodeAt(i);
    w += c > 127 ? fontSize * 1.05 : fontSize * 0.62;
  }
  return Math.max(w + 16, 60);
}

function showTooltip(e, node) {
  if (!node.desc && !node.meta) return;
  const tt = document.getElementById('tooltip');
  let html = `<div class="tt-title">${node.name}</div>`;
  if (node.desc) html += `<div class="tt-desc">${node.desc}</div>`;
  if (node.meta) html += `<div class="tt-meta">${node.meta}</div>`;
  tt.innerHTML = html;
  tt.style.display = 'block';
  tt.style.left = Math.min(e.clientX + 16, window.innerWidth - 400) + 'px';
  tt.style.top = Math.min(e.clientY - 10, window.innerHeight - 200) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function showDetail(node) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  // Build breadcrumb path
  let path = [];
  let p = node;
  while(p) { path.unshift(p.name); p = p.parent; }

  let html = `<h3>${node.name}</h3>`;
  html += `<div class="dp-path">${path.join(' → ')}</div>`;
  if (node.desc) html += `<div class="dp-desc">${node.desc}</div>`;
  if (node.meta) html += `<div class="dp-desc" style="color:var(--accent);font-size:12px;margin-bottom:12px">${node.meta}</div>`;

  const kids = node.children || node._children;
  if (kids && kids.length > 0) {
    html += `<h4 style="font-size:13px;color:var(--t2);margin:12px 0 8px">子节点 (${kids.length})</h4>`;
    html += '<ul class="dp-children">';
    kids.forEach(c => {
      html += `<li><span class="dot" style="background:${c.color || node.color}"></span><div><b style="color:var(--t1)">${c.name}</b>`;
      if (c.desc) html += `<br><span style="color:var(--t3);font-size:11px">${c.desc}</span>`;
      const gc = (c.children || c._children);
      if (gc && gc.length > 0) html += `<br><span style="color:${c.color || node.color};font-size:10px">${gc.length} 个子项</span>`;
      html += '</div></li>';
    });
    html += '</ul>';
  }

  content.innerHTML = html;
  panel.classList.add('open');

  // Breadcrumb
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = path.map((p,i) => `<span>${p}</span>${i < path.length-1 ? '<span class="sep">›</span>' : ''}`).join('');
}
function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

// Controls
function expandAll() { expandAllNode(root); render(); }
function collapseAll() { collapseAllNode(root); render(); }
function expandLevel(n) { collapseAllNode(root); expandBelow(root, n); render(); }
function resetView() { window._resetView(); collapseAllNode(root); expandBelow(root, 2); render(); }
function searchNodes(term) {
  searchTerm = term.toLowerCase().trim();
  if (searchTerm) {
    // expand all to show matches
    expandAllNode(root);
  }
  render();
}

// Init
window.addEventListener('load', init);
window.addEventListener('resize', () => {
  svg.setAttribute('width', svg.parentElement.clientWidth);
  svg.setAttribute('height', svg.parentElement.clientHeight);
});
</script>
