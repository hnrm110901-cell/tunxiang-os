trigger:
  name: trigger-pr-tx-member
  identifier: trigger_pr_tx_member
  projectIdentifier: TunXiangOS
  orgIdentifier: default
  description: "tx-member 服务 PR 触发器。PR opened/synchronize 时触发 ci_tx_member 流水线。"
  tags:
    service: tx-member
    event: pr
  enabled: true
  pipelineIdentifier: ci_tx_member
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: PullRequest
        spec:
          connectorRef: github_connector
          repoName: tunxiang-os
          autoAbortPreviousExecutions: true
          payloadConditions:
            - key: targetBranch
              operator: In
              value: main,develop
          headerConditions: []
          jexlCondition: ""
          actions:
            - opened
            - synchronize
            - reopened
  inputYaml: |
    pipeline:
      identifier: ci_tx_member
      properties:
        ci:
          codebase:
            build:
              type: PR
              spec:
                number: <+trigger.prNumber>
