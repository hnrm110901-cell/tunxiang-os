trigger:
  name: trigger-main-tx-finance
  identifier: trigger_main_tx_finance
  projectIdentifier: TunXiangOS
  orgIdentifier: default
  description: "tx-finance 服务 main 分支推送触发器。push to main 时触发 cd_tx_finance 流水线（部署到 dev/test/uat）。"
  tags:
    service: tx-finance
    event: push-main
  enabled: true
  pipelineIdentifier: cd_tx_finance
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: Push
        spec:
          connectorRef: github_connector
          repoName: tunxiang-os
          autoAbortPreviousExecutions: false
          payloadConditions:
            - key: targetBranch
              operator: Equals
              value: main
          headerConditions: []
          jexlCondition: ""
          actions: []
  inputYaml: |
    pipeline:
      identifier: cd_tx_finance
      properties:
        ci:
          codebase:
            build:
              type: branch
              spec:
                branch: main
