trigger:
  name: trigger-pr-web-kds
  identifier: trigger_pr_web_kds
  projectIdentifier: TunXiangOS
  orgIdentifier: default
  description: "web-kds Kitchen Display System前端 PR 触发器。PR opened/synchronize 时触发 ci_web_kds 流水线。"
  tags:
    service: web-kds
    event: pr
  enabled: true
  pipelineIdentifier: ci_web_kds
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: PullRequest
        spec:
          connectorRef: github_connector
          repoName: tunxiang-os
          autoAbortPreviousExecutions: true
          payloadConditions:
            - key: targetBranch
              operator: In
              value: main,develop
          headerConditions: []
          jexlCondition: ""
          actions:
            - opened
            - synchronize
            - reopened
  inputYaml: |
    pipeline:
      identifier: ci_web_kds
      properties:
        ci:
          codebase:
            build:
              type: PR
              spec:
                number: <+trigger.prNumber>
