trigger:
  name: trigger-main-api-gateway
  identifier: trigger_main_api_gateway
  projectIdentifier: TunXiangOS
  orgIdentifier: default
  description: "gateway 服务 main 分支推送触发器。push to main 时触发 cd_api_gateway 流水线（部署到 staging）。"
  tags:
    service: api-gateway
    event: push-main
  enabled: true
  pipelineIdentifier: cd_api_gateway
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: Push
        spec:
          connectorRef: github_connector
          repoName: tunxiang-os
          autoAbortPreviousExecutions: false
          payloadConditions:
            - key: targetBranch
              operator: Equals
              value: main
          headerConditions: []
          jexlCondition: ""
          actions: []
  inputYaml: |
    pipeline:
      identifier: cd_api_gateway
      properties:
        ci:
          codebase:
            build:
              type: branch
              spec:
                branch: main
