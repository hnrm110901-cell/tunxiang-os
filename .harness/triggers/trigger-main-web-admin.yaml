trigger:
  name: trigger-main-web-admin
  identifier: trigger_main_web_admin
  projectIdentifier: TunXiangOS
  orgIdentifier: default
  description: "web-admin 前端 main 分支推送触发器。push to main 时触发 cd_web_admin 流水线（部署到 staging）。"
  tags:
    service: web-admin
    event: push-main
  enabled: true
  pipelineIdentifier: cd_web_admin
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: Push
        spec:
          connectorRef: github_connector
          repoName: tunxiang-os
          autoAbortPreviousExecutions: false
          payloadConditions:
            - key: targetBranch
              operator: Equals
              value: main
          headerConditions: []
          jexlCondition: ""
          actions: []
  inputYaml: |
    pipeline:
      identifier: cd_web_admin
      properties:
        ci:
          codebase:
            build:
              type: branch
              spec:
                branch: main
