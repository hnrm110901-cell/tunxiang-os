trigger:
  name: trigger-tag-release-api-gateway
  identifier: trigger_tag_release_api_gateway
  projectIdentifier: TunXiangOS
  orgIdentifier: default
  description: "gateway 服务 Tag 发版触发器。匹配 v*.*.* 格式的 tag 推送时触发 release_api_gateway_prod 流水线（生产发版）。"
  tags:
    service: api-gateway
    event: tag-release
  enabled: true
  pipelineIdentifier: release_api_gateway_prod
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: Push
        spec:
          connectorRef: github_connector
          repoName: tunxiang-os
          autoAbortPreviousExecutions: false
          payloadConditions:
            - key: <+trigger.payload.ref>
              operator: Regex
              value: "^refs/tags/v\\d+\\.\\d+\\.\\d+$"
          headerConditions: []
          jexlCondition: ""
          actions: []
  inputYaml: |
    pipeline:
      identifier: release_api_gateway_prod
      properties:
        ci:
          codebase:
            build:
              type: tag
              spec:
                tag: <+trigger.tag>
