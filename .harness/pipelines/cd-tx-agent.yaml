pipeline:
  name: cd-tx-agent
  identifier: cd_tx_agent
  projectIdentifier: TunXiangOS
  orgIdentifier: default
  description: "TX Agent Dev / Test / UAT 持续交付流水线（含 DB 迁移门禁）"
  tags:
    service: tx-agent
    track: cd

  properties:
    ci:
      codebase:
        connectorRef: github_tunxiang
        repoName: tunxiang-os
        build: <+input>

  stages:
    # ─────────────────────────────────────────────
    # Stage 1: 部署到 Dev 环境
    # ─────────────────────────────────────────────
    - stage:
        name: Deploy_Dev
        identifier: Deploy_Dev
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: svc_tx_agent
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: primary
                      sources:
                        - identifier: primary
                          spec:
                            tag: <+pipeline.variables.imageTag>
          environment:
            environmentRef: env_dev
            deployToAll: false
            infrastructureDefinitions:
              - identifier: k8s_dev_shared
                inputs:
                  identifier: k8s_dev_shared
                  type: KubernetesDirect
                  spec:
                    namespace: tunxiang-dev
          execution:
            steps:
              - step:
                  name: K8s_Rolling_Deploy_Dev
                  identifier: K8s_Rolling_Deploy_Dev
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: StageRollback

              - step:
                  name: Post_Deploy_Healthcheck_Dev
                  identifier: Post_Deploy_Healthcheck_Dev
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/usr/bin/env bash
                          set -euo pipefail
                          HEALTH_URL="https://dev-api.tunxiangos.cn/health"
                          MAX_RETRY=10; SLEEP_SEC=15
                          echo ">>> Dev 健康检查"
                          for i in $(seq 1 ${MAX_RETRY}); do
                            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "${HEALTH_URL}" || true)
                            [ "${HTTP_CODE}" = "200" ] && echo "通过" && exit 0
                            echo "HTTP ${HTTP_CODE}，等待 ${SLEEP_SEC}s..."; sleep ${SLEEP_SEC}
                          done
                          echo "ERROR: 超时"; exit 1

            rollbackSteps:
              - step:
                  name: K8s_Rolling_Rollback_Dev
                  identifier: K8s_Rolling_Rollback_Dev
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}

    # ─────────────────────────────────────────────
    # Stage 2: 部署到 Test 环境 + 集成测试
    # ─────────────────────────────────────────────
    - stage:
        name: Deploy_Test
        identifier: Deploy_Test
        type: Deployment
        dependsOn:
          - Deploy_Dev
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: svc_tx_agent
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: primary
                      sources:
                        - identifier: primary
                          spec:
                            tag: <+pipeline.variables.imageTag>
          environment:
            environmentRef: env_test
            deployToAll: false
            infrastructureDefinitions:
              - identifier: k8s_test_shared
                inputs:
                  identifier: k8s_test_shared
                  type: KubernetesDirect
                  spec:
                    namespace: tunxiang-test
          execution:
            steps:
              - step:
                  name: K8s_Rolling_Deploy_Test
                  identifier: K8s_Rolling_Deploy_Test
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: StageRollback

              - step:
                  name: Post_Deploy_Healthcheck_Test
                  identifier: Post_Deploy_Healthcheck_Test
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/usr/bin/env bash
                          set -euo pipefail
                          HEALTH_URL="https://test-api.tunxiangos.cn/health"
                          MAX_RETRY=10; SLEEP_SEC=15
                          echo ">>> Test 健康检查"
                          for i in $(seq 1 ${MAX_RETRY}); do
                            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "${HEALTH_URL}" || true)
                            [ "${HTTP_CODE}" = "200" ] && echo "通过" && exit 0
                            echo "HTTP ${HTTP_CODE}，等待 ${SLEEP_SEC}s..."; sleep ${SLEEP_SEC}
                          done
                          echo "ERROR: 超时"; exit 1

              - step:
                  name: Run_Agent_Integration_Tests
                  identifier: Run_Agent_Integration_Tests
                  type: ShellScript
                  timeout: 20m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/usr/bin/env bash
                          set -euo pipefail
                          echo ">>> 运行 tx-agent 集成测试"
                          cd /harness
                          export TEST_BASE_URL="https://test-api.tunxiangos.cn"
                          export PYTEST_OPTS="-v --tb=short --junitxml=test-results/agent-integration.xml"

                          if ! python -c "import pytest" 2>/dev/null; then
                            pip install pytest pytest-asyncio httpx --quiet
                          fi

                          python -m pytest tests/integration/test_agent*.py ${PYTEST_OPTS} || {
                            echo "ERROR: Agent 集成测试失败"
                            exit 1
                          }
                          echo ">>> Agent 集成测试通过"
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort

            rollbackSteps:
              - step:
                  name: K8s_Rolling_Rollback_Test
                  identifier: K8s_Rolling_Rollback_Test
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}

    # ─────────────────────────────────────────────
    # Stage 3: DB 迁移门禁检测（tx-agent 含 alembic）
    # ─────────────────────────────────────────────
    - stage:
        name: Migration_Gate
        identifier: Migration_Gate
        type: Custom
        dependsOn:
          - Deploy_Test
        spec:
          execution:
            steps:
              - step:
                  name: Check_Alembic_Migrations_Agent
                  identifier: Check_Alembic_Migrations_Agent
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/usr/bin/env bash
                          set -uo pipefail
                          REPO_PATH="${REPO_PATH:-/harness}"
                          MIGRATION_APPROVAL_REQUIRED="${MIGRATION_APPROVAL_REQUIRED:-false}"
                          VERSIONS_DIR="${REPO_PATH}/s/alembic/versions"

                          echo "========================================="
                          echo "DB 迁移门禁 - tx-agent"
                          echo "========================================="

                          if [ ! -d "${VERSIONS_DIR}" ]; then
                            echo "WARNING: 未找到 alembic versions 目录，跳过"
                            exit 0
                          fi

                          cd "${REPO_PATH}"
                          NEW_MIGRATIONS=$(git diff --name-only HEAD~1 HEAD -- "s/alembic/versions/*.py" 2>/dev/null | grep -E '\.py$' || true)

                          if [ -z "${NEW_MIGRATIONS}" ]; then
                            echo "OK: 未检测到新 migration 文件，可安全部署"
                            exit 0
                          fi

                          echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
                          echo "WARNING: 检测到以下新增 alembic migration："
                          echo "${NEW_MIGRATIONS}"
                          echo "-----------------------------------------"
                          echo "请确认："
                          echo "  1. migration 已在 dev/test 验证"
                          echo "  2. 已准备好回滚 SQL"
                          echo "  3. 已通知 DBA 并备份数据库"
                          echo "!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"

                          if [ "${MIGRATION_APPROVAL_REQUIRED}" = "true" ]; then
                            echo "ERROR: MIGRATION_APPROVAL_REQUIRED=true，阻断流水线"
                            exit 1
                          fi
                          echo "INFO: 仅告警不阻断，请人工确认后继续"
                    environmentVariables:
                      - name: MIGRATION_APPROVAL_REQUIRED
                        type: String
                        value: "false"
                      - name: REPO_PATH
                        type: String
                        value: /harness
                    outputVariables:
                      - name: HAS_NEW_MIGRATIONS

    # ─────────────────────────────────────────────
    # Stage 4: UAT 审批
    # ─────────────────────────────────────────────
    - stage:
        name: Approve_UAT
        identifier: Approve_UAT
        type: Approval
        dependsOn:
          - Migration_Gate
        spec:
          execution:
            steps:
              - step:
                  name: UAT_Approval
                  identifier: UAT_Approval
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: "请确认是否允许进入 UAT 验收环境，发布版本：<+pipeline.sequenceId>"
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - qa_group
                        - product_group
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  failureStrategies:
                    - onFailure:
                        errors:
                          - ApprovalRejection
                        action:
                          type: Abort

    # ─────────────────────────────────────────────
    # Stage 5: 部署到 UAT 环境
    # ─────────────────────────────────────────────
    - stage:
        name: Deploy_UAT
        identifier: Deploy_UAT
        type: Deployment
        dependsOn:
          - Approve_UAT
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: svc_tx_agent
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: primary
                      sources:
                        - identifier: primary
                          spec:
                            tag: <+pipeline.variables.imageTag>
          environment:
            environmentRef: env_uat
            deployToAll: false
            infrastructureDefinitions:
              - identifier: k8s_uat_shared
                inputs:
                  identifier: k8s_uat_shared
                  type: KubernetesDirect
                  spec:
                    namespace: tunxiang-uat
          execution:
            steps:
              - step:
                  name: K8s_Rolling_Deploy_UAT
                  identifier: K8s_Rolling_Deploy_UAT
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: StageRollback

              - step:
                  name: Post_Deploy_Healthcheck_UAT
                  identifier: Post_Deploy_Healthcheck_UAT
                  type: ShellScript
                  timeout: 5m
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/usr/bin/env bash
                          set -euo pipefail
                          HEALTH_URL="https://uat-api.tunxiangos.cn/health"
                          MAX_RETRY=10; SLEEP_SEC=15
                          echo ">>> UAT 健康检查"
                          for i in $(seq 1 ${MAX_RETRY}); do
                            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "${HEALTH_URL}" || true)
                            [ "${HTTP_CODE}" = "200" ] && echo "通过" && exit 0
                            echo "HTTP ${HTTP_CODE}，等待 ${SLEEP_SEC}s..."; sleep ${SLEEP_SEC}
                          done
                          echo "ERROR: 超时"; exit 1

            rollbackSteps:
              - step:
                  name: K8s_Rolling_Rollback_UAT
                  identifier: K8s_Rolling_Rollback_UAT
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}

  variables:
    - name: imageTag
      type: String
      description: "待部署的镜像 Tag"
      required: true
      value: <+input>
