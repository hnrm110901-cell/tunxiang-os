# 屯象OS pre-commit 安全扫描配置
# 安装: pip install pre-commit && pre-commit install
# 启用 commit-msg 钩子: pre-commit install --hook-type commit-msg
# 首次运行全量检查: pre-commit run --all-files

repos:
  # 通用文件检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # Python代码格式化和lint（替代 black + isort + flake8）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Python安全漏洞扫描
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-r, services/, -ll, --skip, B101]
        # B101: assert_used - 测试中使用assert是合理的

  # 密钥检测
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # 防止异常信息泄漏：禁止 HTTPException(detail=str(e)) 模式
  # 使用 shared.security.src.error_handler.safe_http_exception 替代
  # 参见：shared/security/src/error_handler.py
  - repo: local
    hooks:
      - id: no-detail-str-e
        name: 禁止 HTTPException detail=str(e) 泄漏内部异常
        language: pygrep
        entry: 'HTTPException\(.*detail\s*=\s*str\(e\)'
        types: [python]
        files: '^services/|^edge/|^shared/'
        pass_filenames: true

      # 服务冻结令（W1-T4，12 周升级战略）
      # 配置 SoT：.omc/policy/service-freeze.yml
      # 拦截：禁止新建 services/tx-*/src/main.py（diff-filter=A）
      # 例外：TX_ALLOW_NEW_SERVICE=1 git commit ...（记入 .omc/state/freeze-bypass-log.txt）
      - id: service-freeze
        name: 服务冻结令 (W1-T4，until 2026-06-11)
        language: system
        entry: bash scripts/check_service_freeze.sh
        pass_filenames: false
        stages: [pre-commit]
