[alembic]
script_location = .

# DATABASE_URL env var override 在 env.py 处理；本默认仅 dev fallback
sqlalchemy.url = postgresql://tunxiang:changeme_dev@localhost/tunxiang_os

# 关键：service-specific version table，多 alembic 共用 PG 时彼此 stamp 隔离
version_table = tx_pay_alembic_version

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
