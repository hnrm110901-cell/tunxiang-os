# ============================================================
# Skill: dispatch
# 派工管理 — 员工任务派发、执行追踪
# ============================================================

meta:
  name: "dispatch"
  version: "1.0.0"
  display_name: "派工管理"
  description: |
    管理门店员工日常任务的派发与完成追踪：开店前准备、备料、卫生清洁、
    设备检查等标准化任务。每日6点自动生成今日派工单，
    员工入职时自动分配默认任务模板。
    触发场景：新员工入职、每日6:00自动生成派工单。
  category: "report"
  sub_category: "operational"
  icon: "list-checks"
  maintainer: "ops-team"
  license: "proprietary"

# ============================================================
# 第二层：触发路由
# ============================================================
triggers:
  events:
    - type: "org.staff.onboarded"
      condition: "always"
      priority: 70
      description: "新员工入职，分配默认任务模板"
    - type: "cron.daily.06:00"
      condition: "always"
      priority: 80
      description: "每日6:00生成今日派工单"

  api:
    base_path: "/api/v1/ops/dispatch"
    endpoints:
      - method: "GET"
        path: "/today"
        description: "今日派工单列表"
      - method: "POST"
        path: "/"
        description: "手动创建任务"
      - method: "POST"
        path: "/:id/complete"
        description: "标记任务完成"
      - method: "GET"
        path: "/templates"
        description: "任务模板列表"
      - method: "POST"
        path: "/templates"
        description: "创建任务模板"

  terminal:
    - device: "cashier-pos"
      action: "dispatch_checklist"
      description: "开店检查清单"
    - device: "android-kds"
      action: "kitchen_tasks"
      description: "厨房任务看板"

# ============================================================
# 第三层：作用域与权限
# ============================================================
scope:
  levels:
    - brand
    - store
  config_inheritance: "override_with_merge"
  permissions:
    - role: "staff"
      actions: ["view_own_tasks", "complete_task"]
    - role: "store_manager"
      actions: ["view_all", "create_task", "complete_task", "manage_template"]
    - role: "brand_admin"
      actions: ["*"]

# ============================================================
# 第四层：数据契约
# ============================================================
data:
  owned_entities:
    - name: "DispatchTask"
      table: "biz_dispatch_tasks"
      fields:
        - { name: "id",               type: "uuid",      required: true }
        - { name: "tenant_id",        type: "uuid",      required: true }
        - { name: "store_id",         type: "uuid",      required: true,  ref: "Store.id" }
        - { name: "task_date",        type: "date",      required: true }
        - { name: "assignee_id",      type: "uuid",      required: false, ref: "Staff.id" }
        - { name: "task_name",        type: "string",    required: true }
        - { name: "task_type",        type: "enum",      required: true,  values: ["pre_open", "prep", "cleaning", "equipment_check", "closing", "custom"] }
        - { name: "description",      type: "string",    required: false }
        - { name: "priority",         type: "enum",      required: true,  values: ["high", "normal", "low"] }
        - { name: "deadline_time",    type: "time",      required: false }
        - { name: "status",           type: "enum",      required: true,  values: ["pending", "in_progress", "completed", "overdue"] }
        - { name: "completed_at",     type: "timestamp", required: false }
        - { name: "completed_by",     type: "uuid",      required: false, ref: "Staff.id" }
        - { name: "note",             type: "string",    required: false }
        - { name: "photo_url",        type: "string",    required: false, description: "完成照片留证" }
        - { name: "template_id",      type: "uuid",      required: false }
        - { name: "created_at",       type: "timestamp", required: true }
        - { name: "updated_at",       type: "timestamp", required: true }

  referenced_entities:
    - entity: "Staff"
      skill: "org-core"
      fields_used: ["id", "name", "role", "store_id"]
    - entity: "DailyAttendance"
      skill: "attendance"
      fields_used: ["staff_id", "work_date", "status"]

  emitted_events:
    - type: "dispatch.task_created"
      payload_schema: { task_id: "uuid", store_id: "uuid", assignee_id: "uuid", task_name: "string", task_date: "date" }
    - type: "dispatch.task_completed"
      payload_schema: { task_id: "uuid", store_id: "uuid", completed_by: "uuid", completed_at: "timestamp" }

# ============================================================
# 第五层：依赖声明
# ============================================================
dependencies:
  required:
    - skill: "org-core"
      min_version: "1.0.0"
      reason: "派工需要员工信息与岗位信息"
    - skill: "attendance"
      min_version: "1.0.0"
      reason: "仅对当日出勤员工生成派工单"
    # infrastructure: postgresql >= 15, redis >= 7

# ============================================================
# 第六层：降级策略
# ============================================================
degradation:
  offline:
    can_operate: true
    capabilities:
      - action: "view_tasks"
        mode: "full"
        note: "查看今日任务离线完整可用（本地缓存）"
      - action: "complete_task"
        mode: "full"
        local_storage: "sqlite_wal"
        note: "完成任务打卡离线可用，联网后同步"
      - action: "create_task"
        mode: "full"
        local_storage: "sqlite_wal"
        note: "手动创建任务离线可用"
    sync_strategy:
      on_reconnect: "push_local_then_pull_remote"
      conflict_resolution: "last_write_wins_with_operator_log"
      max_offline_hours: 4

  conflict:
    strategy: "lww_with_audit"
    manual_review_trigger: "task_status_conflict"

# ============================================================
# 第七层：可观测性
# ============================================================
observability:
  metrics:
    - name: "dispatch_task_completion_rate"
      type: "gauge"
      labels: ["store_id"]
      alert_threshold: 0.8
      alert_message: "门店今日任务完成率 {value}，低于80%请催促"
    - name: "dispatch_task_overdue_count"
      type: "gauge"
      labels: ["store_id"]
      alert_threshold: 3
      alert_message: "门店有 {value} 个任务逾期未完成"
    - name: "dispatch_task_created_total"
      type: "counter"
      labels: ["store_id", "task_type"]
      description: "派工单创建总数"

  health_check:
    endpoint: "/health"
    interval_seconds: 60
    timeout_seconds: 10

  audit:
    log_all_mutations: true
    retention_days: 180
    fields_to_mask: []

# ============================================================
# 第八层：UI 声明
# ============================================================
ui:
  surfaces:
    - terminal: "cashier-pos"
      entry_point: "ops.dispatch-checklist"
      component: "DispatchChecklist"
      layout: "full-screen"
    - terminal: "android-kds"
      entry_point: "kds.kitchen-tasks"
      component: "KitchenTaskBoard"
      layout: "full-screen"
    - terminal: "manager-pad"
      entry_point: "ops.dispatch-manage"
      component: "DispatchManagePanel"
      layout: "full-screen"
    - terminal: "manager-dashboard"
      entry_point: "reports.ops.dispatch-summary"
      component: "DispatchSummaryReport"
      layout: "data-table"

# ============================================================
# 第九层：合规与本地化
# ============================================================
compliance:
  golden_tax:
    applicable: false
  data_residency: "cn-mainland"
  pii_fields: []
  retention_policy:
    financial_records: "1_year"
    operation_logs: "1_year"

localization:
  default_locale: "zh-CN"
  supported_locales: ["zh-CN"]
  currency: "CNY"
  timezone: "Asia/Shanghai"
  number_format: "comma_thousands"
