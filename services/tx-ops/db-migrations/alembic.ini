[alembic]
script_location = .

# 仅 dev fallback — 实际运行必须设 DATABASE_URL 环境变量
sqlalchemy.url = postgresql://tunxiang:CHANGE_ME@localhost/tunxiang_os

# 关键：service-specific version table，多 alembic 共用 PG 时彼此 stamp 隔离
version_table = tx_ops_alembic_version

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
