# ============================================================
# Skill: supply-receiving
# 收货管理 — 采购订单收货、验收、差异处理
# ============================================================

meta:
  name: "supply-receiving"
  version: "1.0.0"
  display_name: "收货管理"
  description: |
    处理食材采购订单的收货验收流程：扫码录入、数量核对、差异上报、入库确认。
    收货完成后触发inventory-core入库事件。
    触发场景：采购订单到货、收货员扫码验收。
  category: "supply-chain"
  sub_category: "procurement"
  icon: "clipboard-check"
  maintainer: "supply-team"
  license: "proprietary"

# ============================================================
# 第二层：触发路由
# ============================================================
triggers:
  events:
    - type: "supply.purchase_order.dispatched"
      condition: "always"
      priority: 80
      description: "采购订单已发货，进入待收货状态"
    - type: "terminal.receiving.item_scanned"
      condition: "always"
      priority: 90
      description: "收货员扫码录入食材"

  api:
    base_path: "/api/v1/supply/receiving"
    endpoints:
      - method: "GET"
        path: "/"
        description: "待收货订单列表"
      - method: "POST"
        path: "/:po_id/start"
        description: "开始收货"
      - method: "POST"
        path: "/:po_id/scan-item"
        description: "扫码录入食材数量"
      - method: "POST"
        path: "/:po_id/complete"
        description: "确认收货完成"
      - method: "POST"
        path: "/:po_id/report-discrepancy"
        description: "上报收货差异"

  terminal:
    - device: "cashier-pos"
      action: "receiving_scan"
      description: "扫码枪扫描食材条码"
    - device: "manager-pad"
      action: "receiving_confirm"
      description: "收货确认操作"

# ============================================================
# 第三层：作用域与权限
# ============================================================
scope:
  levels:
    - brand
    - store
  config_inheritance: "override_with_merge"
  permissions:
    - role: "kitchen_staff"
      actions: ["scan_item", "view"]
    - role: "store_manager"
      actions: ["start", "scan_item", "complete", "report_discrepancy", "view"]
    - role: "supply_admin"
      actions: ["*"]

# ============================================================
# 第四层：数据契约
# ============================================================
data:
  owned_entities:
    - name: "ReceivingOrder"
      table: "biz_receiving_orders"
      fields:
        - { name: "id",                type: "uuid",      required: true }
        - { name: "tenant_id",         type: "uuid",      required: true }
        - { name: "store_id",          type: "uuid",      required: true,  ref: "Store.id" }
        - { name: "purchase_order_id", type: "uuid",      required: true,  description: "关联采购订单" }
        - { name: "supplier_name",     type: "string",    required: true }
        - { name: "status",            type: "enum",      required: true,  values: ["pending", "in_progress", "completed", "discrepancy_found"] }
        - { name: "received_by",       type: "uuid",      required: false, ref: "Staff.id" }
        - { name: "started_at",        type: "timestamp", required: false }
        - { name: "completed_at",      type: "timestamp", required: false }
        - { name: "note",              type: "string",    required: false }
        - { name: "created_at",        type: "timestamp", required: true }
        - { name: "updated_at",        type: "timestamp", required: true }

    - name: "ReceivingItem"
      table: "biz_receiving_items"
      fields:
        - { name: "id",                type: "uuid",      required: true }
        - { name: "tenant_id",         type: "uuid",      required: true }
        - { name: "receiving_order_id", type: "uuid",     required: true,  ref: "ReceivingOrder.id" }
        - { name: "ingredient_id",     type: "uuid",      required: true,  ref: "Ingredient.id" }
        - { name: "expected_qty",      type: "decimal",   required: true,  precision: [12, 3] }
        - { name: "received_qty",      type: "decimal",   required: false, precision: [12, 3] }
        - { name: "unit",              type: "string",    required: true }
        - { name: "unit_price_fen",    type: "integer",   required: false, description: "入库单价（分）" }
        - { name: "discrepancy_note",  type: "string",    required: false }
        - { name: "created_at",        type: "timestamp", required: true }

  referenced_entities:
    - entity: "Ingredient"
      skill: "inventory-core"
      fields_used: ["id", "name", "unit", "safety_stock"]

  emitted_events:
    - type: "supply.receiving.completed"
      payload_schema: { receiving_order_id: "uuid", store_id: "uuid", items_count: "integer", total_value_fen: "integer" }
    - type: "supply.receiving.discrepancy_found"
      payload_schema: { receiving_order_id: "uuid", store_id: "uuid", discrepancy_items: "array" }

# ============================================================
# 第五层：依赖声明
# ============================================================
dependencies:
  required:
    - skill: "inventory-core"
      min_version: "1.0.0"
      reason: "收货完成后触发入库，更新食材库存"
    # infrastructure: postgresql >= 15, redis >= 7

# ============================================================
# 第六层：降级策略
# ============================================================
degradation:
  offline:
    can_operate: true
    capabilities:
      - action: "scan_item"
        mode: "full"
        local_storage: "sqlite_wal"
        note: "扫码录入离线完整可用"
      - action: "complete_receiving"
        mode: "full"
        local_storage: "sqlite_wal"
        note: "收货确认离线可用，联网后同步"
      - action: "report_discrepancy"
        mode: "full"
        local_storage: "sqlite_wal"
        note: "差异上报离线可用"
    sync_strategy:
      on_reconnect: "push_local_then_pull_remote"
      conflict_resolution: "last_write_wins_with_operator_log"
      max_offline_hours: 4

  conflict:
    strategy: "lww_with_audit"
    manual_review_trigger: "quantity_diff_pct > 0.1"

# ============================================================
# 第七层：可观测性
# ============================================================
observability:
  metrics:
    - name: "receiving_completed_total"
      type: "counter"
      labels: ["store_id"]
      description: "收货完成次数"
    - name: "receiving_discrepancy_rate"
      type: "gauge"
      labels: ["store_id"]
      alert_threshold: 0.1
      alert_message: "门店收货差异率 {value}，请检查供应商"
    - name: "receiving_pending_count"
      type: "gauge"
      labels: ["store_id"]
      alert_threshold: 5
      alert_message: "门店有 {value} 笔待收货，请及时处理"

  health_check:
    endpoint: "/health"
    interval_seconds: 30
    timeout_seconds: 5

  audit:
    log_all_mutations: true
    retention_days: 365
    fields_to_mask: []

# ============================================================
# 第八层：UI 声明
# ============================================================
ui:
  surfaces:
    - terminal: "cashier-pos"
      entry_point: "supply.receiving"
      component: "ReceivingPanel"
      layout: "full-screen"
    - terminal: "manager-pad"
      entry_point: "supply.receiving-confirm"
      component: "ReceivingConfirmPanel"
      layout: "full-screen"

  print_templates:
    - name: "receiving-slip"
      format: "thermal-58mm"
      template_file: "assets/templates/receiving-slip.xml"

# ============================================================
# 第九层：合规与本地化
# ============================================================
compliance:
  golden_tax:
    applicable: true
    tax_category: "采购原材料"
    invoice_timing: "on_receiving_completed"
    note: "收货完成后需索取供应商发票，留存备查"
  data_residency: "cn-mainland"
  pii_fields: []
  retention_policy:
    financial_records: "7_years"
    operation_logs: "1_year"

localization:
  default_locale: "zh-CN"
  supported_locales: ["zh-CN"]
  currency: "CNY"
  timezone: "Asia/Shanghai"
  number_format: "comma_thousands"
