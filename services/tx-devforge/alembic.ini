; tx-devforge 复用 shared/db-migrations 的全局版本目录。
; 本文件仅供本服务在容器/CI 内执行 `alembic` 命令时定位 versions。
; 如需独立运行：alembic -c services/tx-devforge/alembic.ini upgrade head
[alembic]
script_location = ../../shared/db-migrations
sqlalchemy.url = postgresql://tunxiang:changeme_dev@localhost/tunxiang_os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
