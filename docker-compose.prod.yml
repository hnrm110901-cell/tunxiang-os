## TunxiangOS V3.0 — 生产环境 Docker Compose
## 使用: docker-compose -f docker-compose.prod.yml up -d

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - web-admin-dist:/usr/share/nginx/html/web-admin:ro
    depends_on:
      - gateway
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tunxiang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-tunxiang_os}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunxiang"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
    restart: always

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-tunxiang_os}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      TX_TRADE_URL: http://tx-trade:8001
      TX_MENU_URL: http://tx-menu:8002
      TX_MEMBER_URL: http://tx-member:8003
      TX_SUPPLY_URL: http://tx-supply:8004
      TX_FINANCE_URL: http://tx-finance:8005
      TX_ORG_URL: http://tx-org:8006
      TX_ANALYTICS_URL: http://tx-analytics:8007
      TX_AGENT_URL: http://tx-agent:8008
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  tx-trade:
    build:
      context: .
      dockerfile: services/tx-trade/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  tx-menu:
    build:
      context: .
      dockerfile: services/tx-menu/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-tunxiang_os}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  tx-agent:
    build:
      context: .
      dockerfile: services/tx-agent/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-tunxiang_os}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  pg_data:
  redis_data:
  web-admin-dist:
