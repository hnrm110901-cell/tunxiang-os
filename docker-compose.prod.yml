## TunxiangOS V3.0 — 生产环境 Docker Compose
## 使用: docker-compose -f docker-compose.prod.yml up -d

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tunxiang}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-tunxiang_os}
  REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0

x-service-defaults: &service-defaults
  restart: always
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - web-admin-dist:/usr/share/nginx/html/web-admin:ro
    depends_on:
      - gateway
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tunxiang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-tunxiang_os}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/docker/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunxiang"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      <<: *common-env
      TX_TRADE_URL: http://tx-trade:8001
      TX_MENU_URL: http://tx-menu:8002
      TX_MEMBER_URL: http://tx-member:8003
      TX_SUPPLY_URL: http://tx-supply:8004
      TX_FINANCE_URL: http://tx-finance:8005
      TX_ORG_URL: http://tx-org:8006
      TX_ANALYTICS_URL: http://tx-analytics:8007
      TX_AGENT_URL: http://tx-agent:8008
      TX_OPS_URL: http://tx-ops:8009
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  tx-trade:
    build:
      context: .
      dockerfile: services/tx-trade/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tx-menu:
    build:
      context: .
      dockerfile: services/tx-menu/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tx-member:
    build:
      context: .
      dockerfile: services/tx-member/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tx-supply:
    build:
      context: .
      dockerfile: services/tx-supply/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tx-finance:
    build:
      context: .
      dockerfile: services/tx-finance/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tx-org:
    build:
      context: .
      dockerfile: services/tx-org/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tx-analytics:
    build:
      context: .
      dockerfile: services/tx-analytics/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tx-agent:
    build:
      context: .
      dockerfile: services/tx-agent/Dockerfile
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  tx-ops:
    build:
      context: .
      dockerfile: services/tx-ops/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Celery Worker: 异步任务执行 ──
  celery-worker:
    build:
      context: .
      dockerfile: services/tx-ops/Dockerfile
    command: >
      celery -A tasks.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=default,daily_ops,schedule,notifications
    environment:
      <<: *common-env
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
    <<: *service-defaults
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.celery_app inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Celery Beat: 定时任务调度 ──
  #
  # 定时任务清单:
  #   - 4 时间点推送（09:30 开店提醒 / 11:00 午市预警 / 14:00 交接班 / 22:00 日结提醒）
  #   - 每日 23:30 自动触发日结流程（E6-E8）
  #   - 每周日 20:00 生成下周排班建议
  #   - 每月 1 日 02:00 生成上月工资条
  celery-beat:
    build:
      context: .
      dockerfile: services/tx-ops/Dockerfile
    command: >
      celery -A tasks.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *common-env
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
    <<: *service-defaults
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

volumes:
  pg_data:
  redis_data:
  web-admin-dist:
