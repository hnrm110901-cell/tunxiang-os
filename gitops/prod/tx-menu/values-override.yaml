# tx-menu prod环境覆盖配置
# 由Harness CD流水线自动合并，禁止手动修改image.tag

replicaCount: 2

image:
  tag: ${IMAGE_TAG}  # 由Harness CD流水线注入，禁止手动修改

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # 菜品三级发布：生产环境完整启用门店/品牌/集团三层发布机制
  MENU_PUBLISH_V3_ENABLED: "true"
  KDS_ROUTING_ENABLED: "true"
  PRICE_PRIORITY_LEVELS: "5"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podAntiAffinity:
  enabled: true
