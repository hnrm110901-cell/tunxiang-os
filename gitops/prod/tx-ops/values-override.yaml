# tx-ops prod环境覆盖配置
# 由Harness CD流水线自动合并，禁止手动修改image.tag

replicaCount: 2

image:
  tag: ${IMAGE_TAG}  # 由Harness CD流水线注入，禁止手动修改

env:
  TUNXIANG_ENV: prod
  LOG_LEVEL: info
  # 食品安全检查：生产环境强制开启，违规自动拦截（三条硬约束之一）
  FOOD_SAFETY_CHECK_ENABLED: "true"
  DAILY_SETTLEMENT_AUTO: "true"
  DISPATCH_ENABLED: "true"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# HPA：日结高峰期（午市/晚市收班）自动扩容，最多6实例
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podAntiAffinity:
  enabled: true
