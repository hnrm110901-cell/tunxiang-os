## TunxiangOS V3 — Staging 环境
## 与 prod 共存同一台服务器，端口偏移 +100
## 用法: docker-compose -f docker-compose.staging.yml up -d

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://${STG_POSTGRES_USER:-tunxiang_stg}:${STG_POSTGRES_PASSWORD:-changeme_stg}@stg-postgres/${STG_POSTGRES_DB:-tunxiang_os_stg}
  REDIS_URL: redis://:${STG_REDIS_PASSWORD:-changeme_stg}@stg-redis:6379/0

x-service-defaults: &service-defaults
  restart: unless-stopped
  depends_on:
    stg-postgres:
      condition: service_healthy
    stg-redis:
      condition: service_healthy
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M
      reservations:
        cpus: "0.1"
        memory: 64M

services:
  # ── Nginx 反向代理（staging） ──
  stg-nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
      - stg-web-pos-dist:/usr/share/nginx/html/web-pos:ro
      - stg-web-admin-dist:/usr/share/nginx/html/web-admin:ro
      - stg-web-kds-dist:/usr/share/nginx/html/web-kds:ro
    depends_on:
      - stg-gateway
    restart: unless-stopped

  # ── 前端（staging 只构建核心三个） ──
  stg-web-pos:
    build:
      context: .
      dockerfile: apps/web-pos/Dockerfile
    volumes:
      - stg-web-pos-dist:/app/dist
    environment:
      VITE_API_BASE_URL: http://${STG_HOST:-localhost}:8080/api

  stg-web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    volumes:
      - stg-web-admin-dist:/app/dist
    environment:
      VITE_API_BASE_URL: http://${STG_HOST:-localhost}:8080/api

  stg-web-kds:
    build:
      context: .
      dockerfile: apps/web-kds/Dockerfile
    volumes:
      - stg-web-kds-dist:/app/dist
    environment:
      VITE_API_BASE_URL: http://${STG_HOST:-localhost}:8080/api

  # ── 基础设施 ──
  stg-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${STG_POSTGRES_USER:-tunxiang_stg}
      POSTGRES_PASSWORD: ${STG_POSTGRES_PASSWORD:-changeme_stg}
      POSTGRES_DB: ${STG_POSTGRES_DB:-tunxiang_os_stg}
    volumes:
      - stg_pg_data:/var/lib/postgresql/data
      - ./infra/docker/init-rls.sql:/docker-entrypoint-initdb.d/01-rls.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STG_POSTGRES_USER:-tunxiang_stg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  stg-redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${STG_REDIS_PASSWORD:-changeme_stg} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - stg_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${STG_REDIS_PASSWORD:-changeme_stg}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── 后端微服务（staging 全部启动，资源减半） ──
  stg-gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      <<: *common-env
      TX_TRADE_URL: http://stg-tx-trade:8001
      TX_MENU_URL: http://stg-tx-menu:8002
      TX_MEMBER_URL: http://stg-tx-member:8003
      TX_SUPPLY_URL: http://stg-tx-supply:8004
      TX_FINANCE_URL: http://stg-tx-finance:8005
      TX_ORG_URL: http://stg-tx-org:8006
      TX_ANALYTICS_URL: http://stg-tx-analytics:8007
      TX_AGENT_URL: http://stg-tx-agent:8008
      TX_OPS_URL: http://stg-tx-ops:8009
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-trade:
    build:
      context: .
      dockerfile: services/tx-trade/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-menu:
    build:
      context: .
      dockerfile: services/tx-menu/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-member:
    build:
      context: .
      dockerfile: services/tx-member/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-supply:
    build:
      context: .
      dockerfile: services/tx-supply/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-finance:
    build:
      context: .
      dockerfile: services/tx-finance/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-org:
    build:
      context: .
      dockerfile: services/tx-org/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-analytics:
    build:
      context: .
      dockerfile: services/tx-analytics/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-agent:
    build:
      context: .
      dockerfile: services/tx-agent/Dockerfile
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  stg-tx-ops:
    build:
      context: .
      dockerfile: services/tx-ops/Dockerfile
    environment:
      <<: *common-env
    <<: *service-defaults
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  stg_pg_data:
  stg_redis_data:
  stg-web-pos-dist:
  stg-web-admin-dist:
  stg-web-kds-dist:
