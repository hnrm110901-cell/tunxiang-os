<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>TunxiangOS POS</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="屯象管理" />
    <link rel="apple-touch-icon" href="/logo192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[TX-ADMIN] SW registered:', reg.scope);
              window.addEventListener('online', () => {
                if (reg.active) {
                  reg.active.postMessage({ type: 'ONLINE_RESTORED' });
                }
              });
            })
            .catch((err) => console.warn('[TX-ADMIN] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
