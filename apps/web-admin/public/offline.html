<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6B35" />
    <title>网络连接中断 - 屯象管理</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #333;
      }
      .container { text-align: center; padding: 40px 20px; max-width: 420px; }
      .icon { font-size: 64px; margin-bottom: 20px; }
      h1 { font-size: 20px; margin-bottom: 12px; color: #1a1a1a; }
      p { font-size: 14px; color: #666; line-height: 1.6; }
      .retry-btn {
        margin-top: 24px;
        background: #FF6B35;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 15px;
        cursor: pointer;
      }
      .retry-btn:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📊</div>
      <h1>网络连接中断</h1>
      <p>总部管理后台需要网络连接。<br/>请检查网络后重试。</p>
      <button class="retry-btn" onclick="retryConnection()">重试连接</button>
    </div>
    <script>
      function retryConnection() {
        fetch('/api/v1/health', { method: 'HEAD', cache: 'no-store' })
          .then(() => { window.location.reload(); })
          .catch(() => {});
      }
      setInterval(() => {
        fetch('/api/v1/health', { method: 'HEAD', cache: 'no-store' })
          .then(() => { window.location.reload(); })
          .catch(() => {});
      }, 30000);
      window.addEventListener('online', () => { window.location.reload(); });
    </script>
  </body>
</html>
