<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6B2C" />
    <title>网络连接中断 - 屯象Crew</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #333;
      }
      .container { text-align: center; padding: 40px 20px; max-width: 400px; }
      .icon { font-size: 64px; margin-bottom: 20px; }
      h1 { font-size: 20px; margin-bottom: 12px; color: #1a1a1a; }
      p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
      .status { font-size: 12px; color: #999; margin-bottom: 20px; }
      .retry-btn {
        background: #FF6B2C;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 15px;
        cursor: pointer;
      }
      .retry-btn:active { opacity: 0.8; }
      .queue-status { margin-top: 16px; font-size: 12px; color: #999; display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>网络连接中断</h1>
      <p>当前处于离线模式，服务员操作已缓存在本地。<br/>恢复网络后数据将自动同步。</p>
      <div class="status" id="status">检测网络连接中...</div>
      <button class="retry-btn" onclick="retryConnection()">重试连接</button>
      <div class="queue-status" id="queueStatus"></div>
    </div>
    <script>
      const STATUS = document.getElementById('status');
      const QUEUE_STATUS = document.getElementById('queueStatus');

      function retryConnection() {
        STATUS.textContent = '正在尝试连接...';
        fetch('/api/v1/health', { method: 'HEAD', cache: 'no-store' })
          .then(() => { window.location.reload(); })
          .catch(() => { STATUS.textContent = '仍无法连接，请检查网络'; });
      }

      // 自动重试：每 30 秒检测一次
      setInterval(() => {
        fetch('/api/v1/health', { method: 'HEAD', cache: 'no-store' })
          .then(() => { window.location.reload(); })
          .catch(() => {});
      }, 30000);

      // 监听 Service Worker 队列状态
      if (navigator.serviceWorker) {
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data?.type === 'OFFLINE_QUEUE_DRAINED') {
            QUEUE_STATUS.style.display = 'block';
            QUEUE_STATUS.textContent = '已同步 ' + event.data.count + ' 条离线操作';
          }
        });
      }

      // 网络恢复时自动刷新
      window.addEventListener('online', () => { window.location.reload(); });
    </script>
  </body>
</html>
