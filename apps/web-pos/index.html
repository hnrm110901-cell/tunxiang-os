<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1E2A3A" />
    <link rel="manifest" href="/manifest.json" />
    <!-- PWA / Apple Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TX收银" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="TX收银" />
    <meta name="description" content="屯象OS门店收银终端" />
    <title>屯象POS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[TX-POS] SW registered:', reg.scope);
              // 恢复在线时通知 SW 刷新离线队列
              window.addEventListener('online', () => {
                if (reg.active) {
                  reg.active.postMessage({ type: 'ONLINE_RESTORED' });
                }
              });
            })
            .catch((err) => console.warn('[TX-POS] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
