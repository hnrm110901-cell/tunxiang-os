# 交易域 Feature Flags
# 域：trade
# 命名格式：trade.{module}.{feature}.{action}

flags:
  - identifier: trade_delivery_auto_accept_enable
    name: trade.delivery.auto_accept.enable
    description: >
      外卖自动接单（美团/饿了么/抖音订单到达后自动确认接单，无需人工点击）。
      依赖 trade.delivery.aggregator_panel.enable，建议配合使用。
      注意：自动接单后如需取消，可能产生平台罚款。
    defaultValue: false
    environments:
      dev: true
      test: true
      uat: true
      pilot: false
      prod: false
    targeting_rules:
      pilot:
        - dimension: store_id
          values: []
      prod:
        - dimension: store_id
          values: []
    tags: [trade, delivery, auto-accept]

  - identifier: trade_delivery_aggregator_panel_enable
    name: trade.delivery.aggregator_panel.enable
    description: >
      外卖聚合接单面板（将美团/饿了么/抖音/自有外卖订单汇聚到一个界面统一处理）。
      替代每个平台单独登录管理的模式。
    defaultValue: false
    environments:
      dev: true
      test: true
      uat: true
      pilot: true
      prod: false
    targeting_rules:
      prod:
        - dimension: brand_id
          values: []
    tags: [trade, delivery, aggregator, panel]

  - identifier: trade_discount_health_engine_enable
    name: trade.discount.health_engine.enable
    description: >
      折扣健康引擎（实时计算每笔折扣对毛利的影响，超出阈值自动拦截或预警）。
      联动三条硬约束的毛利底线校验。建议与 agent.trade.discount_alert.enable 同步开启。
    defaultValue: false
    environments:
      dev: true
      test: true
      uat: true
      pilot: true
      prod: false
    targeting_rules:
      prod:
        - dimension: role_code
          values: [L1, L2, L3]
    tags: [trade, discount, health, engine]

  - identifier: trade_voice_order_enable
    name: trade.voice_order.enable
    description: >
      语音下单（通过Mac mini M4 Neural Engine进行本地语音识别，
      将语音指令转换为点餐操作）。
      依赖 edge.coreml.inference.enable，需Mac mini在线。
    defaultValue: false
    environments:
      dev: false
      test: false
      uat: false
      pilot: false
      prod: false
    targeting_rules:
      pilot:
        - dimension: edge_node_group
          values: [mac_mini_m4_pilot]
    tags: [trade, voice, order, coreml]

  - identifier: trade_split_payment_enable
    name: trade.split_payment.enable
    description: >
      分账引擎（多人AA付款、平台分账、加盟商分润等）。
      需要与支付渠道（微信/支付宝）提前签约分账协议。
    defaultValue: false
    environments:
      dev: true
      test: true
      uat: false
      pilot: false
      prod: false
    targeting_rules:
      pilot:
        - dimension: tenant_id
          values: []
    tags: [trade, split, payment, settlement]

  # ──────────────────────────────────────────────────────────────
  # Sprint A1（2026-04-18）POS 收银结算硬化三件套
  # 灰度路径：pilot(5%) → pilot(50%) → prod(100%)，回滚阈值错误率 > 0.1%
  # 前端 apps/web-pos 启动时通过 GET /api/v1/flags?domain=trade 拉取覆盖默认值
  # ──────────────────────────────────────────────────────────────
  - identifier: trade_pos_settle_hardening_enable
    name: trade.pos.settle.hardening.enable
    description: >
      POS 结算硬化（Sprint A1）：8s 超时分级（TIMEOUT_SETTLE）+ 离线自动入队 +
      幂等键防重复 + 5 类错误码映射。影响 tradeApi.txFetchTrade / txFetchOffline。
      回滚：关闭后 settle/payment 路径回退到无超时分级、直接 throw 的旧行为。
    defaultValue: true
    environments:
      dev: true
      test: true
      uat: true
      pilot: true
      prod: false
    targeting_rules:
      pilot:
        - dimension: store_id
          values: []
      prod:
        - dimension: store_id
          values: []
    tags: [trade, pos, settle, hardening, sprint-a1, tier1]

  - identifier: trade_pos_toast_enable
    name: trade.pos.toast.enable
    description: >
      POS Toast 统一提示组件（Sprint A1）：替代 alert() 弹窗，支持 success/error/info/warning/offline 5 类样式，
      支持自动消失 + 手动关闭 + 队列管理。影响 SettlePage/CashierPage 等收银页的错误与离线提示。
      回滚：关闭后降级到 window.alert（收银员仍可操作，但交互体验降级）。
    defaultValue: true
    environments:
      dev: true
      test: true
      uat: true
      pilot: true
      prod: false
    targeting_rules:
      pilot:
        - dimension: store_id
          values: []
      prod:
        - dimension: store_id
          values: []
    tags: [trade, pos, ui, toast, sprint-a1]

  - identifier: trade_pos_error_boundary_enable
    name: trade.pos.errorBoundary.enable
    description: >
      POS ErrorBoundary 顶层 + 结算路由级（Sprint A1）：React 组件崩溃时捕获并展示降级 UI，
      同时上报 /api/v1/telemetry/pos-crash。双层：顶层中性文案 + /settle /order 路由"结账失败，请扫桌重试"专属。
      回滚：关闭后 React 组件崩溃会导致白屏（但崩溃遥测端点仍可通过其他方式接入）。
    defaultValue: true
    environments:
      dev: true
      test: true
      uat: true
      pilot: true
      prod: false
    targeting_rules:
      pilot:
        - dimension: store_id
          values: []
      prod:
        - dimension: store_id
          values: []
    tags: [trade, pos, ui, error-boundary, sprint-a1, tier1]
